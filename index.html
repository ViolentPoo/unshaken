<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:70px 0 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
  z-index:1000;
}

.container{
  width:min(800px,92%);
  display:flex;
  flex-direction:column;
  align-items:stretch;
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.verse{
  font-size:20px;
  line-height:1.6;
  margin:14px 0;
  min-height:60px;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

button,select{
  padding:8px;
  margin:4px;
  border-radius:8px;
  border:1px solid #ccc;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:#fff;
}

.favorites{
  display:none;
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid rgba(0,0,0,.1);
  max-height:200px;
  overflow:auto;
}

.small{
  position:fixed;
  right:10px;
  font-size:12px;
  opacity:.7;
}
.footer1{bottom:22px;}
.footer2{bottom:8px;}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="verse" id="verse">Loading...</div>
  <div class="ref" id="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">
  <select id="translation">
    <option value="kjv">KJV</option>
    <option value="web" selected>WEB</option>
    <option value="esv">ESV</option>
  </select>

  <select id="topic" onchange="topicChange()">
    <option value="daily">Verse of the Day</option>
    <option value="peace">Peace</option>
    <option value="strength">Strength</option>
    <option value="hope">Hope</option>
    <option value="anxiety">Anxiety</option>
  </select>

  <button onclick="toggleDark()">Dark Mode</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="encouragement()">Encourage Me</button>
</div>

<!-- PRAYER -->
<div class="card">
  <strong>Prayer</strong>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <strong>Reflection</strong>
  <div id="reflection"></div>
</div>

<!-- FAVORITES -->
<div class="card favorites" id="favBox">
  <strong>Favorites</strong>
  <div id="favList"></div>
</div>

</div>

<div class="small footer1">est 2013</div>
<div class="small footer2">The Parker Family</div>

<script>

/* =========================
   STATE
========================= */

let currentRef = "";
let currentText = "";
let favorites = JSON.parse(localStorage.getItem('unshaken_favs') || '[]');

/* =========================
   DAILY VERSE SYNC
========================= */

function getDayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

async function fetchDaily(){
  const key = getDayKey();
  const storageKey = "unshaken_daily_" + key;

  const cached = localStorage.getItem(storageKey);

  if(cached){
    const data = JSON.parse(cached);
    loadVerse(data.ref);
    return;
  }

  let r = await fetch('https://beta.ourmanna.com/api/v1/get/?format=json&order=daily');
  let d = await r.json();

  const ref = d?.verse?.details?.reference || "John 14:27";

  localStorage.setItem(storageKey, JSON.stringify({ ref, date:key }));

  loadVerse(ref);
}

/* =========================
   VERSE LOADER
========================= */

async function loadVerse(ref){
  try{
    let tr = document.getElementById('translation').value;

    let r = await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${tr}`);
    let d = await r.json();

    let text = d?.text?.trim();
    if(!text) throw new Error("No verse text");

    document.getElementById('verse').innerText = text;
    document.getElementById('ref').innerText = ref;

    currentRef = ref;
    currentText = text;

    setExtras();

  } catch(e){
    document.getElementById('verse').innerText =
      "Verse unavailable right now. Please try again.";

    document.getElementById('ref').innerText = ref || "";
  }
}

/* =========================
   ALIGNMENT SYSTEM
========================= */

function getMode(){
  let h = new Date().getHours();
  return h < 12 ? "morning" : h < 18 ? "day" : "night";
}

function hash(str){
  let h = 0;
  for(let i=0;i<str.length;i++){
    h = ((h<<5)-h)+str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

/* =========================
   THEMATIC PAIRINGS
========================= */

const devotional = {
  peace: {
    prayer:"Lord, calm my heart and steady my thoughts.",
    reflection:"Where am I resisting God's peace?"
  },
  strength: {
    prayer:"God, strengthen me for what lies ahead.",
    reflection:"Where do I need courage today?"
  },
  hope: {
    prayer:"Father, remind me that You are working.",
    reflection:"What am I hoping for in faith?"
  },
  anxiety: {
    prayer:"Jesus, I surrender what I cannot control.",
    reflection:"What worry do I need to release?"
  },
  daily: {
    prayer:"Lord, guide me in today’s verse.",
    reflection:"How does this speak into my life today?"
  }
};

/* =========================
   ALIGN PRAYER + REFLECTION
========================= */

function setExtras(){
  let topic = document.getElementById('topic').value;

  let base = devotional[topic] || devotional.daily;

  document.getElementById('prayer').innerText = base.prayer;
  document.getElementById('reflection').innerText = base.reflection;
}

/* =========================
   CONTROLS
========================= */

function topicChange(){
  let v = document.getElementById('topic').value;

  const map = {
    peace:"John 14:27",
    strength:"Philippians 4:13",
    hope:"Jeremiah 29:11",
    anxiety:"Philippians 4:6",
    daily:"daily"
  };

  if(v === "daily") return fetchDaily();
  loadVerse(map[v]);
}

function encouragement(){
  loadVerse("Isaiah 41:10");
}

function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
  .then(r=>r.json())
  .then(d=>{
    loadVerse(d[0].bookname+" "+d[0].chapter+":"+d[0].verse);
  });
}

/* =========================
   THEME
========================= */

function toggleDark(){
  let t = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', t==='dark'?'light':'dark');
  localStorage.setItem('theme', t==='dark'?'light':'dark');
}

/* =========================
   INIT
========================= */

window.onload = () => {
  document.documentElement.setAttribute(
    'data-theme',
    localStorage.getItem('theme') || 'light'
  );

  fetchDaily();
};

</script>

</body>
</html>
