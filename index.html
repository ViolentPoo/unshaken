<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
  --border:#d9d9d9;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
  --border:#334155;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 64px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
}

.container{width:min(940px,92%);}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.section-title{
  font-size:14px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:10px;
}

button,input,select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid var(--border);
  margin:3px;
  background:var(--card);
  color:var(--text);
  font:inherit;
}

button{cursor:pointer;}
button:hover{background:var(--accent);color:#fff;}

.hidden{display:none !important;}

.verse-ref{
  font-size:18px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:8px;
}

.verse-text{
  font-size:19px;
  line-height:1.7;
}

.star{
  font-size:26px;
  cursor:pointer;
  user-select:none;
  margin-top:10px;
}

.footer-left{
  position:fixed;
  left:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
}

.footer-right{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:11px;
  color:var(--muted);
  cursor:pointer;
}

.result-card{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  margin-top:10px;
  cursor:pointer;
}

.result-ref{
  font-weight:700;
  color:var(--accent);
  margin-bottom:6px;
}

.simple-text{
  font-size:16px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Verse</div>
  <div id="verse">Loading...</div>
  <div class="star" id="star" onclick="toggleFav()">☆</div>
</div>

<!-- CONTROLS -->
<div class="card">
  <button onclick="daily()">Daily</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="toggleSearch()">Search</button>
  <button onclick="toggleFavorites()">Favorites</button>

  <select id="translation" onchange="setTranslation(this.value)"></select>

  <select onchange="setTheme(this.value)">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>
</div>

<!-- SEARCH -->
<div class="card hidden" id="searchBox">
  <div class="section-title">Search</div>
  <input id="q" placeholder="Search..." oninput="instantSearch()">
  <button onclick="clearSearch()">Clear Search</button>
  <div id="results"></div>
</div>

<!-- FAVORITES -->
<div class="card hidden" id="favBox">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div class="simple-text">Walk faithfully today.</div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div class="simple-text">What is God showing you?</div>
</div>

</div>

<div class="footer-left">Unshaken</div>

<div class="footer-right"
onclick="alert('As a family, we seek to follow Jesus faithfully, honor God in all we do, and love one another with patience and grace.')">
est. 2013 — The Parker Family
</div>

<script>

/* ================= STATE ================= */

let canon={};
let keys=[];
let currentKey=null;
let favs=JSON.parse(localStorage.getItem("fav")||"[]");

/* ================= LOAD ================= */

async function loadAll(){
  const txt=await(await fetch("translations/web.txt")).text();

  txt.split("\n").forEach(l=>{
    l=l.trim(); if(!l) return;

    const p=l.split(/\s+/);
    const i=p.findIndex(x=>x.includes(":"));
    if(i<0) return;

    const key=p.slice(0,i).join(" ")+" "+p[i];
    const text=p.slice(i+1).join(" ");

    canon[key]={text};
  });

  keys=Object.keys(canon);
  daily();
}

/* ================= VERSE ================= */

function show(key){
  currentKey=key;

  document.getElementById("verse").innerHTML=`
    <div class="verse-ref">${key}</div>
    <div class="verse-text">${canon[key].text}</div>
  `;

  updateStar();
}

function randomVerse(){
  show(keys[Math.floor(Math.random()*keys.length)]);
}

/* ================= DAILY (FIXED PERSISTENT) ================= */

function daily(){
  const today = new Date().toDateString();

  const savedKey = localStorage.getItem("daily_key");
  const savedDate = localStorage.getItem("daily_date");

  if(savedKey && savedDate === today && canon[savedKey]){
    show(savedKey);
    return;
  }

  let hash = 0;
  for(let i=0;i<today.length;i++){
    hash = (hash * 31 + today.charCodeAt(i)) >>> 0;
  }

  const key = keys[hash % keys.length];

  localStorage.setItem("daily_key", key);
  localStorage.setItem("daily_date", today);

  show(key);
}

/* ================= FAVORITES ================= */

function toggleFav(){
  if(!currentKey) return;

  const i=favs.indexOf(currentKey);
  if(i>-1) favs.splice(i,1);
  else favs.push(currentKey);

  localStorage.setItem("fav",JSON.stringify(favs));
  updateStar();
  renderFav();
}

function updateStar(){
  document.getElementById("star").innerText=
    favs.includes(currentKey)?"★":"☆";
}

function toggleFavorites(){
  document.getElementById("favBox").classList.toggle("hidden");
  renderFav();
}

function renderFav(){
  const box=document.getElementById("favList");

  if(!favs.length){
    box.innerHTML="No favorites yet.";
    return;
  }

  box.innerHTML=favs.map(k=>`
    <div class="result-card" onclick="show('${k}')">
      <div class="result-ref">${k}</div>
      <div class="verse-text">${canon[k]?.text||""}</div>
    </div>
  `).join("");
}

/* ================= SEARCH ================= */

function toggleSearch(){
  document.getElementById("searchBox").classList.toggle("hidden");
}

function instantSearch(){
  const q=document.getElementById("q").value.toLowerCase();
  const results=document.getElementById("results");

  if(!q){results.innerHTML="";return;}

  const matches=keys.filter(k=>
    (k+" "+canon[k].text).toLowerCase().includes(q)
  ).slice(0,40);

  results.innerHTML=matches.map(k=>`
    <div class="result-card" onclick="show('${k}')">
      <div class="result-ref">${k}</div>
      <div class="verse-text">${canon[k].text.slice(0,220)}</div>
    </div>
  `).join("");
}

function clearSearch(){
  document.getElementById("q").value="";
  document.getElementById("results").innerHTML="";
}

/* ================= TRANSLATION ================= */

function setTranslation(){}

/* ================= THEME ================= */

function setTheme(mode){
  const dark=
    mode==="dark"||
    (mode==="system"&&
      window.matchMedia("(prefers-color-scheme: dark)").matches);

  document.documentElement.setAttribute(
    "data-theme",
    dark?"dark":"light"
  );
}

/* ================= INIT ================= */

window.onload=()=>{
  setTheme("system");
  loadAll();
};

</script>

</body>
</html>
