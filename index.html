<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 40px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:14px;
  font-weight:700;
  z-index:1000;
}

.container{
  width:min(850px,92%);
}

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-top:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.verse{
  font-size:1.25rem;
  line-height:1.7;
  margin:14px 0;
  min-height:80px;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

button,select{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
  font-size:.95rem;
}

button:hover{
  background:var(--accent);
  color:#fff;
}

.panel{
  display:none;
  max-height:260px;
  overflow:auto;
}

.list-item{
  padding:8px 0;
  border-bottom:1px solid rgba(0,0,0,.08);
  cursor:pointer;
}

.list-item:last-child{
  border-bottom:none;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.small{
  font-size:.9rem;
  color:var(--muted);
}

.star-btn{
  border:none;
  background:transparent;
  font-size:1.4rem;
  cursor:pointer;
  padding:0;
}

.section-title{
  font-weight:700;
  margin-bottom:8px;
}

.streak{
  margin-top:10px;
  font-weight:700;
}

.footer{
  margin-top:16px;
  text-align:center;
  font-size:.8rem;
  color:var(--muted);
}
</style>
</head>
<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="row">
    <div class="section-title">Today’s Verse</div>
    <button id="mainStar" class="star-btn" onclick="toggleFavorite(currentRef)">☆</button>
  </div>

  <div id="verse" class="verse">Loading...</div>
  <div id="ref" class="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">
  <div class="controls">

    <select id="translation" onchange="reloadCurrentVerse()">
      <option value="kjv">KJV</option>
      <option value="web" selected>WEB</option>
      <option value="esv">ESV</option>
    </select>

    <select id="focusArea" onchange="focusAreaChange()">
      <option value="daily">Daily Verse</option>
      <option value="peace">Peace</option>
      <option value="strength">Strength</option>
      <option value="hope">Hope</option>
      <option value="anxiety">Anxiety</option>
      <option value="faith">Faith</option>
      <option value="love">Love</option>
      <option value="wisdom">Wisdom</option>
    </select>

    <button onclick="randomVerse()">Random</button>
    <button onclick="encouragement()">Encourage Me</button>
    <button onclick="toggleDark()">Dark Mode</button>
    <button onclick="toggleFavorites()">Favorites</button>
    <button onclick="toggleHistory()">History</button>

  </div>

  <div class="streak">
    🔥 Streak: <span id="streakCount">0</span> days
  </div>
  <div id="streakMessage" class="small"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

<!-- FAVORITES -->
<div class="card panel" id="favBox">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<!-- HISTORY -->
<div class="card panel" id="historyBox">
  <div class="row">
    <div class="section-title">History</div>
    <button onclick="clearHistory()">Clear</button>
  </div>
  <div id="historyList"></div>
</div>

<!-- MISSION -->
<div class="card">
  <div class="section-title">Family Mission Statement</div>
  <div id="missionText"></div>
</div>

<div class="footer">The Parker Family</div>

</div>

<script>
/* =========================
   INTERNAL VERSION
========================= */
const APP_VERSION = "1.2.0";

/* =========================
   STATE
========================= */
let currentRef = "";
let currentText = "";

let favorites = JSON.parse(localStorage.getItem("unshaken_favs") || "[]");
let history = JSON.parse(localStorage.getItem("unshaken_history") || "[]");

let streak;
try{
  const raw = JSON.parse(localStorage.getItem("unshaken_streak"));
  streak = {
    count:Number(raw?.count) || 0,
    lastDate:raw?.lastDate || null
  };
}catch{
  streak = {count:0,lastDate:null};
}

/* =========================
   ROTATING FOCUS DATA
========================= */
const focusPools = {
  peace: [
    {
      ref:"John 14:27",
      prayer:"Jesus, calm my heart and fill me with Your peace today.",
      reflection:"What is trying to steal my peace right now?"
    },
    {
      ref:"Philippians 4:7",
      prayer:"Lord, guard my heart and mind with Your peace.",
      reflection:"Where do I need peace beyond understanding?"
    },
    {
      ref:"Psalm 29:11",
      prayer:"Father, strengthen me and bless me with peace.",
      reflection:"How can I rest in God's strength today?"
    }
  ],

  strength: [
    {
      ref:"Isaiah 41:10",
      prayer:"Lord, give me courage and strength for today.",
      reflection:"Where do I need to stop fearing?"
    },
    {
      ref:"Philippians 4:13",
      prayer:"Jesus, remind me I can endure through You.",
      reflection:"What challenge needs God's strength today?"
    },
    {
      ref:"Psalm 46:1",
      prayer:"God, be my refuge and strength right now.",
      reflection:"Where do I need help today?"
    }
  ],

  hope: [
    {
      ref:"Jeremiah 29:11",
      prayer:"Lord, renew my hope in Your future for me.",
      reflection:"Where do I need to trust God's plan?"
    },
    {
      ref:"Romans 15:13",
      prayer:"Fill me with joy and hope through faith.",
      reflection:"What would living hopefully look like today?"
    },
    {
      ref:"Lamentations 3:22-23",
      prayer:"Thank You for new mercy this morning.",
      reflection:"How can I receive today's fresh start?"
    }
  ],

  anxiety: [
    {
      ref:"Philippians 4:6",
      prayer:"God, I release my worries into Your hands.",
      reflection:"What burden am I carrying unnecessarily?"
    },
    {
      ref:"1 Peter 5:7",
      prayer:"Lord, help me cast every care on You.",
      reflection:"What anxiety do I need to surrender?"
    },
    {
      ref:"Matthew 6:34",
      prayer:"Father, help me focus on today, not tomorrow's fear.",
      reflection:"Am I living in tomorrow instead of today?"
    }
  ],

  faith: [
    {
      ref:"Hebrews 11:1",
      prayer:"Lord, grow my faith in unseen things.",
      reflection:"Where am I invited to trust?"
    },
    {
      ref:"Proverbs 3:5-6",
      prayer:"Help me trust You with all my heart.",
      reflection:"What am I leaning on besides God?"
    },
    {
      ref:"Mark 9:23",
      prayer:"Increase my belief and confidence in You.",
      reflection:"Where do I doubt God's ability?"
    }
  ],

  love: [
    {
      ref:"1 Corinthians 13:4",
      prayer:"Teach me patience and kindness today.",
      reflection:"Who needs grace from me right now?"
    },
    {
      ref:"John 13:34",
      prayer:"Help me love others as You love me.",
      reflection:"What would sacrificial love look like today?"
    },
    {
      ref:"Romans 12:10",
      prayer:"Make me devoted and honoring toward others.",
      reflection:"How can I put someone first today?"
    }
  ],

  wisdom: [
    {
      ref:"James 1:5",
      prayer:"Father, give me wisdom generously today.",
      reflection:"What decision needs God's wisdom?"
    },
    {
      ref:"Proverbs 3:13",
      prayer:"Help me treasure wisdom over convenience.",
      reflection:"What wise path am I avoiding?"
    },
    {
      ref:"Psalm 111:10",
      prayer:"Teach me reverence that leads to wisdom.",
      reflection:"How can honoring God guide me today?"
    }
  ]
};

/* =========================
   INIT
========================= */
window.onload = () => {
  document.documentElement.setAttribute(
    "data-theme",
    localStorage.getItem("theme") || "light"
  );

  document.getElementById("missionText").innerText =
    localStorage.getItem("unshaken_mission") ||
    "We seek to follow Jesus faithfully, love one another well, and live each day with purpose.";

  renderFavorites();
  renderHistory();
  updateStreak();
  renderStreak();
  fetchDaily();
};

/* =========================
   DATE HELPERS
========================= */
function getDayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function getDayIndex(length){
  const now = new Date();
  const start = new Date(now.getFullYear(),0,0);
  const diff = now - start;
  const day = Math.floor(diff / 86400000);
  return day % length;
}

/* =========================
   STREAK
========================= */
function updateStreak(){
  const today = getDayKey();

  if(streak.lastDate === today) return;

  const y = new Date();
  y.setDate(y.getDate()-1);
  const yKey = `${y.getFullYear()}-${y.getMonth()+1}-${y.getDate()}`;

  if(streak.lastDate === yKey) streak.count++;
  else streak.count = 1;

  streak.lastDate = today;

  localStorage.setItem("unshaken_streak", JSON.stringify(streak));
  renderStreak();
}

function renderStreak(){
  const c = Number(streak.count) || 0;
  document.getElementById("streakCount").innerText = c;

  let msg = "Start today.";
  if(c >= 3) msg = "Keep going.";
  if(c >= 7) msg = "Momentum building.";
  if(c >= 14) msg = "Strong discipline.";
  if(c >= 30) msg = "Deep consistency.";

  document.getElementById("streakMessage").innerText = msg;
}

/* =========================
   VERSES
========================= */
async function fetchDaily(){
  try{
    const r = await fetch("https://beta.ourmanna.com/api/v1/get/?format=json&order=daily");
    const d = await r.json();
    loadVerse(d?.verse?.details?.reference || "John 14:27", true);
  }catch{
    loadVerse("John 14:27", true);
  }
}

async function loadVerse(ref, autoDevotional=false){
  try{
    const tr = document.getElementById("translation").value;

    const r = await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${tr}`);
    const d = await r.json();

    currentRef = ref;
    currentText = (d.text || "").trim();

    document.getElementById("verse").innerText = currentText || "Verse unavailable.";
    document.getElementById("ref").innerText = ref;

    addToHistory(ref);
    updateMainStar();

    if(autoDevotional){
      autoDetectVerseDevotional(ref,currentText);
    }

  }catch{
    document.getElementById("verse").innerText = "Verse unavailable.";
    document.getElementById("ref").innerText = ref;
  }
}

function reloadCurrentVerse(){
  if(currentRef) loadVerse(currentRef,false);
}

/* =========================
   FOCUS AREA ROTATION
========================= */
function focusAreaChange(){
  const area = document.getElementById("focusArea").value;

  if(area === "daily"){
    fetchDaily();
    return;
  }

  const pool = focusPools[area];
  const item = pool[getDayIndex(pool.length)];

  document.getElementById("prayer").innerText = item.prayer;
  document.getElementById("reflection").innerText = item.reflection;

  loadVerse(item.ref,false);
}

/* =========================
   DAILY AUTO DEVOTIONAL
========================= */
function autoDetectVerseDevotional(ref,text){
  const content = (ref + " " + text).toLowerCase();

  if(content.includes("peace")){
    setFocusByArea("peace");
    return;
  }

  if(content.includes("fear") || content.includes("strong")){
    setFocusByArea("strength");
    return;
  }

  if(content.includes("hope") || content.includes("future")){
    setFocusByArea("hope");
    return;
  }

  if(content.includes("anxious") || content.includes("worry")){
    setFocusByArea("anxiety");
    return;
  }

  if(content.includes("faith")){
    setFocusByArea("faith");
    return;
  }

  if(content.includes("love")){
    setFocusByArea("love");
    return;
  }

  if(content.includes("wisdom")){
    setFocusByArea("wisdom");
    return;
  }

  document.getElementById("prayer").innerText =
    "Lord, speak to me through Your Word today.";

  document.getElementById("reflection").innerText =
    "What is God inviting me to notice today?";
}

function setFocusByArea(area){
  const pool = focusPools[area];
  const item = pool[getDayIndex(pool.length)];

  document.getElementById("prayer").innerText = item.prayer;
  document.getElementById("reflection").innerText = item.reflection;
}

/* =========================
   FAVORITES
========================= */
function isFavorite(ref){
  return favorites.some(f => f.ref === ref);
}

function toggleFavorite(ref){
  if(!ref) return;

  if(isFavorite(ref)){
    favorites = favorites.filter(f => f.ref !== ref);
  }else{
    favorites.push({ref,text:currentText});
  }

  localStorage.setItem("unshaken_favs", JSON.stringify(favorites));
  renderFavorites();
  updateMainStar();
}

function renderFavorites(){
  const el = document.getElementById("favList");
  el.innerHTML = "";

  if(!favorites.length){
    el.innerHTML = `<div class="small">No favorites yet.</div>`;
    return;
  }

  favorites.forEach(f=>{
    const row = document.createElement("div");
    row.className = "row list-item";

    const t = document.createElement("div");
    t.innerText = f.ref;
    t.onclick = ()=>loadVerse(f.ref,false);

    const s = document.createElement("button");
    s.className = "star-btn";
    s.innerText = "⭐";
    s.onclick = ()=>toggleFavorite(f.ref);

    row.appendChild(t);
    row.appendChild(s);
    el.appendChild(row);
  });
}

function updateMainStar(){
  document.getElementById("mainStar").innerText =
    isFavorite(currentRef) ? "⭐" : "☆";
}

function toggleFavorites(){
  const b = document.getElementById("favBox");
  b.style.display = b.style.display === "block" ? "none" : "block";
}

/* =========================
   HISTORY
========================= */
function addToHistory(ref){
  history = history.filter(h => h.ref !== ref);
  history.unshift({ref});
  history = history.slice(0,50);

  localStorage.setItem("unshaken_history", JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  const el = document.getElementById("historyList");
  el.innerHTML = "";

  if(!history.length){
    el.innerHTML = `<div class="small">No history yet.</div>`;
    return;
  }

  history.forEach(h=>{
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerText = h.ref;
    div.onclick = ()=>loadVerse(h.ref,false);
    el.appendChild(div);
  });
}

function toggleHistory(){
  const b = document.getElementById("historyBox");
  b.style.display = b.style.display === "block" ? "none" : "block";
}

function clearHistory(){
  if(!confirm("Clear history?")) return;
  history = [];
  localStorage.removeItem("unshaken_history");
  renderHistory();
}

/* =========================
   CONTROLS
========================= */
function toggleDark(){
  const t = document.documentElement.getAttribute("data-theme");
  const next = t === "dark" ? "light" : "dark";

  document.documentElement.setAttribute("data-theme",next);
  localStorage.setItem("theme",next);
}

function encouragement(){
  loadVerse("Isaiah 41:10",true);
}

function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
    .then(r=>r.json())
    .then(d=>{
      const v = d[0];
      loadVerse(`${v.bookname} ${v.chapter}:${v.verse}`,true);
    })
    .catch(()=>loadVerse("Romans 8:28",true));
}
</script>

</body>
</html>
