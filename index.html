<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unshaken</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --text: #111;
      --card: #ffffff;
      --accent: #2b6cb0;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --text: #e2e8f0;
      --card: #1e293b;
      --accent: #60a5fa;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding-top: 64px;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      width: min(700px, 92%);
      background: var(--card);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .verse {
      font-size: 20px;
      line-height: 1.6;
      margin: 20px 0;
    }

    .ref {
      font-weight: bold;
      color: var(--accent);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    select, button {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      cursor: pointer;
      background: transparent;
      color: var(--text);
    }

    button {
      border: 1px solid var(--accent);
    }

    button:hover {
      background: var(--accent);
      color: white;
    }
  </style>
</head>
<body>
  <div style="position:fixed;top:0;left:0;width:100%;background:var(--accent);color:white;text-align:center;padding:12px 10px;font-weight:700;letter-spacing:.5px;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.15);">Unshaken Bible Verse of the Day</div>
  <div class="container">
    <h1>Unshaken</h1>
    <div id="verse" class="verse">Loading verse...</div>
    <div id="ref" class="ref"></div>

    <div id="extras" style="margin-top:15px;padding:12px;border-radius:12px;background:rgba(255,255,255,.06)">
      <div id="prayer" style="margin-bottom:10px;font-size:14px;"></div>
      <div id="reflection" style="font-size:14px;font-style:italic;"></div>
    </div>

    <div class="controls">
      <select id="translation">
        <option value="kjv">KJV</option>
        <option value="web">WEB</option>
        <option value="esv">ESV</option>
      </select>
      <select id="topicSelect">
        <option value="">Topic Verse</option>
        <option value="peace">Peace</option>
        <option value="strength">Strength</option>
        <option value="hope">Hope</option>
        <option value="anxiety">Anxiety</option>
      </select>

      <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
      <button onclick="randomVerse()">Random Verse</button>
      <button onclick="shareAsImage()">Verse Image</button>
      <button onclick="encouragementMode()">Encouragement</button>
      <button onclick="shareVerse()">Share</button>
    </div>
  </div>

<script>
let currentRef = null;
const prayers=["Lord, guide my heart today.","Father, give me strength and peace.","Jesus, help me trust You today."];
const reflections=["How can this verse shape your choices today?","What is God reminding you through this verse?","Who could be encouraged by this message today?"];
let currentVerse = null;

function setThemeByTime() {
  const hour = new Date().getHours();
  const isDark = hour >= 18 || hour < 6;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
}

async function fetchDailyVerse() {
  try {
    const res = await fetch('https://beta.ourmanna.com/api/v1/get/?format=json&order=daily');
    const data = await res.json();

    const verse = data.verse.details.text;
    const ref = data.verse.details.reference;

    currentRef = ref;
    document.getElementById('ref').textContent = ref;

    loadTranslation(ref);
  } catch (e) {
    document.getElementById('verse').textContent = 'Failed to load verse.';
  }
}

async function loadTranslation(ref) {
  const version = document.getElementById('translation').value;
  try {
    const url = `https://bible-api.com/${encodeURIComponent(ref)}?translation=${version}`;
    const res = await fetch(url);
    const data = await res.json();

    currentVerse = data.text;
    document.getElementById('verse').textContent = data.text;
  } catch (e) {
    document.getElementById('verse').textContent = 'Could not load translation.';
  }
}

function toggleDarkMode() {
  const current = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}

async function setExtras(){document.getElementById('prayer').textContent='Prayer: '+prayers[Math.floor(Math.random()*prayers.length)];document.getElementById('reflection').textContent=reflections[Math.floor(Math.random()*reflections.length)];}

async function randomVerse(){fetch('https://labs.bible.org/api/?passage=random&type=json').then(r=>r.json()).then(d=>{const v=d[0];currentRef=v.bookname+' '+v.chapter+':'+v.verse;currentVerse=v.text;document.getElementById('ref').textContent=currentRef;document.getElementById('verse').textContent=currentVerse;setExtras();});}

function topicSearch(){const t=document.getElementById('topicSelect').value;if(!t)return;const map={peace:'John 14:27',strength:'Philippians 4:13',hope:'Jeremiah 29:11',anxiety:'Philippians 4:6'};currentRef=map[t];document.getElementById('ref').textContent=currentRef;loadTranslation(currentRef);setExtras();}

function encouragementMode(){currentRef='Isaiah 41:10';document.getElementById('ref').textContent=currentRef;loadTranslation(currentRef);setExtras();}

function shareAsImage(){alert('Next upgrade: generate styled share image for this verse.');}

function shareVerse() {
  const text = `${currentRef}\n\n${currentVerse}`;

  if (navigator.share) {
    await navigator.share({ title: 'Unshaken Verse', text });
  } else {
    navigator.clipboard.writeText(text);
    alert('Copied to clipboard');
  }
}

document.getElementById('translation').addEventListener('change', () => {
  if (currentRef) loadTranslation(currentRef);
});

setThemeByTime();
setExtras();
fetchDailyVerse();

document.getElementById('topicSelect').addEventListener('change',topicSearch);
</script>
  <div style="position:fixed;bottom:8px;right:10px;font-size:10px;opacity:.65;letter-spacing:.3px;z-index:1000;">The Parker Family</div>
</body>
</html>
