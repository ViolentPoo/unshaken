<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
  --border:#d9d9d9;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
  --border:#334155;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 64px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
}

.container{width:min(940px,92%);}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.section-title{
  font-size:14px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:10px;
}

button,input,select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid var(--border);
  margin:3px;
  background:var(--card);
  color:var(--text);
  font:inherit;
}

button{cursor:pointer;}
button:hover{background:var(--accent);color:#fff;}

.hidden{display:none !important;}

/* VERSE */
.star{
  font-size:26px;
  cursor:pointer;
  user-select:none;
  margin-top:8px;
}

/* SEARCH */
.result-card{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  margin-top:10px;
  cursor:pointer;
}

.result-ref{
  font-weight:700;
  color:var(--accent);
  margin-bottom:6px;
}

/* FAVORITES */
.fav-item{
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Verse</div>
  <div id="verse">Loading...</div>
  <div class="star" id="star" onclick="toggleFav()">☆</div>
</div>

<!-- CONTROLS -->
<div class="card">
  <button onclick="daily()">Daily</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="toggleSearch()">Search</button>
  <button onclick="toggleFavorites()">Favorites</button>

  <select id="translation" onchange="setTranslation(this.value)"></select>

  <select onchange="setTheme(this.value)">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>
</div>

<!-- SEARCH -->
<div class="card hidden" id="searchBox">
  <div class="section-title">Search</div>

  <input id="q" oninput="instantSearch()" placeholder="Search...">
  <button onclick="clearSearch()">Clear Search</button>

  <div id="results"></div>
</div>

<!-- FAVORITES -->
<div class="card hidden" id="favBox">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer">Walk faithfully today.</div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection">What is God showing you?</div>
</div>

</div>

<script>

/* ================= TRANSLATIONS ================= */

const TRANSLATIONS={
  web:"World English Bible (WEB)",
  kjv:"King James Version (KJV)",
  asv:"American Standard Version (ASV)",
  akjv:"American King James Version (AKJV)",
  cpdv:"Catholic Public Domain Version (CPDV)"
};

let currentTranslation="web";
let canon={};
let keys=[];
let currentKey=null;
let favs=JSON.parse(localStorage.getItem("fav")||"[]");

/* ================= LOAD ================= */

async function loadAll(){
  canon={};

  for(const t in TRANSLATIONS){
    const txt=await(await fetch(`translations/${t}.txt`)).text();

    txt.split("\n").forEach(line=>{
      line=line.trim();
      if(!line) return;

      const p=line.split(/\s+/);
      const i=p.findIndex(x=>x.includes(":"));
      if(i<0) return;

      const key=p.slice(0,i).join(" ")+" "+p[i];
      const verse=p.slice(i+1).join(" ");

      if(!canon[key]){
        canon[key]={web:"",kjv:"",asv:"",akjv:"",cpdv:""};
      }

      canon[key][t]=verse;
    });
  }

  keys=Object.keys(canon);
  buildDropdown();
  daily();
}

/* ================= DROPDOWN ================= */

function buildDropdown(){
  const sel=document.getElementById("translation");

  sel.innerHTML=Object.keys(TRANSLATIONS).map(k=>
    `<option value="${k}" ${k===currentTranslation?"selected":""}>
      ${TRANSLATIONS[k]}
    </option>`
  ).join("");
}

/* ================= SHOW ================= */

function show(key){
  if(!canon[key]) return;

  currentKey=key;

  document.getElementById("verse").innerHTML=`
    <div style="font-weight:700;color:#2b6cb0">${key}</div>
    <div style="font-size:18px;line-height:1.6">
      ${canon[key][currentTranslation] || canon[key].web}
    </div>
  `;

  updateStar();
}

/* ================= CORE ================= */

function daily(){
  if(!keys.length) return;
  show(keys[Math.floor(Math.random()*keys.length)]);
}

function randomVerse(){
  if(!keys.length) return;
  show(keys[Math.floor(Math.random()*keys.length)]);
}

/* ================= TRANSLATION ================= */

function setTranslation(t){
  currentTranslation=t;
  if(currentKey) show(currentKey);
}

/* ================= SEARCH ================= */

function toggleSearch(){
  document.getElementById("searchBox").classList.toggle("hidden");
}

function instantSearch(){
  const q=document.getElementById("q").value.toLowerCase();

  const matches=keys.filter(k=>{
    const all=Object.values(canon[k]).join(" ").toLowerCase();
    return all.includes(q);
  }).slice(0,40);

  document.getElementById("results").innerHTML=
    matches.map(k=>`
      <div class="result-card" onclick="show('${k}')">
        <div class="result-ref">${k}</div>
        <div>${canon[k][currentTranslation]||canon[k].web}</div>
      </div>
    `).join("");
}

function clearSearch(){
  document.getElementById("q").value="";
  document.getElementById("results").innerHTML="";
}

/* ================= FAVORITES (RESTORED) ================= */

function toggleFav(){
  if(!currentKey)return;

  const i=favs.indexOf(currentKey);
  if(i>-1)favs.splice(i,1);
  else favs.push(currentKey);

  localStorage.setItem("fav",JSON.stringify(favs));
  updateStar();
  renderFav();
}

function updateStar(){
  document.getElementById("star").innerText=
    favs.includes(currentKey)?"★":"☆";
}

function toggleFavorites(){
  document.getElementById("favBox").classList.toggle("hidden");
  renderFav();
}

function renderFav(){
  const box=document.getElementById("favList");

  if(!favs.length){
    box.innerHTML="No favorites yet.";
    return;
  }

  box.innerHTML=favs.map(k=>`
    <div class="fav-item" onclick="show('${k}')">
      <div class="result-ref">${k}</div>
      <div>${canon[k]?.web||""}</div>
    </div>
  `).join("");
}

/* ================= THEME ================= */

function setTheme(m){
  document.documentElement.setAttribute(
    "data-theme",
    m==="dark"?"dark":"light"
  );
}

/* ================= INIT ================= */

window.onload=loadAll;

</script>

</body>
</html>
