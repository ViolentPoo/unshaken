<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken v1.7.1</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#fff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:70px 0 50px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:white;
  text-align:center;
  padding:12px;
  font-weight:700;
}

.container{ width:min(900px,92%); }

.card{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
}

.section-title{
  font-family:Georgia;
  font-weight:700;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:10px;
}

input, button{
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
  margin:3px;
}

button:hover{
  background:var(--accent);
  color:white;
  cursor:pointer;
}

.hidden{ display:none; }

.result{
  padding:8px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}

.result:hover{
  background:rgba(0,0,0,0.05);
}

.small{
  font-size:12px;
  color:var(--muted);
}

.pagination{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.footer{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Engine v1.7.1</div>

<div class="container">

<!-- SEARCH -->
<div class="card">
  <div class="section-title">Bible Search</div>

  <input id="searchInput" placeholder="Search (e.g. love, faith, hope)" />

  <button onclick="runSearch()">Search</button>
  <button onclick="clearSearch()">Clear</button>

  <div id="searchMeta" class="small"></div>

  <div id="searchResults"></div>

  <div class="pagination">
    <button onclick="prevPage()">Prev</button>
    <button onclick="nextPage()">Next</button>
  </div>
</div>

<!-- VERSE VIEW -->
<div class="card">
  <div class="section-title">Current Verse</div>
  <div id="verse"></div>
  <div id="ref" style="color:var(--accent);font-weight:700;margin-top:6px;"></div>
</div>

</div>

<div class="footer">est. 2013 — The Parker Family</div>

<script>

/* ================= BIBLE INDEX ================= */

let bibleIndex = [];
let searchResults = [];
let currentPage = 0;
const pageSize = 25;

/* ================= LOAD BIBLE FILE ================= */

async function loadBible(){
  const res = await fetch("web.txt");
  const text = await res.text();

  bibleIndex = text
    .split("\n")
    .filter(Boolean)
    .map(line => {
      const firstSpace = line.indexOf(" ");
      return {
        ref: line.slice(0, firstSpace),
        text: line.slice(firstSpace + 1)
      };
    });

  console.log("Bible loaded:", bibleIndex.length, "verses");
}

/* ================= SEARCH ================= */

function runSearch(){
  const q = document.getElementById("searchInput").value.trim().toLowerCase();

  if(!q){
    document.getElementById("searchResults").innerHTML =
      "<div class='small'>Type a keyword like 'love' or 'faith'</div>";
    return;
  }

  searchResults = bibleIndex.filter(v =>
    v.text.toLowerCase().includes(q)
  );

  currentPage = 0;

  renderPage();

  document.getElementById("searchMeta").innerText =
    `Found ${searchResults.length} results`;
}

/* ================= PAGINATION ================= */

function renderPage(){
  const box = document.getElementById("searchResults");
  box.innerHTML = "";

  const start = currentPage * pageSize;
  const pageItems = searchResults.slice(start, start + pageSize);

  if(pageItems.length === 0){
    box.innerHTML = "<div class='small'>No results</div>";
    return;
  }

  pageItems.forEach(v=>{
    const div = document.createElement("div");
    div.className = "result";
    div.innerHTML = `<strong>${v.ref}</strong><br><span class="small">${v.text}</span>`;

    div.onclick = () => showVerse(v);

    box.appendChild(div);
  });
}

function nextPage(){
  if((currentPage+1)*pageSize < searchResults.length){
    currentPage++;
    renderPage();
  }
}

function prevPage(){
  if(currentPage > 0){
    currentPage--;
    renderPage();
  }
}

/* ================= CLEAR ================= */

function clearSearch(){
  document.getElementById("searchInput").value = "";
  document.getElementById("searchResults").innerHTML = "";
  document.getElementById("searchMeta").innerText = "";
  searchResults = [];
  currentPage = 0;
}

/* ================= VERSE DISPLAY ================= */

function showVerse(v){
  document.getElementById("verse").innerText = v.text;
  document.getElementById("ref").innerText = v.ref;
}

/* ================= INIT ================= */

window.onload = async () => {
  await loadBible();
};

</script>

</body>
</html>
