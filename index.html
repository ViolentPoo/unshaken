<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#fff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 40px;
  display:flex;
  justify-content:center;
  transition:background 0.3s,color 0.3s;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:var(--accent);
  color:white;
  text-align:center;
  padding:14px;
  font-weight:700;
}

.container{ width:min(850px,92%); }

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-top:14px;
}

.section-title{
  font-family:Georgia;
  font-weight:700;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:8px;
}

.verse-line{
  font-size:1.15rem;
  line-height:1.6;
}

.ref{
  margin-top:10px;
  color:var(--accent);
  font-weight:700;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

button{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:white;
}

.hidden{ display:none; }

.footer{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="topbar">Unshaken</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Verse</div>

  <div id="verse"></div>
  <div id="ref" class="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">

<div class="controls">

  <button onclick="loadDaily()">Daily</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="encourageMe()">Encourage Me</button>

</div>

</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

</div>

<div class="footer">
  est. 2013 — The Parker Family
</div>

<script>

/* ================= MULTI-LINE VERSES ================= */

const verses = [
  {
    ref:"John 3:16",
    text:[
      "For God so loved the world",
      "that he gave his one and only Son",
      "that whoever believes in him shall not perish but have eternal life"
    ]
  },
  {
    ref:"Psalm 23:1-3",
    text:[
      "The Lord is my shepherd, I lack nothing",
      "He makes me lie down in green pastures",
      "He restores my soul"
    ]
  },
  {
    ref:"Isaiah 41:10",
    text:[
      "Do not fear, for I am with you",
      "Do not be dismayed, for I am your God",
      "I will strengthen you and help you"
    ]
  },
  {
    ref:"Philippians 4:13",
    text:[
      "I can do all things",
      "through Christ who strengthens me"
    ]
  },
  {
    ref:"Romans 8:28",
    text:[
      "And we know that in all things",
      "God works for the good of those who love him",
      "who have been called according to his purpose"
    ]
  }
];

/* ================= AUTO THEME DETECTION ================= */

function detectTheme(textArr){
  const t = textArr.join(" ").toLowerCase();

  const score = {
    love:0,
    peace:0,
    strength:0,
    hope:0
  };

  if(t.includes("love")) score.love += 2;
  if(t.includes("heart")) score.love += 1;

  if(t.includes("fear") || t.includes("anxious")) score.peace += 2;
  if(t.includes("peace")) score.peace += 2;

  if(t.includes("strength") || t.includes("help")) score.strength += 2;
  if(t.includes("do not fear")) score.peace += 1;

  if(t.includes("hope") || t.includes("eternal")) score.hope += 2;
  if(t.includes("promise")) score.hope += 1;

  let best="peace";
  let max=0;

  for(const k in score){
    if(score[k] > max){
      max = score[k];
      best = k;
    }
  }

  return best;
}

/* ================= PRAYER + REFLECTION ================= */

const prayerMap = {
  love:"Help me reflect Your love in my actions today.",
  peace:"Bring peace to my heart where fear tries to enter.",
  strength:"Give me strength when I feel weak or overwhelmed.",
  hope:"Renew my hope in Your promises today."
};

const reflectionMap = {
  love:"How can I love others more intentionally today?",
  peace:"What is currently disturbing my peace?",
  strength:"Where do I need God's strength right now?",
  hope:"What promise am I holding onto today?"
};

/* ================= STATE ================= */

let current=null;

/* ================= CORE ================= */

function setVerse(v){
  current=v;

  renderVerse(v);
  updateDevotion(v);
}

/* ================= RENDER VERSE ================= */

function renderVerse(v){
  const container=document.getElementById("verse");
  container.innerHTML="";

  v.text.forEach(line=>{
    const div=document.createElement("div");
    div.className="verse-line";
    div.innerText=line;
    container.appendChild(div);
  });

  document.getElementById("ref").innerText=v.ref;
}

/* ================= DEVOTION ================= */

function updateDevotion(v){
  const theme = detectTheme(v.text);

  document.getElementById("prayer").innerText =
    prayerMap[theme] ||
    "Lord, guide me through this word today.";

  document.getElementById("reflection").innerText =
    reflectionMap[theme] ||
    "What is God showing me through this verse?";
}

/* ================= DAILY ================= */

function loadDaily(){
  const d=new Date().toISOString().split("T")[0];

  let h=0;
  for(let i=0;i<d.length;i++){
    h+=d.charCodeAt(i)*(i+1);
  }

  setVerse(verses[h % verses.length]);
}

/* ================= RANDOM ================= */

function randomVerse(){
  setVerse(verses[Math.floor(Math.random()*verses.length)]);
}

/* ================= ENCOURAGE ================= */

function encourageMe(){
  setVerse(verses[Math.floor(Math.random()*verses.length)]);
}

/* ================= INIT ================= */

window.onload=()=>{
  loadDaily();
};

</script>

</body>
</html>
