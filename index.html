<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken v1.7.1</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:70px 0 50px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:white;
  text-align:center;
  padding:12px;
  font-weight:700;
}

.container{ width:min(900px,92%); }

.card{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
}

.section-title{
  font-family:Georgia;
  font-weight:700;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:10px;
}

input, button, select{
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
  margin:3px;
}

button:hover{
  background:var(--accent);
  color:white;
  cursor:pointer;
}

.hidden{ display:none; }

.result{
  padding:8px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}

.result:hover{
  background:rgba(0,0,0,0.05);
}

.star{
  font-size:22px;
  cursor:pointer;
  user-select:none;
}

.small{
  font-size:12px;
  color:var(--muted);
}

.footer{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="topbar">Unshaken v1.7.1</div>

<div class="container">

<!-- DAILY -->
<div class="card">
  <div class="section-title">Daily Verse</div>

  <div id="verse"></div>
  <div id="ref" style="color:var(--accent);font-weight:700;margin-top:6px;"></div>

  <div class="star" onclick="toggleFavorite()" id="star">☆</div>
</div>

<!-- CONTROLS -->
<div class="card">
  <button onclick="loadDaily()">Daily</button>
  <button onclick="loadRandom()">Random</button>
  <button onclick="toggleSearch()">Search</button>
  <button onclick="toggleFavorites()">Favorites</button>

  <select onchange="setTheme(this.value)">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>
</div>

<!-- SEARCH -->
<div class="card hidden" id="searchBox">
  <div class="section-title">Search Bible</div>

  <input id="searchInput" placeholder="Search (love, faith, hope)"/>
  <button onclick="runSearch()">Search</button>
  <button onclick="clearSearch()">Clear</button>

  <div id="searchMeta" class="small"></div>
  <div id="searchResults"></div>
</div>

<!-- FAVORITES -->
<div class="card hidden" id="favoritesBox">
  <div class="section-title">Favorites</div>
  <div id="favoritesList"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

</div>

<div class="footer">est. 2013 — The Parker Family</div>

<script>

/* ================= BIBLE INDEX ================= */

let bibleIndex = [];
let current = null;
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

/* ================= LOAD BIBLE ================= */

async function loadBible(){
  const res = await fetch("web.txt");
  const text = await res.text();

  bibleIndex = text.split("\n").filter(Boolean).map(line=>{
    const i = line.indexOf(" ");
    return {
      ref: line.slice(0,i),
      text: line.slice(i+1)
    };
  });

  loadDaily();
}

/* ================= DAILY SEED (HASH BASED) ================= */

function getSeed(){
  const date = new Date().toISOString().split("T")[0];
  let hash = 81213;

  for(let i=0;i<date.length;i++){
    hash = (hash * 31 + date.charCodeAt(i)) >>> 0;
  }

  return hash;
}

function loadDaily(){
  const v = bibleIndex[getSeed() % bibleIndex.length];
  setVerse(v);
}

/* ================= RANDOM (OURMANNA) ================= */

function loadRandom(){
  fetch("https://www.ourmanna.com/api/v1/get/?format=json&order=random")
  .then(r=>r.json())
  .then(d=>{
    setVerse({
      ref:d.verse.details.reference,
      text:d.verse.details.text
    });
  });
}

/* ================= VERSE DISPLAY ================= */

function setVerse(v){
  current = v;

  document.getElementById("verse").innerHTML = v.text;
  document.getElementById("ref").innerText = v.ref;

  updateStar();
  updateDevotion(v);
}

/* ================= FAVORITES ================= */

function toggleFavorite(){
  if(!current) return;

  const i = favorites.indexOf(current.ref);

  if(i > -1) favorites.splice(i,1);
  else favorites.push(current.ref);

  localStorage.setItem("fav", JSON.stringify(favorites));

  updateStar();
  renderFavorites();
}

function updateStar(){
  if(!current) return;

  document.getElementById("star").innerText =
    favorites.includes(current.ref) ? "★" : "☆";
}

function toggleFavorites(){
  document.getElementById("favoritesBox").classList.toggle("hidden");
  renderFavorites();
}

function renderFavorites(){
  document.getElementById("favoritesList").innerHTML =
    favorites.length ? favorites.join("<br>") : "No favorites yet.";
}

/* ================= SEARCH ================= */

function toggleSearch(){
  document.getElementById("searchBox").classList.toggle("hidden");
}

function runSearch(){
  const q = document.getElementById("searchInput").value.toLowerCase();
  const box = document.getElementById("searchResults");

  box.innerHTML = "";

  const results = bibleIndex.filter(v =>
    v.text.toLowerCase().includes(q)
  );

  document.getElementById("searchMeta").innerText =
    `Found ${results.length} results`;

  results.slice(0,50).forEach(v=>{
    const d = document.createElement("div");
    d.className = "result";
    d.innerHTML = `<strong>${v.ref}</strong><br>${v.text}`;
    d.onclick = ()=>setVerse(v);
    box.appendChild(d);
  });
}

function clearSearch(){
  document.getElementById("searchInput").value = "";
  document.getElementById("searchResults").innerHTML = "";
  document.getElementById("searchMeta").innerText = "";
}

/* ================= THEME ================= */

function setTheme(mode){
  if(mode === "system"){
    const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", dark ? "dark":"light");
  } else {
    document.documentElement.setAttribute("data-theme", mode);
  }
}

/* ================= PRAYER / REFLECTION ================= */

function updateDevotion(v){
  const t = v.text.toLowerCase();

  if(t.includes("fear")){
    document.getElementById("prayer").innerText = "Give me peace today.";
    document.getElementById("reflection").innerText = "What am I afraid of?";
  } else {
    document.getElementById("prayer").innerText = "Guide my steps today.";
    document.getElementById("reflection").innerText = "How can I grow today?";
  }
}

/* ================= INIT ================= */

window.onload = loadBible;

</script>

</body>
</html>
