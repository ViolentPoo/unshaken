<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
  --border:#d9d9d9;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
  --border:#334155;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 64px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
  z-index:10;
}

.container{
  width:min(940px,92%);
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.section-title{
  font-size:14px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:10px;
}

button,input,select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid var(--border);
  margin:3px;
  background:var(--card);
  color:var(--text);
  font:inherit;
}

button{cursor:pointer;}

button:hover{
  background:var(--accent);
  color:#fff;
}

input{
  width:min(420px,100%);
}

.hidden{
  display:none !important;
}

.verse-ref{
  font-size:18px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:8px;
}

.verse-text{
  font-size:19px;
  line-height:1.7;
}

.star{
  font-size:26px;
  cursor:pointer;
  user-select:none;
  margin-top:10px;
}

.small{
  font-size:12px;
  color:var(--muted);
}

.footer-left{
  position:fixed;
  left:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
}

.footer-right{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:11px;
  color:var(--muted);
  cursor:pointer;
}

.result-card{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  margin-top:10px;
  cursor:pointer;
  transition:.15s ease;
}

.result-card:hover{
  transform:translateY(-1px);
  border-color:var(--accent);
}

.result-ref{
  font-weight:700;
  color:var(--accent);
  margin-bottom:6px;
}

.result-text{
  line-height:1.55;
}

.empty{
  padding:8px 0;
  color:var(--muted);
}

.search-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Verse</div>
  <div id="verse">Loading...</div>
  <div class="star" id="star" onclick="toggleFav()">☆</div>
</div>

<!-- CONTROLS -->
<div class="card">
  <button onclick="daily()">Daily</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="toggleSearch()">Search</button>
  <button onclick="toggleFavorites()">Favorites</button>

  <select id="translation" onchange="setTranslation(this.value)"></select>

  <select onchange="setTheme(this.value)">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>
</div>

<!-- SEARCH -->
<div class="card hidden" id="searchBox">
  <div class="section-title">Search</div>

  <div class="search-row">
    <input
      id="q"
      placeholder="Type to search verses..."
      oninput="instantSearch()"
      onkeydown="handleSearchKey(event)"
    >
    <button onclick="clearSearch()">Clear Search</button>
  </div>

  <div id="results"></div>
</div>

<!-- FAVORITES -->
<div class="card hidden" id="favBox">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer">Walk faithfully today.</div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection">What is God showing you?</div>
</div>

</div>

<div class="footer-left">Unshaken</div>

<div class="footer-right"
onclick="alert('As a family, we seek to follow Jesus faithfully, honor God in all we do, and love one another with patience and grace.')">
est. 2013 — The Parker Family
</div>

<script>
/* ================= TRANSLATIONS ================= */

const TRANSLATIONS = {
  web:  { file:"translations/web.txt",  name:"World English Bible (WEB)" },
  kjv:  { file:"translations/kjv.txt",  name:"King James Version (KJV)" },
  asv:  { file:"translations/asv.txt",  name:"American Standard Version (ASV)" },
  akjv: { file:"translations/akjv.txt", name:"American King James Version (AKJV)" },
  cpdv: { file:"translations/cpdv.txt", name:"Catholic Public Domain Version (CPDV)" }
};

let currentTranslation = "web";
let canon = {};
let keys = [];
let currentKey = null;
let favs = JSON.parse(localStorage.getItem("fav") || "[]");

/* ================= THEME ================= */

function setTheme(mode){
  const dark =
    mode === "dark" ||
    (mode === "system" &&
     window.matchMedia("(prefers-color-scheme: dark)").matches);

  document.documentElement.setAttribute(
    "data-theme",
    dark ? "dark" : "light"
  );
}

/* ================= LOAD / FAST INDEX ================= */

async function loadAll(){
  canon = {};

  for(const t in TRANSLATIONS){
    const txt = await (await fetch(TRANSLATIONS[t].file)).text();

    txt.split("\n").forEach(line=>{
      line = line.trim();
      if(!line) return;

      const p = line.split(/\s+/);
      const i = p.findIndex(x => x.includes(":"));
      if(i < 0) return;

      const key = p.slice(0,i).join(" ") + " " + p[i];
      const verseText = p.slice(i+1).join(" ");

      if(!canon[key]){
        canon[key] = {
          versions:{},
          searchBlob:""
        };
      }

      canon[key].versions[t] = verseText;
    });
  }

  keys = Object.keys(canon);

  keys.forEach(k=>{
    canon[k].searchBlob = (
      k + " " +
      Object.values(canon[k].versions).join(" ")
    ).toLowerCase();
  });

  buildDropdown();
  daily();
}

/* ================= DROPDOWN ================= */

function buildDropdown(){
  const sel = document.getElementById("translation");

  sel.innerHTML = Object.keys(TRANSLATIONS).map(k =>
    `<option value="${k}" ${k===currentTranslation?"selected":""}>
      ${TRANSLATIONS[k].name}
    </option>`
  ).join("");
}

/* ================= SHOW ================= */

function show(key){
  if(!canon[key]) return;

  currentKey = key;

  const txt =
    canon[key].versions[currentTranslation] ||
    "[missing in this translation]";

  document.getElementById("verse").innerHTML = `
    <div class="verse-ref">${key}</div>
    <div class="verse-text">${txt}</div>
  `;

  updateFav();
}

/* ================= DAILY / RANDOM ================= */

function hash(str){
  let h = 7;
  for(const c of String(str)){
    h = (h * 31 + c.charCodeAt(0)) >>> 0;
  }
  return h;
}

function daily(){
  if(!keys.length) return;
  show(keys[hash(new Date().toDateString()) % keys.length]);
}

function randomVerse(){
  if(!keys.length) return;
  show(keys[Math.floor(Math.random() * keys.length)]);
}

/* ================= TRANSLATION ================= */

function setTranslation(t){
  currentTranslation = t;

  if(currentKey) show(currentKey);

  if(!document.getElementById("searchBox").classList.contains("hidden")){
    instantSearch();
  }

  renderFav();
}

/* ================= FAVORITES ================= */

function toggleFav(){
  if(!currentKey) return;

  const i = favs.indexOf(currentKey);

  if(i > -1) favs.splice(i,1);
  else favs.push(currentKey);

  localStorage.setItem("fav", JSON.stringify(favs));

  updateFav();
  renderFav();
}

function updateFav(){
  document.getElementById("star").innerText =
    favs.includes(currentKey) ? "★" : "☆";
}

function toggleFavorites(){
  document.getElementById("favBox").classList.toggle("hidden");
  renderFav();
}

function renderFav(){
  const box = document.getElementById("favList");

  if(!favs.length){
    box.innerHTML = `<div class="empty">No favorites yet.</div>`;
    return;
  }

  box.innerHTML = favs.map(k => `
    <div class="result-card" onclick="show('${escapeQuotes(k)}')">
      <div class="result-ref">${k}</div>
      <div class="result-text">
        ${(canon[k]?.versions[currentTranslation] || "").slice(0,180)}
      </div>
    </div>
  `).join("");
}

/* ================= SEARCH ================= */

function toggleSearch(){
  const box = document.getElementById("searchBox");
  box.classList.toggle("hidden");

  if(!box.classList.contains("hidden")){
    document.getElementById("q").focus();
  }
}

function instantSearch(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  const results = document.getElementById("results");

  if(!q){
    results.innerHTML = "";
    return;
  }

  const matches = [];

  for(const k of keys){
    if(canon[k].searchBlob.includes(q)){
      matches.push(k);
      if(matches.length >= 40) break;
    }
  }

  if(!matches.length){
    results.innerHTML = `<div class="empty">No results found.</div>`;
    return;
  }

  results.innerHTML = matches.map(k=>{
    const txt = canon[k].versions[currentTranslation] || "[missing]";

    return `
      <div class="result-card" onclick="show('${escapeQuotes(k)}')">
        <div class="result-ref">${k}</div>
        <div class="result-text">
          ${txt.slice(0,220)}${txt.length>220?"...":""}
        </div>
      </div>
    `;
  }).join("");
}

function clearSearch(){
  document.getElementById("q").value = "";
  document.getElementById("results").innerHTML = "";
  document.getElementById("q").focus();
}

function handleSearchKey(e){
  if(e.key === "Enter"){
    const first = document.querySelector(".result-card");
    if(first) first.click();
  }
}

/* ================= HELPERS ================= */

function escapeQuotes(str){
  return str.replace(/'/g,"&#39;");
}

/* ================= INIT ================= */

window.onload = ()=>{
  setTheme("system");
  loadAll();
};
</script>

</body>
</html>
