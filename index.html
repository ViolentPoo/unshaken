<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:70px 0 50px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
  z-index:1000;
}

.container{
  width:min(800px,92%);
  display:flex;
  flex-direction:column;
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.verse{
  font-size:20px;
  line-height:1.6;
  min-height:60px;
  margin:14px 0;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

button,select{
  padding:8px;
  margin:4px;
  border-radius:8px;
  border:1px solid #ccc;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:#fff;
}

.panel{
  display:none;
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid rgba(0,0,0,.1);
  max-height:220px;
  overflow:auto;
}

.small{
  position:fixed;
  right:10px;
  font-size:12px;
  opacity:.7;
}
.footer1{bottom:22px;}
.footer2{bottom:8px;}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <button id="mainStar"
    onclick="toggleFavorite(currentRef)"
    style="float:right; font-size:22px; border:none; background:transparent; cursor:pointer;">
    ☆
  </button>

  <div class="verse" id="verse">Loading...</div>
  <div class="ref" id="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">

  <select id="translation">
    <option value="kjv">KJV</option>
    <option value="web" selected>WEB</option>
    <option value="esv">ESV</option>
  </select>

  <select id="topic" onchange="topicChange()">
    <option value="daily">Verse of the Day</option>
    <option value="peace">Peace</option>
    <option value="strength">Strength</option>
    <option value="hope">Hope</option>
    <option value="anxiety">Anxiety</option>
  </select>

  <button onclick="toggleDark()">Dark Mode</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="encouragement()">Encourage Me</button>

  <button onclick="toggleFavorites()">Favorites</button>
  <button onclick="toggleHistory()">History</button>

  <!-- STREAK -->
  <div style="margin-top:10px; font-weight:600;">
    🔥 Streak: <span id="streakCount">0</span> days
  </div>
  <div id="streakMessage" style="font-size:14px; opacity:.85;"></div>

</div>

<!-- PRAYER -->
<div class="card">
  <strong>Prayer</strong>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <strong>Reflection</strong>
  <div id="reflection"></div>
</div>

<!-- FAVORITES -->
<div class="card panel" id="favBox">
  <strong>Favorites</strong>
  <div id="favList"></div>
</div>

<!-- HISTORY -->
<div class="card panel" id="historyBox">
  <strong>History</strong>
  <div id="historyList"></div>

  <button onclick="clearHistory()">Clear History</button>
</div>

<!-- MISSION -->
<div class="card">
  <strong>Family Mission Statement</strong>
  <div id="missionText" style="margin-top:8px;"></div>
</div>

</div>

<div class="small footer1">est 2013</div>
<div class="small footer2">The Parker Family</div>

<script>

/* =========================
   STATE
========================= */

let currentRef = "";
let currentText = "";

let favorites = JSON.parse(localStorage.getItem('unshaken_favs') || '[]');
let history = JSON.parse(localStorage.getItem('unshaken_history') || '[]');

let streak = JSON.parse(localStorage.getItem('unshaken_streak') || '{"count":0,"lastDate":null}');

/* =========================
   INIT
========================= */

window.onload = () => {
  document.documentElement.setAttribute(
    'data-theme',
    localStorage.getItem('theme') || 'light'
  );

  document.getElementById('missionText').innerText =
    localStorage.getItem('unshaken_mission') ||
    "We seek to follow Jesus, love each other well, and walk in faith daily.";

  fetchDaily();
  renderFavorites();
  renderHistory();
  updateStreak();
  renderStreak();
};

/* =========================
   STREAK
========================= */

function getDayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function updateStreak(){
  const today = getDayKey();

  if(streak.lastDate === today) return;

  const y = new Date();
  y.setDate(y.getDate()-1);
  const yKey = `${y.getFullYear()}-${y.getMonth()+1}-${y.getDate()}`;

  if(streak.lastDate === yKey){
    streak.count++;
  } else {
    streak.count = 1;
  }

  streak.lastDate = today;
  localStorage.setItem('unshaken_streak', JSON.stringify(streak));

  renderStreak();
}

function renderStreak(){
  document.getElementById('streakCount').innerText = streak.count;

  let msg = document.getElementById('streakMessage');

  if(streak.count === 1) msg.innerText = "Start strong.";
  else if(streak.count < 5) msg.innerText = "Keep going.";
  else if(streak.count < 10) msg.innerText = "Momentum building.";
  else if(streak.count < 30) msg.innerText = "Strong discipline.";
  else msg.innerText = "Deep consistency.";
}

/* =========================
   VERSE
========================= */

async function fetchDaily(){
  try{
    let r = await fetch('https://beta.ourmanna.com/api/v1/get/?format=json&order=daily');
    let d = await r.json();
    loadVerse(d?.verse?.details?.reference || "John 14:27");
  } catch {
    loadVerse("John 14:27");
  }
}

async function loadVerse(ref){
  try{
    let tr = document.getElementById('translation').value;

    let r = await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${tr}`);
    let d = await r.json();

    let text = d.text.trim();

    currentRef = ref;
    currentText = text;

    document.getElementById('verse').innerText = text;
    document.getElementById('ref').innerText = ref;

    setExtras();
    addToHistory(ref);
    updateMainStar();
    updateStreak();

  } catch {
    document.getElementById('verse').innerText = "Unavailable";
  }
}

/* =========================
   DEVOTIONAL
========================= */

const devotional = {
  peace:{prayer:"Peace Lord",reflection:"Where do I need peace?"},
  strength:{prayer:"Strength Lord",reflection:"Where do I need strength?"},
  hope:{prayer:"Hope Lord",reflection:"What am I trusting?"},
  anxiety:{prayer:"Calm me Lord",reflection:"What fear do I release?"},
  daily:{prayer:"Guide me",reflection:"What is God saying?"}
};

function setExtras(){
  let t = document.getElementById('topic').value;
  let d = devotional[t] || devotional.daily;

  document.getElementById('prayer').innerText = d.prayer;
  document.getElementById('reflection').innerText = d.reflection;
}

/* =========================
   FAVORITES
========================= */

function isFavorite(ref){
  return favorites.some(f => f.ref === ref);
}

function toggleFavorite(ref){
  if(!ref) return;

  if(isFavorite(ref)){
    favorites = favorites.filter(f => f.ref !== ref);
  } else {
    favorites.push({ref,text:currentText});
  }

  localStorage.setItem('unshaken_favs', JSON.stringify(favorites));

  renderFavorites();
  updateMainStar();
}

function renderFavorites(){
  let el = document.getElementById('favList');
  el.innerHTML = '';

  favorites.forEach(f=>{
    let row = document.createElement('div');
    row.style.display="flex";
    row.style.justifyContent="space-between";

    let t = document.createElement('div');
    t.innerText=f.ref;
    t.style.cursor="pointer";
    t.onclick=()=>loadVerse(f.ref);

    let s = document.createElement('button');
    s.innerText="⭐";
    s.style.background="transparent";
    s.style.border="none";
    s.onclick=()=>toggleFavorite(f.ref);

    row.appendChild(t);
    row.appendChild(s);
    el.appendChild(row);
  });
}

function updateMainStar(){
  document.getElementById('mainStar').innerText =
    isFavorite(currentRef) ? "⭐" : "☆";
}

/* =========================
   HISTORY (NO DUPLICATES)
========================= */

function addToHistory(ref){
  history = history.filter(h=>h.ref!==ref);
  history.unshift({ref});
  history = history.slice(0,50);

  localStorage.setItem('unshaken_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  let el=document.getElementById('historyList');
  el.innerHTML='';

  history.forEach(h=>{
    let d=document.createElement('div');
    d.innerText=h.ref;
    d.style.cursor="pointer";
    d.onclick=()=>loadVerse(h.ref);
    el.appendChild(d);
  });
}

function toggleHistory(){
  let b=document.getElementById('historyBox');
  b.style.display=b.style.display==='block'?'none':'block';
}

function clearHistory(){
  if(!confirm("Clear history?")) return;
  history=[];
  localStorage.removeItem('unshaken_history');
  renderHistory();
}

/* =========================
   CONTROLS
========================= */

function toggleDark(){
  let t=document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme',t==='dark'?'light':'dark');
  localStorage.setItem('theme',t==='dark'?'light':'dark');
}

function encouragement(){
  loadVerse("Isaiah 41:10");
}

function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
  .then(r=>r.json())
  .then(d=>{
    loadVerse(d[0].bookname+" "+d[0].chapter+":"+d[0].verse);
  });
}

function topicChange(){
  let v=document.getElementById('topic').value;

  const map={
    peace:"John 14:27",
    strength:"Philippians 4:13",
    hope:"Jeremiah 29:11",
    anxiety:"Philippians 4:6",
    daily:"daily"
  };

  if(v==="daily") return fetchDaily();
  loadVerse(map[v]);
}

function toggleFavorites(){
  let b=document.getElementById('favBox');
  b.style.display=b.style.display==='block'?'none':'block';
}

</script>

</body>
</html>
