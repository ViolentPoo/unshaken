<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#fff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:70px 0 40px;
  display:flex;
  justify-content:center;
  transition:0.3s;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:white;
  text-align:center;
  padding:12px;
  font-weight:700;
}

.container{ width:min(850px,92%); }

.card{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
}

.section-title{
  font-family:Georgia;
  font-weight:700;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:8px;
}

.verse-line{
  font-size:1.1rem;
  line-height:1.6;
}

.ref{
  margin-top:8px;
  color:var(--accent);
  font-weight:700;
}

button, select, input{
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
  margin:3px;
}

button:hover{
  background:var(--accent);
  color:white;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
}

.star{
  cursor:pointer;
  font-size:20px;
  user-select:none;
}

.hidden{ display:none; }

.footer{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="topbar">Unshaken</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Daily Verse</div>

  <div id="verse"></div>
  <div id="ref" class="ref"></div>

  <div class="star" onclick="toggleFavorite()" id="star">☆</div>

  <div id="status" style="font-size:12px;color:var(--muted);margin-top:5px;"></div>
</div>

<!-- CONTROLS -->
<div class="card">
<div class="controls">

<button onclick="loadDaily()">Daily</button>
<button onclick="loadRandom()">Random</button>
<button onclick="toggleSearch()">Search</button>
<button onclick="toggleFavorites()">Favorites</button>

<select onchange="setTheme(this.value)" id="themeSelect">
  <option value="system">System</option>
  <option value="light">Day</option>
  <option value="dark">Night</option>
</select>

</div>
</div>

<!-- SEARCH -->
<div class="card hidden" id="searchBox">
  <div class="section-title">Search Verses</div>
  <input id="searchInput" placeholder="Search keyword..." oninput="runSearch()"/>
  <div id="searchResults"></div>
</div>

<!-- FAVORITES -->
<div class="card hidden" id="favoritesBox">
  <div class="section-title">Favorites</div>
  <div id="favoritesList"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

<!-- TIME MESSAGE -->
<div class="card">
  <div id="timeMessage"></div>
</div>

</div>

<div class="footer">est. 2013 — The Parker Family</div>

<script>

/* ================= DATA ================= */

const API_BASE = "https://your-api.com/daily-verse";

const verses = [
{
  id:"isaiah41_10",
  ref:"Isaiah 41:10",
  text:[
    "Do not fear, for I am with you",
    "Do not be dismayed, for I am your God",
    "I will strengthen you and help you"
  ]
},
{
  id:"phil4_13",
  ref:"Philippians 4:13",
  text:[
    "I can do all things",
    "through Christ who strengthens me"
  ]
}
];

/* ================= STATE ================= */

let current=null;
let favorites=JSON.parse(localStorage.getItem("fav")||"[]");

/* ================= THEME ================= */

function setTheme(mode){
  localStorage.setItem("theme",mode);

  if(mode==="system"){
    const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", dark?"dark":"light");
  } else {
    document.documentElement.setAttribute("data-theme", mode);
  }
}

/* ================= DAILY SEED ================= */

function getSeed(){
  const d=new Date().toISOString().split("T")[0];
  let h=0;
  for(let i=0;i<d.length;i++){
    h=(h*31+d.charCodeAt(i))>>>0;
  }
  return h+812;
}

async function loadDaily(){
  document.getElementById("status").innerText="Loading...";

  try{
    const res=await fetch(`${API_BASE}?seed=${getSeed()}`);
    const data=await res.json();
    setVerse(data.verse);
    document.getElementById("status").innerText="Synced ✔";
  } catch(e){
    setVerse(verses[0]);
    document.getElementById("status").innerText="Offline fallback";
  }
}

/* ================= RANDOM ================= */

function loadRandom(){
  fetch("https://www.ourmanna.com/api/v1/get/?format=json&order=random")
  .then(r=>r.json())
  .then(d=>{
    const v={
      id:d.verse.details.reference,
      ref:d.verse.details.reference,
      text:[d.verse.details.text]
    };
    setVerse(v);
  });
}

/* ================= VERSE RENDER ================= */

function setVerse(v){
  current=v;

  const box=document.getElementById("verse");
  box.innerHTML="";

  v.text.forEach(t=>{
    let div=document.createElement("div");
    div.className="verse-line";
    div.innerText=t;
    box.appendChild(div);
  });

  document.getElementById("ref").innerText=v.ref;

  updateStar();
  updateDevotion(v);
}

/* ================= FAVORITES ================= */

function toggleFavorite(){
  if(!current) return;

  const i=favorites.indexOf(current.id);

  if(i>-1){
    favorites.splice(i,1);
  } else {
    favorites.push(current.id);
  }

  localStorage.setItem("fav",JSON.stringify(favorites));
  updateStar();
  renderFavorites();
}

function updateStar(){
  if(!current) return;
  document.getElementById("star").innerText =
    favorites.includes(current.id) ? "★" : "☆";
}

function toggleFavorites(){
  const b=document.getElementById("favoritesBox");
  b.classList.toggle("hidden");
  renderFavorites();
}

function renderFavorites(){
  const box=document.getElementById("favoritesList");
  box.innerHTML="Favorites saved: "+favorites.length;
}

/* ================= SEARCH ================= */

function toggleSearch(){
  document.getElementById("searchBox").classList.toggle("hidden");
}

function runSearch(){
  const q=document.getElementById("searchInput").value.toLowerCase();

  const results=verses.filter(v =>
    v.text.join(" ").toLowerCase().includes(q)
  );

  const box=document.getElementById("searchResults");
  box.innerHTML="";

  results.forEach(v=>{
    let div=document.createElement("div");
    div.innerText=v.ref;
    div.onclick=()=>setVerse(v);
    box.appendChild(div);
  });
}

/* ================= PRAYER / REFLECTION ================= */

function detectTheme(text){
  const t=text.join(" ").toLowerCase();
  if(t.includes("fear")) return "peace";
  if(t.includes("strength")) return "strength";
  if(t.includes("love")) return "love";
  return "peace";
}

const prayerMap={
  peace:"Bring peace to my heart.",
  strength:"Give me strength.",
  love:"Help me love others well."
};

const reflectionMap={
  peace:"What is troubling me?",
  strength:"Where do I need strength?",
  love:"How can I show love today?"
};

function updateDevotion(v){
  const t=detectTheme(v.text);
  document.getElementById("prayer").innerText=prayerMap[t];
  document.getElementById("reflection").innerText=reflectionMap[t];
}

/* ================= TIME MESSAGE ================= */

function timeMessage(){
  const h=new Date().getHours();

  let msg="";
  if(h<12) msg="Start your day with truth.";
  else if(h<17) msg="Stay steady in Him today.";
  else msg="Rest in what God has done.";

  document.getElementById("timeMessage").innerText=msg;
}

/* ================= INIT ================= */

window.onload=()=>{
  setTheme(localStorage.getItem("theme")||"system");
  loadDaily();
  timeMessage();
};

</script>

</body>
</html>
