<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unshaken</title>
  <style>
    :root{
      --bg:#f5f5f5;
      --text:#111;
      --card:#fff;
      --accent:#2b6cb0;
    }

    [data-theme="dark"]{
      --bg:#0f172a;
      --text:#e2e8f0;
      --card:#1e293b;
      --accent:#60a5fa;
    }

    body{
      margin:0;
      font-family:system-ui;
      background:var(--bg);
      color:var(--text);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding-top:70px;
    }

    .topbar{
      position:fixed;
      top:0;left:0;right:0;
      background:var(--accent);
      color:white;
      text-align:center;
      padding:12px;
      font-weight:700;
      z-index:1000;
    }

    .container{
      width:min(750px,92%);
      background:var(--card);
      padding:20px;
      border-radius:14px;
      box-shadow:0 10px 25px rgba(0,0,0,.1);
    }

    .verse{font-size:20px;line-height:1.6;margin:15px 0;}
    .ref{color:var(--accent);font-weight:bold;}

    select,button{
      padding:8px;
      border-radius:8px;
      border:1px solid #ccc;
      background:var(--card);
      color:var(--text);
      cursor:pointer;
      margin:4px;
      -webkit-appearance:none;
      appearance:none;
    }

    button:hover{background:var(--accent);color:white;}

    .small{
      font-size:12px;
      opacity:.7;
      position:fixed;
      bottom:8px;
      right:10px;
    }

    .card{
      background:rgba(0,0,0,.03);
      padding:10px;
      border-radius:10px;
      margin-top:10px;
    }

    [data-theme="dark"] .card{
      background:rgba(255,255,255,.06);
    }

    .history{
      margin-top:15px;
      max-height:180px;
      overflow-y:auto;
      border-top:1px solid rgba(0,0,0,.1);
      padding-top:10px;
      display:none;
    }

    .history-item{
      font-size:13px;
      padding:6px;
      cursor:pointer;
      border-radius:6px;
    }

    .history-item:hover{
      background:rgba(0,0,0,.05);
    }

    [data-theme="dark"] .history-item:hover{
      background:rgba(255,255,255,.08);
    }
  </style>
</head>
<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

  <h2>Verse</h2>
  <div id="verse" class="verse">Loading...</div>
  <div id="ref" class="ref"></div>

  <div>
    <select id="translation">
      <option value="kjv">KJV</option>
      <option value="web" selected>WEB</option>
      <option value="esv">ESV</option>
    </select>

    <select id="topic">
      <option value="daily" selected>Verse of the Day</option>
      <option value="peace">Peace</option>
      <option value="strength">Strength</option>
      <option value="hope">Hope</option>
      <option value="anxiety">Anxiety</option>
    </select>

    <button onclick="toggleDark()">Dark Mode</button>
    <button onclick="randomVerse()">Random</button>
    <button onclick="encouragement()">Encourage Me</button>
    <button onclick="shareVerse()">Share</button>
    <button onclick="toggleHistory()">History</button>
  </div>

  <div class="card">
    <strong>Prayer</strong>
    <div id="prayer" style="font-size:13px;margin-top:5px"></div>
  </div>

  <div class="card">
    <strong>Reflection</strong>
    <div id="reflection" style="font-size:13px;font-style:italic;margin-top:5px"></div>
  </div>

  <div class="history" id="historyBox">
    <strong>Verse History</strong>
    <div id="historyList"></div>
  </div>

</div>

<div class="small">The Parker Family</div>

<script>
let currentRef="";
let currentVerse="";
let history=[];

const prayers=[
"Lord, guide me today and keep my heart steady.",
"Jesus, give me peace when I feel anxious.",
"Father, strengthen my faith in difficult moments.",
"God, help me walk in wisdom and humility.",
"Lord, protect my family and lead us in truth.",
"Jesus, teach me to trust You more each day."
];

const reflections=[
"How can I apply this verse in a practical way today?",
"What is God trying to teach me through this moment?",
"Who around me needs encouragement from this truth?",
"What habits in my life need to change because of this verse?",
"How can I trust God more fully in this situation?",
"Where have I already seen God working in my life?"
];

function setExtras(){
  document.getElementById('prayer').innerText=prayers[Math.floor(Math.random()*prayers.length)];
  document.getElementById('reflection').innerText=reflections[Math.floor(Math.random()*reflections.length)];
}

function toggleHistory(){
  const box=document.getElementById('historyBox');
  box.style.display=box.style.display==='block'?'none':'block';
}

function addToHistory(ref,text){
  history.unshift({ref,text});
  if(history.length>20) history.pop();
  renderHistory();
}

function renderHistory(){
  const el=document.getElementById('historyList');
  el.innerHTML="";
  history.forEach(h=>{
    const div=document.createElement('div');
    div.className='history-item';
    div.innerText=h.ref;
    div.onclick=()=>{
      currentRef=h.ref;
      currentVerse=h.text;
      document.getElementById('verse').innerText=h.text;
      document.getElementById('ref').innerText=h.ref;
    };
    el.appendChild(div);
  });
}

function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('theme',t);
}

function themeByTime(){
  const saved=localStorage.getItem('theme');
  if(saved){document.documentElement.setAttribute('data-theme',saved);return;}
  const h=new Date().getHours();
  document.documentElement.setAttribute('data-theme',h<6||h>18?'dark':'light');
}

async function fetchDaily(){
  const res=await fetch("https://beta.ourmanna.com/api/v1/get/?format=json&order=daily");
  const data=await res.json();
  currentRef=data.verse.details.reference;
  loadVerse(currentRef);
}

async function loadVerse(ref){
  const tr=document.getElementById('translation').value;
  const res=await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${tr}`);
  const data=await res.json();
  currentVerse=data.text;
  currentRef=ref;

  document.getElementById('verse').innerText=data.text;
  document.getElementById('ref').innerText=ref;

  addToHistory(ref,data.text);
  setExtras();
}

function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
  .then(r=>r.json())
  .then(d=>{
    const v=d[0];
    currentRef=v.bookname+" "+v.chapter+":"+v.verse;
    currentVerse=v.text;
    document.getElementById('verse').innerText=currentVerse;
    document.getElementById('ref').innerText=currentRef;
    addToHistory(currentRef,currentVerse);
    setExtras();
  });
}

function encouragement(){
  currentRef="Isaiah 41:10";
  loadVerse(currentRef);
}

function toggleDark(){
  const cur=document.documentElement.getAttribute('data-theme');
  applyTheme(cur==='dark'?'light':'dark');
}

function shareVerse(){
  const text=currentRef+"\n\n"+currentVerse;
  if(navigator.share){navigator.share({title:"Unshaken",text});}
  else{navigator.clipboard.writeText(text);alert("Copied");}
}

function topicChange(){
  const v=document.getElementById('topic').value;
  if(v==='daily') return fetchDaily();

  const map={
    peace:"John 14:27",
    strength:"Philippians 4:13",
    hope:"Jeremiah 29:11",
    anxiety:"Philippians 4:6"
  };

  currentRef=map[v];
  loadVerse(currentRef);
}

window.onload=()=>{
  themeByTime();
  fetchDaily();
  setExtras();

  document.getElementById('translation').onchange=()=>loadVerse(currentRef);
  document.getElementById('topic').onchange=topicChange;
};
</script>

</body>
</html>
