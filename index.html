<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#fff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 40px;
  display:flex;
  justify-content:center;
  transition: background 0.3s ease, color 0.3s ease;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:var(--accent);
  color:white;
  text-align:center;
  padding:14px;
  font-weight:700;
}

.container{ width:min(850px,92%); }

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-top:14px;
  transition: background 0.3s ease;
}

.section-title{
  font-family:Georgia;
  font-weight:700;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:8px;
}

.verse{
  font-size:1.25rem;
  line-height:1.7;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

button,input{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:white;
}

.list-item{
  padding:8px;
  border-bottom:1px solid rgba(0,0,0,0.1);
  cursor:pointer;
}

.small-btn{
  font-size:0.8rem;
  padding:6px 10px;
}

.footer{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="topbar">Unshaken</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Verse</div>

  <div id="verse" class="verse">Loading...</div>
  <div id="ref" class="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">

<div class="controls">

  <button onclick="loadDaily()">Daily</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="encourageMe()">Encourage Me</button>

  <input id="searchBox" placeholder="Search (love, peace...)" />
  <button onclick="search()">Search</button>
  <button onclick="hideSearch()">Hide Results</button>

  <!-- 🌗 NEW DAY/NIGHT TOGGLE -->
  <button onclick="toggleTheme()">Day / Night</button>

</div>

</div>

<!-- SEARCH RESULTS -->
<div class="card" id="resultsBox" style="display:none;">
  <div class="section-title">Search Results</div>
  <div id="results"></div>
</div>

<!-- FAVORITES -->
<div class="card">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<!-- HISTORY -->
<div class="card">
  <div class="section-title">History</div>
  <button class="small-btn" onclick="clearHistory()">Clear</button>
  <div id="historyList"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

</div>

<div class="footer">
  est. 2013 — The Parker Family
</div>

<script>

/* ================= THEME ================= */

function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("theme", theme);
}

function toggleTheme(){
  const current = localStorage.getItem("theme") || "light";
  const next = current === "dark" ? "light" : "dark";
  applyTheme(next);
}

/* ================= INIT THEME ================= */

(function(){
  const saved = localStorage.getItem("theme") || "light";
  applyTheme(saved);
})();

/* ================= DATA ================= */

const verses = [
  {ref:"John 3:16", text:"For God so loved the world..."},
  {ref:"1 Corinthians 13:4", text:"Love is patient, love is kind..."},
  {ref:"Psalm 23:1", text:"The Lord is my shepherd..."},
  {ref:"Isaiah 41:10", text:"Do not fear, for I am with you..."},
  {ref:"Philippians 4:13", text:"I can do all things through Christ..."},
  {ref:"Romans 8:28", text:"All things work together for good..."},
  {ref:"Jeremiah 29:11", text:"For I know the plans I have for you..."}
];

/* ================= STATE ================= */

let current = null;
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");
let history = JSON.parse(localStorage.getItem("hist")||"[]");

/* ================= CORE ================= */

function setVerse(v){
  current = v;

  document.getElementById("verse").innerText = v.text;
  document.getElementById("ref").innerText = v.ref;

  document.getElementById("prayer").innerText =
    "Lord, guide me through " + v.ref;

  document.getElementById("reflection").innerText =
    "What is God showing me through this verse?";

  addHistory(v);
  renderFav();
  renderHistory();
}

/* ================= DAILY ================= */

function loadDaily(){
  const seed = new Date().toISOString().split("T")[0];
  let h = 0;
  for(let i=0;i<seed.length;i++){
    h += seed.charCodeAt(i)*(i+1);
  }

  setVerse(verses[h % verses.length]);
}

/* ================= RANDOM ================= */

function randomVerse(){
  setVerse(verses[Math.floor(Math.random()*verses.length)]);
}

/* ================= ENCOURAGE ================= */

function encourageMe(){
  setVerse(verses[Math.floor(Math.random()*verses.length)]);
}

/* ================= SEARCH ================= */

function search(){
  const q=document.getElementById("searchBox").value.toLowerCase();

  const res=verses.filter(v =>
    v.text.toLowerCase().includes(q) ||
    v.ref.toLowerCase().includes(q)
  );

  document.getElementById("resultsBox").style.display="block";

  document.getElementById("results").innerHTML =
    res.map(v=>`
      <div class="list-item" onclick='setVerse(${JSON.stringify(v)})'>
        <b>${v.ref}</b><br>${v.text}
      </div>
    `).join("");
}

function hideSearch(){
  document.getElementById("resultsBox").style.display="none";
  document.getElementById("searchBox").value="";
}

/* ================= FAVORITES ================= */

function toggleFavorite(){
  if(!current) return;

  const exists = favorites.find(f=>f.ref===current.ref);

  if(exists){
    favorites = favorites.filter(f=>f.ref!==current.ref);
  } else {
    favorites.push(current);
  }

  localStorage.setItem("fav",JSON.stringify(favorites));
  renderFav();
}

function renderFav(){
  document.getElementById("favList").innerHTML =
    favorites.map(f=>
      `<div class="list-item" onclick='setVerse(${JSON.stringify(f)})'>
        ${f.ref}
      </div>`
    ).join("");
}

/* ================= HISTORY ================= */

function addHistory(v){
  history = history.filter(h=>h.ref!==v.ref);
  history.unshift(v);
  history = history.slice(0,50);

  localStorage.setItem("hist",JSON.stringify(history));
}

function renderHistory(){
  document.getElementById("historyList").innerHTML =
    history.map(h=>
      `<div class="list-item" onclick='setVerse(${JSON.stringify(h)})'>
        ${h.ref}
      </div>`
    ).join("");
}

function clearHistory(){
  if(!confirm("Clear history?")) return;
  history=[];
  localStorage.removeItem("hist");
  renderHistory();
}

/* ================= INIT ================= */

window.onload=()=>{
  loadDaily();
};

</script>

</body>
</html>
