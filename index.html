<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
  --border:#d9d9d9;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
  --border:#334155;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 64px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
}

.container{width:min(940px,92%);}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

button,select,input{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid var(--border);
  margin:3px;
  background:var(--card);
  color:var(--text);
  font:inherit;
}

button{cursor:pointer;}
button:hover{background:var(--accent);color:#fff;}

.star{font-size:26px;cursor:pointer;}

.footer-left{
  position:fixed;
  left:10px;
  bottom:10px;
  font-size:11px;
  color:var(--muted);
}

.footer-right{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:11px;
  color:var(--muted);
  cursor:pointer;
}

/* MODAL */
.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  width:min(520px,90%);
}

</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse</div>

<div class="container">

<div class="card">
  <div id="verse">Loading verses...</div>
  <div class="star" id="star" onclick="toggleFav()">☆</div>
</div>

<div class="card">
  <button onclick="daily()">Daily</button>
  <button onclick="randomVerse()">Random</button>
</div>

</div>

<div class="footer-left">Unshaken</div>

<div class="footer-right" onclick="openMission()">
est. 2013 — The Parker Family
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="missionModal" onclick="closeMission(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Parker Family Mission Statement</h3>
    <p>
      As a family, we seek to follow Jesus faithfully, honor God in all we do,
      and love one another with patience and grace.
    </p>
    <button onclick="closeMission()">Close</button>
  </div>
</div>

<script>

/* ================= STATE ================= */

let canon = {};
let keys = [];
let ready = false;

/* ================= LOAD ================= */

async function loadAll(){
  canon = {};

  const translations = ["web","kjv","asv","akjv","cpdv"];

  for(const t of translations){
    try{
      const txt = await (await fetch(`translations/${t}.txt`)).text();

      txt.split("\n").forEach(line=>{
        line=line.trim();
        if(!line) return;

        const parts=line.split(/\s+/);
        const i=parts.findIndex(x=>x.includes(":"));
        if(i<0) return;

        const key=parts.slice(0,i).join(" ")+" "+parts[i];
        const verse=parts.slice(i+1).join(" ");

        if(!canon[key]) canon[key]={};
        canon[key][t]=verse;
      });

    } catch(e){
      console.warn("Missing:",t);
    }
  }

  keys = Object.keys(canon).filter(k=>Object.keys(canon[k]).length);
  ready = true;

  initDaily();
  daily();
}

/* ================= 🔧 FIXED DAILY SYSTEM ================= */

function getDailyKey(){
  const today = new Date().toDateString();

  let hash = 0;
  for(let i=0;i<today.length;i++){
    hash = (hash * 31 + today.charCodeAt(i)) >>> 0;
  }

  return keys[hash % keys.length];
}

let dailyKey = null;

function initDaily(){
  if(!keys.length) return;
  dailyKey = getDailyKey();
}

/* ================= SHOW ================= */

function show(key){
  if(!ready || !canon[key]) return;

  document.getElementById("verse").innerText =
    canon[key].web || "Verse unavailable";
}

/* ================= DAILY (FIXED) ================= */

function daily(){
  if(!ready || !keys.length) return;

  const today = new Date().toDateString();
  const storedDay = localStorage.getItem("daily_day");

  if(storedDay !== today || !dailyKey){
    dailyKey = getDailyKey();
    localStorage.setItem("daily_day", today);
  }

  show(dailyKey);
}

/* ================= RANDOM ================= */

function randomVerse(){
  if(!keys.length) return;

  const key = keys[Math.floor(Math.random()*keys.length)];
  show(key);
}

/* ================= MODAL ================= */

function openMission(){
  document.getElementById("missionModal").style.display="flex";
}

function closeMission(){
  document.getElementById("missionModal").style.display="none";
}

/* ================= INIT ================= */

window.onload = loadAll;

</script>

</body>
</html>
