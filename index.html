<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 40px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:14px;
  font-weight:700;
  z-index:1000;
}

.container{
  width:min(850px,92%);
}

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-top:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.verse{
  font-size:1.25rem;
  line-height:1.7;
  margin:14px 0;
  min-height:80px;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

button,select{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
  font-size:.95rem;
}

button:hover{
  background:var(--accent);
  color:#fff;
}

.panel{
  display:none;
  max-height:260px;
  overflow:auto;
}

.list-item{
  padding:8px 0;
  border-bottom:1px solid rgba(0,0,0,.08);
  cursor:pointer;
}

.list-item:last-child{
  border-bottom:none;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.small{
  font-size:.9rem;
  color:var(--muted);
}

.star-btn{
  border:none;
  background:transparent;
  font-size:1.4rem;
  cursor:pointer;
  padding:0;
}

.section-title{
  font-weight:700;
  margin-bottom:8px;
}

.streak{
  margin-top:10px;
  font-weight:700;
}

/* FOOTER */
.footer{
  position: fixed;
  right: 12px;
  bottom: 10px;
  text-align: right;
  color: var(--muted);
  font-size: 10px;
  line-height: 1.2;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="row">
    <div class="section-title">Today’s Verse</div>
    <button id="mainStar" class="star-btn" onclick="toggleFavorite(currentRef)">☆</button>
  </div>

  <div id="verse" class="verse">Loading...</div>
  <div id="ref" class="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">
  <div class="controls">

    <select id="translation" onchange="reloadCurrentVerse()">
      <option value="kjv">KJV</option>
      <option value="web" selected>WEB</option>
      <option value="esv">ESV</option>
    </select>

    <select id="focusArea" onchange="focusAreaChange()">
      <option value="daily">Daily Verse</option>
      <option value="peace">Peace</option>
      <option value="strength">Strength</option>
      <option value="hope">Hope</option>
      <option value="anxiety">Anxiety</option>
      <option value="faith">Faith</option>
      <option value="love">Love</option>
      <option value="wisdom">Wisdom</option>
    </select>

    <button onclick="randomVerse()">Random</button>
    <button onclick="encouragement()">Encourage Me</button>
    <button onclick="toggleDark()">Dark Mode</button>
    <button onclick="toggleFavorites()">Favorites</button>
    <button onclick="toggleHistory()">History</button>

  </div>

  <div class="streak">
    🔥 Streak: <span id="streakCount">0</span> days
  </div>
  <div id="streakMessage" class="small"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

<!-- FAVORITES -->
<div class="card panel" id="favBox">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<!-- HISTORY -->
<div class="card panel" id="historyBox">
  <div class="row">
    <div class="section-title">History</div>
    <button onclick="clearHistory()">Clear</button>
  </div>
  <div id="historyList"></div>
</div>

<!-- MISSION -->
<div class="card">
  <div class="section-title">Family Mission Statement</div>
  <div id="missionText"></div>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div>est. 2013</div>
  <div>The Parker Family</div>
</div>

<script>
let currentRef = "";
let currentText = "";

let favorites = JSON.parse(localStorage.getItem("unshaken_favs") || "[]");
let history = JSON.parse(localStorage.getItem("unshaken_history") || "[]");

let streak;
try{
  const raw = JSON.parse(localStorage.getItem("unshaken_streak"));
  streak = {
    count:Number(raw?.count)||0,
    lastDate:raw?.lastDate||null
  };
}catch{
  streak={count:0,lastDate:null};
}

/* DAILY KEY */
function getDayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

/* STREAK */
function updateStreak(){
  const today=getDayKey();

  if(streak.lastDate===today) return;

  const y=new Date();
  y.setDate(y.getDate()-1);
  const yKey=`${y.getFullYear()}-${y.getMonth()+1}-${y.getDate()}`;

  if(streak.lastDate===yKey) streak.count++;
  else streak.count=1;

  streak.lastDate=today;
  localStorage.setItem("unshaken_streak",JSON.stringify(streak));
  renderStreak();
}

function renderStreak(){
  const c=Number(streak.count)||0;
  document.getElementById("streakCount").innerText=c;

  let msg="Start today.";
  if(c>=3) msg="Keep going.";
  if(c>=7) msg="Momentum building.";
  if(c>=14) msg="Strong discipline.";
  if(c>=30) msg="Deep consistency.";

  document.getElementById("streakMessage").innerText=msg;
}

/* VERSES */
async function fetchDaily(){
  try{
    const r=await fetch("https://beta.ourmanna.com/api/v1/get/?format=json&order=daily");
    const d=await r.json();
    loadVerse(d?.verse?.details?.reference||"John 14:27");
  }catch{
    loadVerse("John 14:27");
  }
}

async function loadVerse(ref){
  try{
    const tr=document.getElementById("translation").value;
    const r=await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${tr}`);
    const d=await r.json();

    currentRef=ref;
    currentText=(d.text||"").trim();

    document.getElementById("verse").innerText=currentText||"Unavailable.";
    document.getElementById("ref").innerText=ref;

    addToHistory(ref);
    updateMainStar();
    applyDevotional(ref);

  }catch{
    document.getElementById("verse").innerText="Unavailable.";
    document.getElementById("ref").innerText=ref;
  }
}

function reloadCurrentVerse(){
  if(currentRef) loadVerse(currentRef);
}

/* CLEAN DEVOTIONAL ENGINE */
const pools={
  peace:[
    {r:"John 14:27",p:"Jesus, give me Your peace.",f:"What is disturbing my peace?"},
    {r:"Philippians 4:7",p:"Guard my heart with peace.",f:"Where do I need calm today?"}
  ],
  strength:[
    {r:"Isaiah 41:10",p:"Strengthen me Lord.",f:"Where do I feel weak?"},
    {r:"Philippians 4:13",p:"Help me endure.",f:"What challenge am I facing?"}
  ],
  hope:[
    {r:"Jeremiah 29:11",p:"Renew my hope.",f:"What future am I trusting God with?"}
  ],
  anxiety:[
    {r:"Philippians 4:6",p:"I release my worries.",f:"What am I holding too tightly?"}
  ],
  faith:[
    {r:"Hebrews 11:1",p:"Grow my faith.",f:"Where do I need trust?"}
  ],
  love:[
    {r:"1 Corinthians 13:4",p:"Teach me love.",f:"Who needs grace today?"}
  ],
  wisdom:[
    {r:"James 1:5",p:"Give me wisdom.",f:"What decision needs clarity?"}
  ]
};

function focusAreaChange(){
  const area=document.getElementById("focusArea").value;

  if(area==="daily"){
    fetchDaily();
    return;
  }

  const list=pools[area];
  const item=list[getDayIndex(list.length)];

  document.getElementById("prayer").innerText=item.p;
  document.getElementById("reflection").innerText=item.f;

  loadVerse(item.r);
}

function getDayIndex(len){
  const now=new Date();
  const start=new Date(now.getFullYear(),0,0);
  return Math.floor((now-start)/86400000)%len;
}

/* FAVORITES */
function toggleFavorite(ref){
  if(!ref) return;

  if(favorites.find(f=>f.ref===ref)){
    favorites=favorites.filter(f=>f.ref!==ref);
  }else{
    favorites.push({ref});
  }

  localStorage.setItem("unshaken_favs",JSON.stringify(favorites));
  renderFavorites();
  updateMainStar();
}

function renderFavorites(){
  const el=document.getElementById("favList");
  el.innerHTML="";

  if(!favorites.length){
    el.innerHTML=`<div class="small">No favorites</div>`;
    return;
  }

  favorites.forEach(f=>{
    const d=document.createElement("div");
    d.className="list-item";
    d.innerText=f.ref;
    d.onclick=()=>loadVerse(f.ref);
    el.appendChild(d);
  });
}

function updateMainStar(){
  document.getElementById("mainStar").innerText=
    favorites.find(f=>f.ref===currentRef)?"⭐":"☆";
}

function toggleFavorites(){
  const b=document.getElementById("favBox");
  b.style.display=b.style.display==="block"?"none":"block";
}

/* HISTORY */
function addToHistory(ref){
  history=history.filter(h=>h.ref!==ref);
  history.unshift({ref});
  history=history.slice(0,50);

  localStorage.setItem("unshaken_history",JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  const el=document.getElementById("historyList");
  el.innerHTML="";

  if(!history.length){
    el.innerHTML=`<div class="small">No history</div>`;
    return;
  }

  history.forEach(h=>{
    const d=document.createElement("div");
    d.className="list-item";
    d.innerText=h.ref;
    d.onclick=()=>loadVerse(h.ref);
    el.appendChild(d);
  });
}

function toggleHistory(){
  const b=document.getElementById("historyBox");
  b.style.display=b.style.display==="block"?"none":"block";
}

function clearHistory(){
  if(!confirm("Clear history?")) return;
  history=[];
  localStorage.removeItem("unshaken_history");
  renderHistory();
}

/* OTHER */
function toggleDark(){
  const t=document.documentElement.getAttribute("data-theme");
  const n=t==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",n);
  localStorage.setItem("theme",n);
}

function encouragement(){
  loadVerse("Isaiah 41:10");
}

function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
    .then(r=>r.json())
    .then(d=>{
      const v=d[0];
      loadVerse(`${v.bookname} ${v.chapter}:${v.verse}`);
    })
    .catch(()=>loadVerse("Romans 8:28"));
}

window.onload=()=>{
  document.documentElement.setAttribute(
    "data-theme",
    localStorage.getItem("theme")||"light"
  );

  document.getElementById("missionText").innerText=
    localStorage.getItem("unshaken_mission")||
    "We seek to follow Jesus faithfully and live with purpose.";

  renderFavorites();
  renderHistory();
  updateStreak();
  renderStreak();
  fetchDaily();
};
</script>

</body>
</html>
