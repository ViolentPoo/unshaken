<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#fff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 40px;
  display:flex;
  justify-content:center;
  transition:background 0.3s, color 0.3s;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:var(--accent);
  color:white;
  text-align:center;
  padding:14px;
  font-weight:700;
}

.container{ width:min(850px,92%); }

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-top:14px;
}

.section-title{
  font-family:Georgia;
  font-weight:700;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:8px;
}

.verse-line{
  font-size:1.15rem;
  line-height:1.6;
}

.ref{
  margin-top:10px;
  color:var(--accent);
  font-weight:700;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

button, select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:white;
}

.footer{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="topbar">Unshaken</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Verse</div>
  <div id="verse"></div>
  <div id="ref" class="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">

<div class="controls">

  <button onclick="loadDaily()">Daily</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="encourageMe()">Encourage Me</button>

  <!-- 🌗 THEME TOGGLE -->
  <select onchange="setTheme(this.value)" id="themeSelect">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>

</div>

</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

</div>

<div class="footer">
  est. 2013 — The Parker Family
</div>

<script>

/* ================= THEME SYSTEM ================= */

function applyTheme(mode){
  localStorage.setItem("themeMode", mode);

  if(mode === "system"){
    const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    return;
  }

  document.documentElement.setAttribute("data-theme", mode);
}

function setTheme(mode){
  applyTheme(mode);
}

/* init theme */
(function(){
  const saved = localStorage.getItem("themeMode") || "system";
  applyTheme(saved);

  // sync dropdown
  const select = document.getElementById("themeSelect");
  if(select) select.value = saved;
})();

/* react to system changes */
window.matchMedia("(prefers-color-scheme: dark)")
  .addEventListener("change", () => {
    if(localStorage.getItem("themeMode") === "system"){
      applyTheme("system");
    }
  });

/* ================= VERSES ================= */

const verses = [
  {
    ref:"John 3:16",
    text:[
      "For God so loved the world",
      "that he gave his one and only Son",
      "that whoever believes in him shall not perish but have eternal life"
    ]
  },
  {
    ref:"Isaiah 41:10",
    text:[
      "Do not fear, for I am with you",
      "Do not be dismayed, for I am your God",
      "I will strengthen you and help you"
    ]
  },
  {
    ref:"Philippians 4:13",
    text:[
      "I can do all things",
      "through Christ who strengthens me"
    ]
  }
];

/* ================= THEME DETECTION ================= */

function detectTheme(textArr){
  const t = textArr.join(" ").toLowerCase();

  if(t.includes("fear")) return "peace";
  if(t.includes("love")) return "love";
  if(t.includes("strength")) return "strength";
  if(t.includes("hope")) return "hope";

  return "peace";
}

/* ================= DEVOTION ================= */

const prayerMap={
  love:"Help me reflect Your love today.",
  peace:"Bring peace to my heart.",
  strength:"Give me strength when I feel weak.",
  hope:"Renew my hope in You."
};

const reflectionMap={
  love:"How can I love others better today?",
  peace:"What is stealing my peace?",
  strength:"Where do I need strength right now?",
  hope:"What promise am I holding onto?"
};

/* ================= STATE ================= */

let current=null;

/* ================= CORE ================= */

function setVerse(v){
  current=v;

  const box=document.getElementById("verse");
  box.innerHTML="";

  v.text.forEach(line=>{
    const div=document.createElement("div");
    div.className="verse-line";
    div.innerText=line;
    box.appendChild(div);
  });

  document.getElementById("ref").innerText=v.ref;

  const theme=detectTheme(v.text);

  document.getElementById("prayer").innerText=
    prayerMap[theme];

  document.getElementById("reflection").innerText=
    reflectionMap[theme];
}

/* ================= MODES ================= */

function loadDaily(){
  const d=new Date().toISOString().split("T")[0];
  let h=0;
  for(let i=0;i<d.length;i++){
    h+=d.charCodeAt(i)*(i+1);
  }
  setVerse(verses[h%verses.length]);
}

function randomVerse(){
  setVerse(verses[Math.floor(Math.random()*verses.length)]);
}

function encourageMe(){
  setVerse(verses[Math.floor(Math.random()*verses.length)]);
}

/* ================= INIT ================= */

window.onload=()=>{
  loadDaily();
};

</script>

</body>
</html>
