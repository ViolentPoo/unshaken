<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
  --border:#d9d9d9;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
  --border:#334155;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 64px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
}

.container{width:min(940px,92%);}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.section-title{
  font-size:14px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:10px;
}

button,input,select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid var(--border);
  margin:3px;
  background:var(--card);
  color:var(--text);
}

button{cursor:pointer;}
button:hover{background:var(--accent);color:#fff;}

.hidden{display:none !important;}

/* SEARCH */
.result-card{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  margin-top:10px;
  cursor:pointer;
}

.result-ref{
  font-weight:700;
  color:var(--accent);
  margin-bottom:6px;
}

/* STAR */
.star{
  font-size:26px;
  cursor:pointer;
}

/* FOOTER */
.footer-left{
  position:fixed;
  left:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
}

.footer-right{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:11px;
  color:var(--muted);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Verse</div>
  <div id="verse">Loading...</div>
  <div class="star" id="star" onclick="toggleFav()">☆</div>
</div>

<!-- CONTROLS -->
<div class="card">
  <button onclick="daily()">Daily</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="toggleSearch()">Search</button>
  <button onclick="toggleFavorites()">Favorites</button>

  <!-- FIXED: dynamically populated -->
  <select id="translation" onchange="setTranslation(this.value)"></select>

  <select onchange="setTheme(this.value)">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>
</div>

<!-- SEARCH -->
<div class="card hidden" id="searchBox">
  <div class="section-title">Search</div>

  <input id="q" oninput="instantSearch()" placeholder="Search...">
  <button onclick="clearSearch()">Clear Search</button>

  <div id="results"></div>
</div>

<!-- FAVORITES -->
<div class="card hidden" id="favBox">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer">Walk faithfully today.</div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection">What is God showing you?</div>
</div>

</div>

<script>

/* ================= TRANSLATIONS (RESTORED PROPERLY) ================= */

const TRANSLATIONS = {
  web:  "World English Bible (WEB)",
  kjv:  "King James Version (KJV)",
  asv:  "American Standard Version (ASV)",
  akjv: "American King James Version (AKJV)",
  cpdv: "Catholic Public Domain Version (CPDV)"
};

let currentTranslation="web";
let canon={};
let keys=[];
let currentKey=null;
let favs=[];

/* ================= BUILD DROPDOWN (FIX) ================= */

function buildDropdown(){
  const sel=document.getElementById("translation");

  sel.innerHTML=Object.keys(TRANSLATIONS).map(k=>
    `<option value="${k}" ${k===currentTranslation?"selected":""}>
      ${TRANSLATIONS[k]}
    </option>`
  ).join("");
}

/* ================= INIT ================= */

function init(){
  buildDropdown();
}

/* ================= TRANSLATION SWITCH ================= */

function setTranslation(t){
  currentTranslation=t;
  if(currentKey) show(currentKey);
}

/* ================= SEARCH TOGGLE ================= */

function toggleSearch(){
  const box=document.getElementById("searchBox");
  box.classList.toggle("hidden");
}

/* ================= PLACEHOLDERS ================= */

function daily(){
  document.getElementById("verse").innerText="Daily verse";
}

function randomVerse(){
  document.getElementById("verse").innerText="Random verse";
}

function toggleFavorites(){
  document.getElementById("favBox").classList.toggle("hidden");
}

/* ================= SEARCH ================= */

function instantSearch(){
  const q=document.getElementById("q").value;
  document.getElementById("results").innerHTML =
    q ? `<div class="result-card">Search active</div>` : "";
}

function clearSearch(){
  document.getElementById("q").value="";
  document.getElementById("results").innerHTML="";
}

/* ================= STAR ================= */

function toggleFav(){
  const star=document.getElementById("star");
  star.innerText = star.innerText==="☆" ? "★" : "☆";
}

/* ================= THEME ================= */

function setTheme(m){
  document.documentElement.setAttribute(
    "data-theme",
    m==="dark"?"dark":"light"
  );
}

window.onload=init;

</script>

</body>
</html>
