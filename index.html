<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:70px 0 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
  z-index:1000;
}

.container{
  width:min(800px,92%);
  display:flex;
  flex-direction:column;
  align-items:stretch;
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.missionHero{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.verse{
  font-size:20px;
  line-height:1.6;
  margin:14px 0;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

button,select{
  padding:8px;
  margin:4px;
  border-radius:8px;
  border:1px solid #ccc;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:#fff;
}

.history,.favorites{
  display:none;
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid rgba(0,0,0,.1);
  max-height:200px;
  overflow:auto;
}

.small{
  position:fixed;
  right:10px;
  font-size:12px;
  opacity:.7;
}
.footer1{bottom:22px;}
.footer2{bottom:8px;}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="verse" id="verse">Loading...</div>
  <div class="ref" id="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">
  <select id="translation">
    <option value="kjv">KJV</option>
    <option value="web" selected>WEB</option>
    <option value="esv">ESV</option>
  </select>

  <select id="topic" onchange="topicChange()">
    <option value="daily">Verse of the Day</option>
    <option value="peace">Peace</option>
    <option value="strength">Strength</option>
    <option value="hope">Hope</option>
    <option value="anxiety">Anxiety</option>
  </select>

  <button onclick="toggleDark()">Dark Mode</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="encouragement()">Encourage Me</button>
  <button onclick="toggleHistory()">History</button>
  <button onclick="toggleFavorites()">Favorites</button>
</div>

<!-- PRAYER -->
<div class="card">
  <strong>Prayer</strong>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <strong>Reflection</strong>
  <div id="reflection"></div>
</div>

<!-- MISSION -->
<div class="missionHero">
  <strong>Parker Family Mission Statement</strong>
  <div id="missionText" style="margin-top:8px"></div>
</div>

</div>

<!-- HISTORY -->
<div class="card history" id="historyBox">
  <strong>History</strong>
  <div id="historyList"></div>
</div>

<!-- FAVORITES -->
<div class="card favorites" id="favBox">
  <strong>Favorites</strong>
  <div id="favList"></div>
</div>

<div class="small footer1">est 2013</div>
<div class="small footer2">The Parker Family</div>

<script>
let history = JSON.parse(localStorage.getItem('unshaken_history')||'[]');

/* =========================
   DAILY SYNC SYSTEM
========================= */

function getDayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

async function fetchDaily(){
  const key = getDayKey();
  const storageKey = "unshaken_daily_" + key;

  const cached = localStorage.getItem(storageKey);

  if(cached){
    const data = JSON.parse(cached);
    loadVerse(data.ref);
    return;
  }

  let r = await fetch('https://beta.ourmanna.com/api/v1/get/?format=json&order=daily');
  let d = await r.json();

  const ref = d.verse.details.reference;

  localStorage.setItem(storageKey, JSON.stringify({
    ref: ref,
    date: key
  }));

  loadVerse(ref);
}

/* =========================
   VERSE LOADER
========================= */

async function loadVerse(ref){
  let tr=document.getElementById('translation').value;

  let r=await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${tr}`);
  let d=await r.json();

  document.getElementById('verse').innerText=d.text;
  document.getElementById('ref').innerText=ref;

  setExtras();
}

/* =========================
   PRAYER + REFLECTION
========================= */

function getMode(){
  let h=new Date().getHours();
  return h<12?'morning':h<18?'day':'night';
}

const prayers={
  morning:["Guide me","Strength","Order steps","Faithful","Lead me"],
  day:["Focus","Wisdom","Patience","Anchored","Strength"],
  night:["Thank You","Calm","Forgive","Grateful","Rest"]
};

const reflections={
  morning:["Focus?","Walk?","Trust?","Challenge?","Identity?"],
  day:["Faith?","Patience?","Honor?","Distracted?","Encourage?"],
  night:["Seen God?","Grateful?","Missed?","Growth?","Tomorrow?"]
};

function idx(k,l){
  let i=parseInt(localStorage.getItem(k)||0);
  i=(i+1)%l;
  localStorage.setItem(k,i);
  return i;
}

function setExtras(){
  let m=getMode();

  document.getElementById('prayer').innerText =
    prayers[m][idx(m+'_p',5)];

  document.getElementById('reflection').innerText =
    reflections[m][idx(m+'_r',5)];
}

/* =========================
   CONTROLS
========================= */

function topicChange(){
  let v=document.getElementById('topic').value;

  const map={
    peace:"John 14:27",
    strength:"Philippians 4:13",
    hope:"Jeremiah 29:11",
    anxiety:"Philippians 4:6"
  };

  if(v==="daily") return fetchDaily();
  loadVerse(map[v]);
}

function encouragement(){
  loadVerse("Isaiah 41:10");
}

function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
  .then(r=>r.json())
  .then(d=>{
    loadVerse(d[0].bookname+" "+d[0].chapter+":"+d[0].verse);
  });
}

/* =========================
   THEME
========================= */

function toggleDark(){
  let t=document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme',t==='dark'?'light':'dark');
  localStorage.setItem('theme',t==='dark'?'light':'dark');
}

/* =========================
   UI LOAD
========================= */

function loadMission(){
  document.getElementById('missionText').innerText =
  localStorage.getItem('unshaken_mission') ||
  "As a family, we seek to follow Jesus faithfully, honor God in all we do, and love one another with patience and grace.";
}

window.onload=()=>{
  document.documentElement.setAttribute(
    'data-theme',
    localStorage.getItem('theme') || 'light'
  );

  loadMission();
  fetchDaily();
};
</script>

</body>
</html>
