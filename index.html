<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#fff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 60px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
}

.container{width:min(920px,92%);}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.section-title{
  font-weight:700;
  color:var(--accent);
  font-size:14px;
  margin-bottom:10px;
}

button,input,select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin:3px;
}

button{cursor:pointer;}
button:hover{background:var(--accent);color:#fff;}

.hidden{display:none !important;}

.verse-ref{
  font-weight:700;
  font-size:18px;
  color:var(--accent);
  margin-bottom:8px;
}

.verse-text{
  font-size:18px;
  line-height:1.6;
}

.star{
  font-size:24px;
  cursor:pointer;
  user-select:none;
}

.small{font-size:12px;color:var(--muted);}

.footer-left{
  position:fixed;
  left:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
  opacity:.7;
}

.footer-right{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:11px;
  color:var(--muted);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Verse</div>
  <div id="verse"></div>
  <div class="star" id="star" onclick="toggleFav()">☆</div>
</div>

<!-- CONTROLS -->
<div class="card">

  <button onclick="daily()">Daily</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="toggleSearch()">Search</button>
  <button onclick="toggleFavorites()">Favorites</button>

  <select id="translation" onchange="setTranslation(this.value)"></select>

  <select onchange="setTheme(this.value)">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>

</div>

<!-- SEARCH -->
<div class="card hidden" id="searchBox">
  <div class="section-title">Search</div>

  <input id="q" placeholder="Search verse...">

  <button onclick="search()">Search</button>
  <button onclick="clearSearch()">Clear Search</button>

  <div id="results"></div>
</div>

<!-- FAVORITES -->
<div class="card hidden" id="favBox">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

</div>

<div class="footer-left">Unshaken</div>

<div class="footer-right"
onclick="alert('As a family, we seek to follow Jesus faithfully, honor God in all we do, and love one another with patience and grace.')">
est. 2013 — The Parker Family
</div>

<script>

/* ================= TRANSLATIONS ================= */

const TRANSLATIONS = {
  web:  { file:"translations/web.txt",  name:"World English Bible (WEB)" },
  kjv:  { file:"translations/kjv.txt",  name:"King James Version (KJV)" },
  asv:  { file:"translations/asv.txt",  name:"American Standard Version (ASV)" },
  akjv: { file:"translations/akjv.txt", name:"American King James Version (AKJV)" },
  cpdv: { file:"translations/cpdv.txt", name:"Catholic Public Domain Version (CPDV)" }
};

let currentTranslation="web";
let canon={}, keys=[], currentKey=null;
let favs=JSON.parse(localStorage.getItem("fav")||"[]");

/* ================= THEME ================= */

function setTheme(mode){
  const dark =
    mode==="dark" ||
    (mode==="system" && window.matchMedia("(prefers-color-scheme: dark)").matches);

  document.documentElement.setAttribute("data-theme", dark?"dark":"light");
}

/* ================= LOAD ================= */

async function loadAll(){
  canon={};

  for(const t in TRANSLATIONS){
    const txt=await (await fetch(TRANSLATIONS[t].file)).text();

    txt.split("\n").forEach(line=>{
      line=line.trim();
      if(!line) return;

      const p=line.split(/\s+/);
      const i=p.findIndex(x=>x.includes(":"));
      if(i<0) return;

      const key=p.slice(0,i).join(" ")+" "+p[i];

      if(!canon[key]) canon[key]={};
      canon[key][t]=p.slice(i+1).join(" ");
    });
  }

  keys=Object.keys(canon);
  buildDropdown();
  daily();
}

/* ================= DROPDOWN ================= */

function buildDropdown(){
  const sel=document.getElementById("translation");

  sel.innerHTML=Object.keys(TRANSLATIONS).map(k=>
    `<option value="${k}">
      ${TRANSLATIONS[k].name}
    </option>`
  ).join("");
}

/* ================= SHOW ================= */

function show(key){
  currentKey=key;

  document.getElementById("verse").innerHTML=
  `<div class="verse-ref">${key}</div>
   <div class="verse-text">${canon[key][currentTranslation]||"[missing]"}</div>`;

  updateFav();

  document.getElementById("prayer").innerText="Walk faithfully today.";
  document.getElementById("reflection").innerText="What is God showing you?";
}

/* ================= CORE ================= */

function hash(i){
  let h=7;
  for(let c of String(i)) h=(h*31+c.charCodeAt(0))>>>0;
  return h;
}

function daily(){
  show(keys[hash(new Date().toDateString())%keys.length]);
}

function randomVerse(){
  show(keys[hash(Date.now())%keys.length]);
}

/* ================= TRANSLATION ================= */

function setTranslation(t){
  currentTranslation=t;
  if(currentKey) show(currentKey);
}

/* ================= SEARCH ================= */

function toggleSearch(){
  document.getElementById("searchBox").classList.toggle("hidden");
}

function search(){
  const q=document.getElementById("q").value.toLowerCase();

  const results=keys.filter(k=>{
    const all=k+" "+Object.values(canon[k]).join(" ");
    return all.toLowerCase().includes(q);
  }).slice(0,50);

  document.getElementById("results").innerHTML=
    results.map(k=>
      `<div style="padding:8px 0;cursor:pointer" onclick="show('${k}')">
        <b>${k}</b><br>
        <span class="small">${canon[k][currentTranslation]?.slice(0,120)||""}</span>
      </div>`
    ).join("");
}

/* ================= FIXED CLEAR SEARCH ================= */

function clearSearch(){
  const input=document.getElementById("q");
  const results=document.getElementById("results");

  if(input) input.value="";
  if(results) results.innerHTML="";
}

/* ================= FAVORITES ================= */

function toggleFav(){
  if(!currentKey) return;

  const i=favs.indexOf(currentKey);

  if(i>-1) favs.splice(i,1);
  else favs.push(currentKey);

  localStorage.setItem("fav",JSON.stringify(favs));

  updateFav();
  renderFav();
}

function updateFav(){
  if(!currentKey) return;
  document.getElementById("star").innerText =
    favs.includes(currentKey) ? "★" : "☆";
}

function toggleFavorites(){
  document.getElementById("favBox").classList.toggle("hidden");
  renderFav();
}

function renderFav(){
  const box=document.getElementById("favList");
  box.innerHTML="";

  favs.forEach(f=>{
    const d=document.createElement("div");
    d.style.cursor="pointer";
    d.innerText=f;
    d.onclick=()=>show(f);
    box.appendChild(d);
  });
}

/* ================= INIT ================= */

window.onload=loadAll;

</script>

</body>
</html>
