<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unshaken v1.7.10</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 60px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
  z-index:10;
}

.container{
  width:min(920px,92%);
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.section-title{
  font-family:Georgia;
  font-weight:700;
  text-transform:uppercase;
  color:var(--accent);
  font-size:14px;
  margin-bottom:10px;
}

button,input,select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin:3px;
  background:var(--card);
  color:var(--text);
}

button{cursor:pointer;}
button:hover{background:var(--accent);color:#fff;}

.hidden{display:none;}

.verse-ref{
  font-weight:700;
  font-size:18px;
  margin-bottom:8px;
  color:var(--accent);
}

.verse-text{
  font-size:18px;
  line-height:1.65;
}

.star{
  font-size:24px;
  cursor:pointer;
  user-select:none;
  margin-top:10px;
}

.result{
  padding:10px 0;
  border-bottom:1px solid rgba(0,0,0,.08);
  cursor:pointer;
}

.small{
  font-size:12px;
  color:var(--muted);
}

/* FOOTERS */
.footer-left{
  position:fixed;
  left:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
  opacity:0.7;
}

.footer-right{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:11px;
  color:var(--muted);
  cursor:pointer;
}

/* MODAL */
.mission-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.mission-card{
  width:min(520px,90%);
  background:var(--card);
  color:var(--text);
  padding:18px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Verse</div>
  <div id="verse"></div>
  <div class="star" id="star" onclick="toggleFavorite()">☆</div>
</div>

<!-- CONTROLS -->
<div class="card">
  <button onclick="loadDaily()">Daily</button>
  <button onclick="loadRandom()">Random</button>
  <button onclick="toggleSearch()">Search</button>
  <button onclick="toggleFavorites()">Favorites</button>

  <select onchange="setTheme(this.value)">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>
</div>

<!-- SEARCH -->
<div class="card hidden" id="searchBox">
  <div class="section-title">Search Bible</div>
  <input id="searchInput" placeholder="Search...">
  <button onclick="runSearch()">Search</button>
  <button onclick="clearSearch()">Clear</button>

  <div class="small" id="searchMeta"></div>
  <div id="searchResults"></div>
</div>

<!-- FAVORITES -->
<div class="card hidden" id="favoritesBox">
  <div class="section-title">Favorites</div>
  <div id="favoritesList"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

</div>

<!-- FOOTERS -->
<div class="footer-left">v1.7.10</div>

<div class="footer-right" onclick="toggleMission()">
  est. 2013 — The Parker Family
</div>

<!-- MISSION MODAL -->
<div id="missionModal" class="mission-modal hidden">
  <div class="mission-card">
    <div class="section-title">Family Mission</div>
    <div id="missionText"></div>
    <button onclick="toggleMission()">Close</button>
  </div>
</div>

<script>

/* ================= STATE ================= */

let bibleIndex = [];
let current = null;
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

const BIBLE_PATH = "translations/web.txt";

/* ================= LOAD BIBLE ================= */

async function loadBible(){
  const res = await fetch(BIBLE_PATH);
  const text = await res.text();

  bibleIndex = text
    .split("\n")
    .map(v => v.trim())
    .filter(Boolean)
    .map(line => {
      const parts = line.split(/\s+/);
      const refIndex = parts.findIndex(p => p.includes(":"));

      const book = parts.slice(0, refIndex).join(" ");
      const ref = parts[refIndex];
      const verseText = parts.slice(refIndex + 1).join(" ");

      return { book, ref, text: verseText };
    });

  loadDaily();
}

/* ================= HASH ================= */

function hashSeed(input){
  let hash = 81213;
  for(let i=0;i<String(input).length;i++){
    hash = (hash * 31 + String(input).charCodeAt(i)) >>> 0;
  }
  return hash;
}

/* ================= DAILY / RANDOM ================= */

function loadDaily(){
  const date = new Date().toISOString().split("T")[0];
  const seed = hashSeed(date);
  setVerse(bibleIndex[seed % bibleIndex.length]);
}

function loadRandom(){
  const seed = hashSeed(Date.now());
  setVerse(bibleIndex[seed % bibleIndex.length]);
}

/* ================= VERSE ================= */

function setVerse(v){
  current = v;

  document.getElementById("verse").innerHTML = `
    <div class="verse-ref">${v.book} ${v.ref}</div>
    <div class="verse-text">${v.text}</div>
  `;

  updateStar();
  updateDevotion(v);
}

/* ================= DEVOTION ================= */

function getTimeOfDay(){
  const h = new Date().getHours();
  if(h < 12) return "morning";
  if(h < 18) return "day";
  return "night";
}

function getDevotion(v){
  const t = getTimeOfDay();

  const base = {
    morning:{ prayer:"Guide my steps.", reflection:"How will I begin today?" },
    day:{ prayer:"Give me strength.", reflection:"How am I responding right now?" },
    night:{ prayer:"Thank You for today.", reflection:"Where did I see God today?" }
  };

  let prayer = base[t].prayer;
  let reflection = base[t].reflection;

  const txt = v.text.toLowerCase();

  if(txt.includes("fear")) prayer += " Remove fear.";
  if(txt.includes("love")) reflection += " Who can I love better?";

  return { prayer, reflection };
}

function updateDevotion(v){
  const d = getDevotion(v);
  document.getElementById("prayer").innerText = d.prayer;
  document.getElementById("reflection").innerText = d.reflection;
}

/* ================= FAVORITES ================= */

function toggleFavorite(){
  if(!current) return;

  const key = `${current.book} ${current.ref}`;
  const i = favorites.indexOf(key);

  if(i > -1) favorites.splice(i,1);
  else favorites.push(key);

  localStorage.setItem("fav", JSON.stringify(favorites));
  updateStar();
  renderFavorites();
}

function updateStar(){
  if(!current) return;
  const key = `${current.book} ${current.ref}`;
  document.getElementById("star").innerText =
    favorites.includes(key) ? "★" : "☆";
}

function toggleFavorites(){
  document.getElementById("favoritesBox").classList.toggle("hidden");
  renderFavorites();
}

function renderFavorites(){
  document.getElementById("favoritesList").innerHTML =
    favorites.length ? favorites.join("<br>") : "No favorites yet.";
}

/* ================= SEARCH ================= */

function toggleSearch(){
  document.getElementById("searchBox").classList.toggle("hidden");
}

function runSearch(){
  const q = document.getElementById("searchInput").value.toLowerCase();

  const results = bibleIndex.filter(v =>
    v.text.toLowerCase().includes(q)
  );

  document.getElementById("searchMeta").innerText =
    `Found ${results.length} results`;

  const box = document.getElementById("searchResults");
  box.innerHTML = "";

  results.slice(0,50).forEach(v=>{
    const el = document.createElement("div");
    el.className = "result";
    el.innerHTML = `<strong>${v.book} ${v.ref}</strong><br>${v.text}`;
    el.onclick = () => setVerse(v);
    box.appendChild(el);
  });
}

function clearSearch(){
  document.getElementById("searchInput").value = "";
  document.getElementById("searchMeta").innerText = "";
  document.getElementById("searchResults").innerHTML = "";
}

/* ================= THEME ================= */

function setTheme(mode){
  if(mode === "system"){
    const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  } else {
    document.documentElement.setAttribute("data-theme", mode);
  }
}

/* ================= MISSION MODAL ================= */

function getMissionStatement(){
  const theme = document.documentElement.getAttribute("data-theme");

  const base =
  "As a family, we seek to follow Jesus faithfully, honor God in all we do, and love one another with patience and grace.";

  if(theme === "dark"){
    return base + " We trust Him even in the night seasons.";
  }
  if(theme === "light"){
    return base + " We walk in gratitude and purpose each day.";
  }
  return base + " We trust God in every season.";
}

function toggleMission(){
  const modal = document.getElementById("missionModal");

  if(modal.classList.contains("hidden")){
    document.getElementById("missionText").innerText = getMissionStatement();
    modal.classList.remove("hidden");
  } else {
    modal.classList.add("hidden");
  }
}

/* ================= INIT ================= */

window.onload = () => {
  setTheme("system");
  loadBible();
};

</script>

</body>
</html>
