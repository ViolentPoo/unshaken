<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unshaken v1.7.9</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 60px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
  z-index:10;
}

.container{
  width:min(920px,92%);
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.section-title{
  font-family:Georgia,serif;
  font-weight:700;
  text-transform:uppercase;
  color:var(--accent);
  font-size:14px;
  margin-bottom:10px;
  letter-spacing:.5px;
}

button,input,select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin:3px;
  background:var(--card);
  color:var(--text);
}

button{
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:#fff;
}

.hidden{display:none;}

.verse-ref{
  font-weight:700;
  font-size:18px;
  margin-bottom:8px;
  color:var(--accent);
}

.verse-text{
  font-size:18px;
  line-height:1.65;
}

.star{
  font-size:24px;
  cursor:pointer;
  user-select:none;
  margin-top:10px;
}

.result{
  padding:10px 0;
  border-bottom:1px solid rgba(0,0,0,.08);
  cursor:pointer;
}

.result:hover{
  opacity:.85;
}

.small{
  font-size:12px;
  color:var(--muted);
}

/* VERSION FOOTER (BOTTOM LEFT) */
.footer-left{
  position:fixed;
  left:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
  opacity:0.7;
  user-select:none;
}

.footer{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:11px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Verse</div>
  <div id="verse"></div>
  <div class="star" id="star" onclick="toggleFavorite()">☆</div>
</div>

<!-- CONTROLS -->
<div class="card">
  <button onclick="loadDaily()">Daily</button>
  <button onclick="loadRandom()">Random</button>
  <button onclick="toggleSearch()">Search</button>
  <button onclick="toggleFavorites()">Favorites</button>

  <select onchange="setTheme(this.value)">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>
</div>

<!-- SEARCH -->
<div class="card hidden" id="searchBox">
  <div class="section-title">Search Bible</div>

  <input id="searchInput" placeholder="Search love, peace, hope...">
  <button onclick="runSearch()">Search</button>
  <button onclick="clearSearch()">Clear</button>

  <div class="small" id="searchMeta"></div>
  <div id="searchResults"></div>
</div>

<!-- FAVORITES -->
<div class="card hidden" id="favoritesBox">
  <div class="section-title">Favorites</div>
  <div id="favoritesList"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

</div>

<!-- VERSION LABEL -->
<div class="footer-left">v1.7.9</div>

<div class="footer">est. 2013 — The Parker Family</div>

<script>
/* ================= STATE ================= */

let bibleIndex = [];
let current = null;
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

/* ================= SMART PARSER ================= */

async function loadBible(){
  const res = await fetch("web.txt");
  const text = await res.text();

  bibleIndex = text
    .split("\n")
    .map(v => v.trim())
    .filter(Boolean)
    .map(line => {
      const parts = line.split(/\s+/);

      const refIndex = parts.findIndex(p => p.includes(":"));

      const book = parts.slice(0, refIndex).join(" ");
      const ref = parts[refIndex];
      const verseText = parts.slice(refIndex + 1).join(" ");

      return { book, ref, text: verseText };
    });

  loadDaily();
}

/* ================= HASH ================= */

function hashSeed(input){
  let hash = 81213;
  const str = String(input);

  for(let i=0;i<str.length;i++){
    hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
  }

  return hash;
}

/* ================= DAILY ================= */

function loadDaily(){
  if(!bibleIndex.length) return;

  const date = new Date().toISOString().split("T")[0];
  const seed = hashSeed(date);

  setVerse(bibleIndex[seed % bibleIndex.length]);
}

/* ================= RANDOM ================= */

function loadRandom(){
  if(!bibleIndex.length) return;

  const seed = hashSeed(Date.now());
  setVerse(bibleIndex[seed % bibleIndex.length]);
}

/* ================= VERSE ================= */

function setVerse(v){
  current = v;

  document.getElementById("verse").innerHTML = `
    <div class="verse-ref">${v.book} ${v.ref}</div>
    <div class="verse-text">${v.text}</div>
  `;

  updateStar();
  updateDevotion(v);
}

/* ================= TIME ================= */

function getTimeOfDay(){
  const h = new Date().getHours();
  if(h < 12) return "morning";
  if(h < 18) return "day";
  return "night";
}

/* ================= DEVOTIONAL ENGINE ================= */

function getVerseSegments(text){
  const parts = text.split(/(?<=[.!?])\s+/).filter(Boolean);
  return parts.slice(0,3);
}

function getDevotion(v){
  const t = getTimeOfDay();
  const segments = getVerseSegments(v.text);
  const focus = segments.join(" ").toLowerCase();

  const base = {
    morning:{
      prayer:"Guide my steps and focus my heart today.",
      reflection:"How can I begin this day with intention?"
    },
    day:{
      prayer:"Give me wisdom, strength, and patience today.",
      reflection:"Am I responding with grace in this moment?"
    },
    night:{
      prayer:"Thank You for today and grant me rest.",
      reflection:"Where did I notice God working today?"
    }
  };

  let prayer = base[t].prayer;
  let reflection = base[t].reflection;

  if(focus.includes("fear")){
    prayer += " Remove fear from my heart.";
    reflection += " What fear is influencing me?";
  }

  if(focus.includes("love")){
    prayer += " Help me love others well.";
    reflection += " Who needs love from me?";
  }

  if(focus.includes("peace")){
    prayer += " Fill me with peace.";
    reflection += " Where do I need to release control?";
  }

  if(focus.includes("hope")){
    prayer += " Anchor my hope in You.";
    reflection += " What am I placing hope in?";
  }

  if(segments.length){
    reflection += ` (Verse focus: "${segments[0].slice(0,70)}...")`;
  }

  return { prayer, reflection };
}

function updateDevotion(v){
  const d = getDevotion(v);
  document.getElementById("prayer").innerText = d.prayer;
  document.getElementById("reflection").innerText = d.reflection;
}

/* ================= FAVORITES ================= */

function toggleFavorite(){
  if(!current) return;

  const key = `${current.book} ${current.ref}`;
  const i = favorites.indexOf(key);

  if(i > -1) favorites.splice(i,1);
  else favorites.push(key);

  localStorage.setItem("fav", JSON.stringify(favorites));

  updateStar();
  renderFavorites();
}

function updateStar(){
  if(!current) return;

  const key = `${current.book} ${current.ref}`;
  document.getElementById("star").innerText =
    favorites.includes(key) ? "★" : "☆";
}

function toggleFavorites(){
  document.getElementById("favoritesBox").classList.toggle("hidden");
  renderFavorites();
}

function renderFavorites(){
  document.getElementById("favoritesList").innerHTML =
    favorites.length ? favorites.join("<br>") : "No favorites yet.";
}

/* ================= SEARCH ================= */

function toggleSearch(){
  document.getElementById("searchBox").classList.toggle("hidden");
}

function runSearch(){
  const q = document.getElementById("searchInput").value.toLowerCase();
  const results = bibleIndex.filter(v =>
    v.text.toLowerCase().includes(q)
  );

  document.getElementById("searchMeta").innerText =
    `Found ${results.length} results`;

  const box = document.getElementById("searchResults");
  box.innerHTML = "";

  results.slice(0,50).forEach(v=>{
    const el = document.createElement("div");
    el.className = "result";
    el.innerHTML = `<strong>${v.book} ${v.ref}</strong><br>${v.text}`;
    el.onclick = () => setVerse(v);
    box.appendChild(el);
  });
}

function clearSearch(){
  document.getElementById("searchInput").value = "";
  document.getElementById("searchMeta").innerText = "";
  document.getElementById("searchResults").innerHTML = "";
}

/* ================= THEME ================= */

function setTheme(mode){
  if(mode === "system"){
    const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  } else {
    document.documentElement.setAttribute("data-theme", mode);
  }
}

/* ================= INIT ================= */

window.onload = () => {
  setTheme("system");
  loadBible();
};
</script>

</body>
</html>
