<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unshaken v1.7.14</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 60px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
}

.container{
  width:min(920px,92%);
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.section-title{
  font-family:Georgia;
  font-weight:700;
  text-transform:uppercase;
  color:var(--accent);
  font-size:14px;
  margin-bottom:10px;
}

button,input,select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin:3px;
  background:var(--card);
  color:var(--text);
}

button{cursor:pointer;}
button:hover{background:var(--accent);color:#fff;}

.hidden{display:none !important;}

.verse-ref{
  font-weight:700;
  font-size:18px;
  margin-bottom:8px;
  color:var(--accent);
}

.verse-text{
  font-size:18px;
  line-height:1.65;
}

.star{
  font-size:24px;
  cursor:pointer;
  user-select:none;
  margin-top:10px;
}

.result{
  padding:10px 0;
  border-bottom:1px solid rgba(0,0,0,.08);
  cursor:pointer;
}

.small{
  font-size:12px;
  color:var(--muted);
}

.footer-left{
  position:fixed;
  left:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
  opacity:0.7;
}

.footer-right{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:11px;
  color:var(--muted);
  cursor:pointer;
}

/* MODAL */
.mission-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.mission-card{
  width:min(520px,90%);
  background:var(--card);
  color:var(--text);
  padding:18px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse</div>

<div class="container">

<div class="card">
  <div class="section-title">Verse</div>
  <div id="verse"></div>
  <div class="star" id="star" onclick="toggleFavorite()">☆</div>
</div>

<div class="card">

  <button onclick="loadDaily()">Daily</button>
  <button onclick="loadRandom()">Random</button>
  <button onclick="toggleSearch()">Search</button>
  <button onclick="toggleFavorites()">Favorites</button>

  <select id="translationSelect" onchange="changeTranslation(this.value)"></select>

  <select onchange="setTheme(this.value)">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>

</div>

<!-- SEARCH -->
<div class="card hidden" id="searchBox">
  <div class="section-title">Search</div>
  <input id="searchInput" placeholder="Search verses...">
  <button onclick="runSearch()">Search</button>
  <button onclick="clearSearch()">Clear</button>
  <div id="searchResults"></div>
</div>

<!-- FAVORITES -->
<div class="card hidden" id="favoritesBox">
  <div class="section-title">Favorites</div>
  <div id="favoritesList"></div>
</div>

<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

</div>

<div class="footer-left">v1.7.14</div>

<div class="footer-right" onclick="toggleMission()">
  est. 2013 — The Parker Family
</div>

<div id="missionModal" class="mission-modal hidden">
  <div class="mission-card">
    <div class="section-title">Family Mission</div>
    <div id="missionText"></div>
    <button onclick="toggleMission()">Close</button>
  </div>
</div>

<script>

const TRANSLATIONS = {
  web:{file:"translations/web.txt",name:"WEB"},
  kjv:{file:"translations/kjv.txt",name:"KJV"},
  asv:{file:"translations/asv.txt",name:"ASV"},
  akjv:{file:"translations/akjv.txt",name:"AKJV"},
  cpdv:{file:"translations/cpdv.txt",name:"CPDV"}
};

let currentTranslation="web";
let bibleIndex=[];
let current=null;
let favorites=JSON.parse(localStorage.getItem("fav")||"[]");

function setTheme(mode){
  const dark=
    mode==="dark"||
    (mode==="system"&&window.matchMedia("(prefers-color-scheme: dark)").matches);

  document.documentElement.setAttribute("data-theme",dark?"dark":"light");
}

function buildTranslationDropdown(){
  const sel=document.getElementById("translationSelect");
  sel.innerHTML=Object.keys(TRANSLATIONS).map(k=>
    `<option value="${k}">${TRANSLATIONS[k].name}</option>`
  ).join("");
}

async function loadBible(){
  const res=await fetch(TRANSLATIONS[currentTranslation].file);
  const text=await res.text();

  bibleIndex=text.split("\n").map(l=>l.trim()).filter(Boolean).map(line=>{
    const p=line.split(/\s+/);
    const i=p.findIndex(x=>x.includes(":"));

    return{
      book:p.slice(0,i).join(" "),
      ref:p[i],
      text:p.slice(i+1).join(" ")
    };
  });

  loadDaily();
}

function setVerse(v){
  current=v;

  document.getElementById("verse").innerHTML=
  `<div class="verse-ref">${v.book} ${v.ref}</div>
   <div class="verse-text">${v.text}</div>`;

  updateStar();
  updateDevotion();
}

function hashSeed(i){
  let h=81213;
  for(let c=0;c<String(i).length;c++){
    h=(h*31+String(i).charCodeAt(c))>>>0;
  }
  return h;
}

function loadDaily(){
  const d=new Date().toDateString();
  setVerse(bibleIndex[hashSeed(d)%bibleIndex.length]);
}

function loadRandom(){
  setVerse(bibleIndex[hashSeed(Date.now())%bibleIndex.length]);
}

function updateDevotion(){
  document.getElementById("prayer").innerText="Walk faithfully today.";
  document.getElementById("reflection").innerText="What is God showing you?";
}

/* FAVORITES */
function toggleFavorite(){
  if(!current)return;

  const key=`${current.book} ${current.ref}`;
  const i=favorites.indexOf(key);

  if(i>-1)favorites.splice(i,1);
  else favorites.push(key);

  localStorage.setItem("fav",JSON.stringify(favorites));

  updateStar();
  renderFavorites();
}

function updateStar(){
  if(!current)return;

  const key=`${current.book} ${current.ref}`;
  document.getElementById("star").innerText=
  favorites.includes(key)?"★":"☆";
}

function renderFavorites(){
  const box=document.getElementById("favoritesList");
  box.innerHTML="";

  favorites.forEach(f=>{
    const div=document.createElement("div");
    div.className="result";
    div.innerText=f;

    div.onclick=()=>{
      const m=bibleIndex.find(v=>`${v.book} ${v.ref}`===f);
      if(m)setVerse(m);
    };

    box.appendChild(div);
  });
}

/* SEARCH FIXED */
function runSearch(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const out=document.getElementById("searchResults");

  const matches=bibleIndex.filter(v=>
    (v.book+" "+v.ref+" "+v.text).toLowerCase().includes(q)
  ).slice(0,50);

  out.innerHTML=matches.map(v=>
    `<div class="result" onclick="setVerseFromSearch('${v.book}','${v.ref}')">
      <strong>${v.book} ${v.ref}</strong><br>
      <span class="small">${v.text.slice(0,120)}...</span>
    </div>`
  ).join("");
}

function setVerseFromSearch(book,ref){
  const m=bibleIndex.find(v=>v.book===book&&v.ref===ref);
  if(m)setVerse(m);
}

function clearSearch(){
  document.getElementById("searchInput").value="";
  document.getElementById("searchResults").innerHTML="";
}

function toggleSearch(){
  document.getElementById("searchBox").classList.toggle("hidden");
}

function toggleFavorites(){
  document.getElementById("favoritesBox").classList.toggle("hidden");
  renderFavorites();
}

function changeTranslation(t){
  currentTranslation=t;
  loadBible();
}

function toggleMission(){
  const m=document.getElementById("missionModal");

  if(m.classList.contains("hidden")){
    document.getElementById("missionText").innerText=
    "As a family, we seek to follow Jesus faithfully, honor God in all we do, and love one another with patience and grace.";
    m.classList.remove("hidden");
  }else{
    m.classList.add("hidden");
  }
}

window.onload=()=>{
  setTheme("system");
  buildTranslationDropdown();
  loadBible();
};

</script>

</body>
</html>
