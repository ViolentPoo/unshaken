<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:70px 0 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
  z-index:1000;
}

.container{
  width:min(800px,92%);
  display:flex;
  flex-direction:column;
  align-items:stretch;
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.verse{
  font-size:20px;
  line-height:1.6;
  margin:14px 0;
  min-height:60px;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

button,select{
  padding:8px;
  margin:4px;
  border-radius:8px;
  border:1px solid #ccc;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:#fff;
}

.favorites{
  display:none;
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid rgba(0,0,0,.1);
  max-height:200px;
  overflow:auto;
}

.small{
  position:fixed;
  right:10px;
  font-size:12px;
  opacity:.7;
}
.footer1{bottom:22px;}
.footer2{bottom:8px;}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="verse" id="verse">Loading...</div>
  <div class="ref" id="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">
  <select id="translation">
    <option value="kjv">KJV</option>
    <option value="web" selected>WEB</option>
    <option value="esv">ESV</option>
  </select>

  <select id="topic" onchange="topicChange()">
    <option value="daily">Verse of the Day</option>
    <option value="peace">Peace</option>
    <option value="strength">Strength</option>
    <option value="hope">Hope</option>
    <option value="anxiety">Anxiety</option>
  </select>

  <button onclick="toggleDark()">Dark Mode</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="encouragement()">Encourage Me</button>

  <button onclick="toggleFavorites()">Favorites</button>
  <button onclick="addFavorite()">⭐ Save Favorite</button>
</div>

<!-- PRAYER -->
<div class="card">
  <strong>Prayer</strong>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <strong>Reflection</strong>
  <div id="reflection"></div>
</div>

<!-- MISSION -->
<div class="card">
  <strong>Parker Family Mission Statement</strong>
  <div id="missionText" style="margin-top:8px"></div>
</div>

<!-- FAVORITES -->
<div class="card favorites" id="favBox">
  <strong>Favorites</strong>
  <div id="favList"></div>
</div>

</div>

<div class="small footer1">est 2013</div>
<div class="small footer2">The Parker Family</div>

<script>

/* =========================
   STATE
========================= */

let favorites = JSON.parse(localStorage.getItem('unshaken_favs') || '[]');

let currentRef = "";
let currentText = "";

/* =========================
   DAILY VERSE SYNC
========================= */

function getDayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

async function fetchDaily(){
  const key = getDayKey();
  const storageKey = "unshaken_daily_" + key;

  const cached = localStorage.getItem(storageKey);

  if(cached){
    const data = JSON.parse(cached);
    loadVerse(data.ref);
    return;
  }

  let r = await fetch('https://beta.ourmanna.com/api/v1/get/?format=json&order=daily');
  let d = await r.json();

  const ref = d?.verse?.details?.reference || "John 14:27";

  localStorage.setItem(storageKey, JSON.stringify({
    ref,
    date: key
  }));

  loadVerse(ref);
}

/* =========================
   SAFE VERSE LOADER
========================= */

async function loadVerse(ref){
  try{
    let tr = document.getElementById('translation').value;

    let r = await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${tr}`);
    let d = await r.json();

    let text = d?.text?.trim();

    if(!text) throw new Error("Empty verse");

    document.getElementById('verse').innerText = text;
    document.getElementById('ref').innerText = ref;

    currentRef = ref;
    currentText = text;

  } catch(e){
    document.getElementById('verse').innerText =
      "Verse unavailable right now. Please try again.";

    document.getElementById('ref').innerText = ref || "";
  }
}

/* =========================
   PRAYER + REFLECTION
========================= */

function getMode(){
  let h = new Date().getHours();
  return h < 12 ? 'morning' : h < 18 ? 'day' : 'night';
}

const prayers = {
  morning:["Guide me","Strength","Order my steps","Faithfulness","Lead me"],
  day:["Focus","Wisdom","Patience","Anchored","Strength"],
  night:["Thank You","Peace","Forgiveness","Gratitude","Rest"]
};

const reflections = {
  morning:["Am I ready?","Am I trusting?","Am I steady?","Am I focused?","Am I faithful?"],
  day:["Am I distracted?","Am I patient?","Am I honoring God?","Am I kind?","Am I steady?"],
  night:["Did I grow?","Was I grateful?","Did I trust?","Where did I struggle?","What did I learn?"]
};

function idx(key,max){
  let i = parseInt(localStorage.getItem(key) || 0);
  i = (i + 1) % max;
  localStorage.setItem(key, i);
  return i;
}

function setExtras(){
  let m = getMode();

  document.getElementById('prayer').innerText =
    prayers[m][idx(m+"_p",5)];

  document.getElementById('reflection').innerText =
    reflections[m][idx(m+"_r",5)];
}

/* =========================
   MISSION
========================= */

function loadMission(){
  document.getElementById('missionText').innerText =
  localStorage.getItem('unshaken_mission') ||
  "As a family, we seek to follow Jesus faithfully, honor God in all we do, and love one another with patience and grace.";
}

/* =========================
   FAVORITES
========================= */

function addFavorite(){
  if(!currentRef) return;

  if(!favorites.some(f => f.ref === currentRef)){
    favorites.push({ ref: currentRef, text: currentText });
    localStorage.setItem('unshaken_favs', JSON.stringify(favorites));
    renderFavorites();
  }
}

function renderFavorites(){
  let el = document.getElementById('favList');
  el.innerHTML = '';

  favorites.forEach(f => {
    let div = document.createElement('div');
    div.style.cursor = "pointer";
    div.style.margin = "6px 0";
    div.innerText = f.ref;
    div.onclick = () => loadVerse(f.ref);
    el.appendChild(div);
  });
}

function toggleFavorites(){
  let b = document.getElementById('favBox');
  b.style.display = (b.style.display === 'block' ? 'none' : 'block');
}

/* =========================
   CONTROLS
========================= */

function topicChange(){
  let v = document.getElementById('topic').value;

  const map = {
    peace:"John 14:27",
    strength:"Philippians 4:13",
    hope:"Jeremiah 29:11",
    anxiety:"Philippians 4:6"
  };

  if(v === "daily") return fetchDaily();
  loadVerse(map[v]);
}

function encouragement(){
  loadVerse("Isaiah 41:10");
}

function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
  .then(r => r.json())
  .then(d => {
    loadVerse(d[0].bookname + " " + d[0].chapter + ":" + d[0].verse);
  });
}

function toggleDark(){
  let t = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'light' : 'dark');
  localStorage.setItem('theme', t === 'dark' ? 'light' : 'dark');
}

/* =========================
   INIT
========================= */

window.onload = () => {
  document.documentElement.setAttribute(
    'data-theme',
    localStorage.getItem('theme') || 'light'
  );

  loadMission();
  renderFavorites();
  fetchDaily();
  setExtras();
};

</script>

</body>
</html>
