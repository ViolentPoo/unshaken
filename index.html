<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:70px 0 50px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
  z-index:1000;
}

.container{
  width:min(800px,92%);
  display:flex;
  flex-direction:column;
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.verse{
  font-size:20px;
  line-height:1.6;
  min-height:60px;
  margin:14px 0;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

button,select{
  padding:8px;
  margin:4px;
  border-radius:8px;
  border:1px solid #ccc;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:#fff;
}

.panel{
  display:none;
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid rgba(0,0,0,.1);
  max-height:200px;
  overflow:auto;
}

.small{
  position:fixed;
  right:10px;
  font-size:12px;
  opacity:.7;
}
.footer1{bottom:22px;}
.footer2{bottom:8px;}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="verse" id="verse">Loading...</div>
  <div class="ref" id="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">
  <select id="translation">
    <option value="kjv">KJV</option>
    <option value="web" selected>WEB</option>
    <option value="esv">ESV</option>
  </select>

  <select id="topic" onchange="topicChange()">
    <option value="daily">Verse of the Day</option>
    <option value="peace">Peace</option>
    <option value="strength">Strength</option>
    <option value="hope">Hope</option>
    <option value="anxiety">Anxiety</option>
  </select>

  <button onclick="toggleDark()">Dark Mode</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="encouragement()">Encourage Me</button>

  <button onclick="toggleFavorites()">Favorites</button>
  <button onclick="addFavorite()">⭐ Save Favorite</button>

  <button onclick="toggleHistory()">History</button>
</div>

<!-- PRAYER -->
<div class="card">
  <strong>Prayer</strong>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <strong>Reflection</strong>
  <div id="reflection"></div>
</div>

<!-- FAVORITES -->
<div class="card panel" id="favBox">
  <strong>Favorites</strong>
  <div id="favList"></div>
</div>

<!-- HISTORY -->
<div class="card panel" id="historyBox">
  <strong>History</strong>
  <div id="historyList"></div>

  <button onclick="clearHistory()" style="margin-top:10px;">
    Clear History
  </button>
</div>

<!-- MISSION -->
<div class="card">
  <strong>Parker Family Mission Statement</strong>
  <div id="missionText" style="margin-top:8px;"></div>
</div>

</div>

<div class="small footer1">est 2013</div>
<div class="small footer2">The Parker Family</div>

<script>

/* =========================
   SAFE STATE
========================= */

let currentRef = "";
let currentText = "";

let favorites = JSON.parse(localStorage.getItem('unshaken_favs') || '[]');
let history = JSON.parse(localStorage.getItem('unshaken_history') || '[]');

/* =========================
   SAFE INIT (FIXED CRASH POINT)
========================= */

window.onload = () => {
  try {
    document.documentElement.setAttribute(
      'data-theme',
      localStorage.getItem('theme') || 'light'
    );

    const mission = document.getElementById('missionText');
    if (mission) {
      mission.innerText =
        localStorage.getItem('unshaken_mission') ||
        "As a family, we seek to follow Jesus faithfully, honor God in all we do, and love one another with patience and grace.";
    }

    renderHistory?.();
    renderFavorites?.();
    fetchDaily();

  } catch (e) {
    console.error("Init error:", e);
  }
};

/* =========================
   DAILY VERSE
========================= */

function getDayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

async function fetchDaily(){
  try {
    const key = getDayKey();
    const storageKey = "unshaken_daily_" + key;

    const cached = localStorage.getItem(storageKey);

    if(cached){
      loadVerse(JSON.parse(cached).ref);
      return;
    }

    let r = await fetch('https://beta.ourmanna.com/api/v1/get/?format=json&order=daily');
    let d = await r.json();

    const ref = d?.verse?.details?.reference || "John 14:27";

    localStorage.setItem(storageKey, JSON.stringify({ ref, date:key }));

    loadVerse(ref);

  } catch (e) {
    console.error("Daily fetch failed:", e);
    loadVerse("John 14:27");
  }
}

/* =========================
   VERSE LOADER (FIXED SAFETY)
========================= */

async function loadVerse(ref){
  if(!ref) return;

  try{
    let tr = document.getElementById('translation').value;

    let r = await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${tr}`);
    let d = await r.json();

    let text = d?.text?.trim();

    if(!text) throw new Error("No verse text");

    document.getElementById('verse').innerText = text;
    document.getElementById('ref').innerText = ref;

    currentRef = ref;
    currentText = text;

    setExtras();
    addToHistory(ref);

  } catch(e){
    console.error(e);

    document.getElementById('verse').innerText =
      "Verse temporarily unavailable.";

    document.getElementById('ref').innerText = ref || "";
  }
}

/* =========================
   DEVOTIONAL ALIGNMENT
========================= */

const devotional = {
  peace:{ prayer:"Lord, bring peace.", reflection:"Where do I need peace?" },
  strength:{ prayer:"God, strengthen me.", reflection:"Where do I need courage?" },
  hope:{ prayer:"Lord, give hope.", reflection:"What am I trusting?" },
  anxiety:{ prayer:"Jesus, calm me.", reflection:"What fear must I release?" },
  daily:{ prayer:"Guide me today.", reflection:"What is God saying?" }
};

function setExtras(){
  let t = document.getElementById('topic').value;
  let d = devotional[t] || devotional.daily;

  document.getElementById('prayer').innerText = d.prayer;
  document.getElementById('reflection').innerText = d.reflection;
}

/* =========================
   HISTORY (FIXED)
========================= */

function addToHistory(ref){
  if(history.length && history[0]?.ref === ref) return;

  history.unshift({ ref });
  history = history.slice(0, 50);

  localStorage.setItem('unshaken_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  let el = document.getElementById('historyList');
  if(!el) return;

  el.innerHTML = '';

  history.forEach(h => {
    let div = document.createElement('div');
    div.style.cursor = "pointer";
    div.style.margin = "6px 0";
    div.innerText = h.ref;
    div.onclick = () => loadVerse(h.ref);
    el.appendChild(div);
  });
}

function toggleHistory(){
  let b = document.getElementById('historyBox');
  if(!b) return;
  b.style.display = b.style.display === 'block' ? 'none' : 'block';
}

function clearHistory(){
  if(!confirm("Clear all history?")) return;

  history = [];
  localStorage.removeItem('unshaken_history');
  renderHistory();
}

/* =========================
   FAVORITES (SAFE)
========================= */

function addFavorite(){
  if(!currentRef) return;

  if(!favorites.some(f => f.ref === currentRef)){
    favorites.push({ ref: currentRef, text: currentText });

    localStorage.setItem('unshaken_favs', JSON.stringify(favorites));
    renderFavorites();
  }
}

function renderFavorites(){
  let el = document.getElementById('favList');
  if(!el) return;

  el.innerHTML = '';

  favorites.forEach(f => {
    let div = document.createElement('div');
    div.style.cursor = "pointer";
    div.style.margin = "6px 0";
    div.innerText = f.ref;
    div.onclick = () => loadVerse(f.ref);
    el.appendChild(div);
  });
}

function toggleFavorites(){
  let b = document.getElementById('favBox');
  if(!b) return;
  b.style.display = b.style.display === 'block' ? 'none' : 'block';
}

/* =========================
   CONTROLS
========================= */

function topicChange(){
  let v = document.getElementById('topic').value;

  const map = {
    peace:"John 14:27",
    strength:"Philippians 4:13",
    hope:"Jeremiah 29:11",
    anxiety:"Philippians 4:6",
    daily:"daily"
  };

  if(v === "daily") return fetchDaily();
  loadVerse(map[v]);
}

function encouragement(){
  loadVerse("Isaiah 41:10");
}

function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
  .then(r=>r.json())
  .then(d=>{
    loadVerse(d[0].bookname+" "+d[0].chapter+":"+d[0].verse);
  });
}

/* =========================
   THEME
========================= */

function toggleDark(){
  let t = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', t==='dark'?'light':'dark');
  localStorage.setItem('theme', t==='dark'?'light':'dark');
}

</script>

</body>
</html>
