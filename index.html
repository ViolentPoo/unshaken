<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#fff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 40px;
  display:flex;
  justify-content:center;
  transition:0.3s;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:var(--accent);
  color:white;
  text-align:center;
  padding:14px;
  font-weight:700;
}

.container{ width:min(850px,92%); }

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-top:14px;
}

.section-title{
  font-family:Georgia;
  font-weight:700;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:8px;
}

.verse-line{
  font-size:1.15rem;
  line-height:1.6;
}

.ref{
  margin-top:10px;
  color:var(--accent);
  font-weight:700;
}

button,select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:white;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.footer{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="topbar">Unshaken</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Daily Verse</div>

  <div id="verse"></div>
  <div id="ref" class="ref"></div>

  <div id="status" style="margin-top:8px;font-size:12px;color:var(--muted);"></div>
</div>

<!-- CONTROLS -->
<div class="card">

<div class="controls">

  <button onclick="loadDaily()">Load Daily Verse</button>
  <button onclick="randomVerse()">Random</button>

  <select onchange="setTheme(this.value)" id="themeSelect">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>

</div>

</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

</div>

<div class="footer">
  est. 2013 — The Parker Family
</div>

<script>

/* ================= THEME ================= */

function applyTheme(mode){
  localStorage.setItem("themeMode", mode);

  if(mode === "system"){
    const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    return;
  }

  document.documentElement.setAttribute("data-theme", mode);
}

function setTheme(mode){
  applyTheme(mode);
}

(function(){
  const saved = localStorage.getItem("themeMode") || "system";
  applyTheme(saved);

  const select = document.getElementById("themeSelect");
  if(select) select.value = saved;
})();

/* ================= API CONFIG ================= */

const API_BASE = "https://your-api.com/daily-verse";

/* ================= SEED GENERATOR ================= */

function getDailySeed(){
  const d = new Date().toISOString().split("T")[0];

  let hash = 0;
  for(let i=0;i<d.length;i++){
    hash = (hash * 31 + d.charCodeAt(i)) >>> 0;
  }

  return hash + 812;
}

/* ================= VERSE RENDER ================= */

function renderVerse(v){
  const box = document.getElementById("verse");
  box.innerHTML = "";

  v.text.forEach(line=>{
    const div = document.createElement("div");
    div.className = "verse-line";
    div.innerText = line;
    box.appendChild(div);
  });

  document.getElementById("ref").innerText = v.ref;
}

/* ================= PRAYER ENGINE ================= */

function detectTheme(text){
  const t = text.join(" ").toLowerCase();

  if(t.includes("fear")) return "peace";
  if(t.includes("love")) return "love";
  if(t.includes("strength")) return "strength";
  if(t.includes("hope")) return "hope";

  return "peace";
}

const prayerMap={
  love:"Help me reflect Your love today.",
  peace:"Bring peace to my heart.",
  strength:"Give me strength when I am weak.",
  hope:"Renew my hope in You."
};

const reflectionMap={
  love:"How can I love others better?",
  peace:"What is disturbing my peace?",
  strength:"Where do I need strength?",
  hope:"What am I trusting God for?"
};

function updateDevotion(v){
  const theme = detectTheme(v.text);

  document.getElementById("prayer").innerText =
    prayerMap[theme];

  document.getElementById("reflection").innerText =
    reflectionMap[theme];
}

/* ================= DAILY VERSE (API) ================= */

async function loadDaily(){
  const seed = getDailySeed();

  document.getElementById("status").innerText =
    "Loading daily verse...";

  try{
    const res = await fetch(`${API_BASE}?seed=${seed}`);
    const data = await res.json();

    renderVerse(data.verse);
    updateDevotion(data.verse);

    document.getElementById("status").innerText =
      "Synced daily verse ✔";

  } catch(e){
    document.getElementById("status").innerText =
      "Failed to load verse (offline fallback needed)";
  }
}

/* ================= RANDOM (local fallback) ================= */

function randomVerse(){
  const fallback = {
    ref:"Psalm 23:1",
    text:[
      "The Lord is my shepherd",
      "I lack nothing"
    ]
  };

  renderVerse(fallback);
  updateDevotion(fallback);
}

/* ================= INIT ================= */

window.onload=()=>{
  loadDaily();
};

</script>

</body>
</html>
