<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unshaken</title>

<style>
:root{
  --bg:#f6f7fb;
  --text:#0f172a;
  --card:#ffffff;
  --accent:#3b82f6;
  --accent2:#6366f1;
  --muted:#64748b;
  --border:#e5e7eb;
  --shadow:0 10px 25px rgba(0,0,0,0.06);
  --radius:16px;
}

[data-theme="dark"]{
  --bg:#0b1220;
  --text:#e2e8f0;
  --card:#111827;
  --accent:#60a5fa;
  --accent2:#818cf8;
  --muted:#94a3b8;
  --border:#1f2937;
  --shadow:0 10px 30px rgba(0,0,0,0.4);
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:var(--bg);
  color:var(--text);
  padding:80px 0 70px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:white;
  text-align:center;
  padding:14px;
  font-weight:700;
}

.container{width:min(900px,92%);}

.card{
  background:var(--card);
  padding:16px;
  border-radius:var(--radius);
  margin-top:14px;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
}

.section-title,
.verse-section-title{
  font-size:13px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:10px;
  text-transform:uppercase;
}

button,select,input{
  padding:9px 12px;
  border-radius:12px;
  border:1px solid var(--border);
  margin:3px;
  background:var(--card);
  color:var(--text);
  font:inherit;
}

button:hover{
  background:var(--accent);
  color:white;
  cursor:pointer;
}

.star{font-size:28px;cursor:pointer;}

.list-item{
  padding:12px;
  border-radius:14px;
  border:1px solid var(--border);
  margin-bottom:10px;
  cursor:pointer;
  position:relative;
}

.ref{font-weight:700;}
.preview{font-size:12px;color:var(--muted);margin-top:4px;}

.hero-card{
  padding:14px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  margin-bottom:12px;
}

.hero-ref{font-weight:800;}
.hero-text{font-size:12px;margin-top:6px;}

.fav-remove{
  position:absolute;
  right:12px;
  top:10px;
  font-size:18px;
  color:gold;
  cursor:pointer;
}

.footer-left,
.footer-right{
  position:fixed;
  bottom:10px;
  font-size:11px;
  color:var(--muted);
}

.footer-left{left:10px;}
.footer-right{right:10px;cursor:pointer;}

.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal{
  background:var(--card);
  padding:18px;
  border-radius:var(--radius);
  width:min(520px,90%);
}

.hidden{display:none !important;}
</style>
</head>

<body>

<div class="topbar">Unshaken</div>

<div class="container">

<div class="card">
  <div class="verse-section-title" id="verse-title">Verse</div>
  <div id="verse">Loading...</div>
  <div class="star" id="star" onclick="toggleFav()">☆</div>
</div>

<div class="card">
  <button onclick="daily()">Daily</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="toggleSearch()">Search</button>
  <button onclick="toggleFavorites()">Favorites</button>

  <select id="translation" onchange="setTranslation(this.value)"></select>

  <select id="themeSelect" onchange="changeTheme(this.value)">
    <option value="system">System</option>
    <option value="light">Light</option>
    <option value="dark">Dark</option>
  </select>
</div>

<div class="card hidden" id="searchBox">
  <div class="section-title">Search</div>
  <input id="q" oninput="instantSearch()" placeholder="Search verses...">
  <button onclick="clearSearch()">Clear</button>
  <div id="hero"></div>
  <div id="results"></div>
</div>

<div class="card hidden" id="favBox">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer">Loading prayer...</div>
</div>

<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection">Loading reflection...</div>
</div>

</div>

<div class="footer-left">Unshaken</div>
<div class="footer-right" onclick="openMission()">est. 2013 — The Parker Family</div>

<div class="modal-backdrop" id="missionModal" onclick="closeMission(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Parker Family Mission Statement</h3>
    <p>As a family, we seek to follow Jesus faithfully, honor God in all we do, and love one another with patience and grace.</p>
    <button onclick="closeMission()">Close</button>
  </div>
</div>

<script>

const TRANSLATIONS={
  web:"World English Bible (WEB)",
  kjv:"King James Version (KJV)",
  asv:"American Standard Version (ASV)",
  akjv:"American King James Version (AKJV)",
  cpdv:"Catholic Public Domain Version (CPDV)"
};

const DAILY_SEED=81213;

let canon={},keys=[],currentKey=null;
let currentTranslation="web";
let favs=JSON.parse(localStorage.getItem("fav")||"[]");

let EXTRAS={
  prayers:["Walk faithfully today."],
  reflections:["What is God showing you?"],
  topics:{}
};

let dailyKeyForExtras=null;

function formatVerse(t){
  return t ? t.trim().charAt(0).toUpperCase()+t.trim().slice(1) : "";
}

function hash(s){
  let h=0;
  for(let i=0;i<s.length;i++){
    h=(h*31+s.charCodeAt(i))>>>0;
  }
  return h;
}

function getDaily(){
  if(!keys.length) return null;
  const h=hash(new Date().toDateString()+DAILY_SEED);
  return keys[h%keys.length];
}

function getDailyIndex(length,offset){
  if(!length) return 0;
  return hash(new Date().toDateString()+DAILY_SEED+offset)%length;
}

/* THEME */
function applyTheme(mode){
  const dark =
    mode==="dark" ||
    (mode==="system" && window.matchMedia("(prefers-color-scheme: dark)").matches);

  document.documentElement.setAttribute("data-theme",dark?"dark":"light");
}

function changeTheme(mode){
  localStorage.setItem("theme",mode);
  applyTheme(mode);
}

function initTheme(){
  const saved=localStorage.getItem("theme")||"system";
  document.getElementById("themeSelect").value=saved;
  applyTheme(saved);

  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{
    if((localStorage.getItem("theme")||"system")==="system"){
      applyTheme("system");
    }
  });
}

/* EXTRAS */
async function loadExtras(){
  try{
    const res=await fetch("content/extras.json");
    if(!res.ok) throw new Error("extras.json failed to load");

    const data=await res.json();

    EXTRAS={
      prayers:Array.isArray(data.prayers)&&data.prayers.length ? data.prayers : EXTRAS.prayers,
      reflections:Array.isArray(data.reflections)&&data.reflections.length ? data.reflections : EXTRAS.reflections,
      topics:data.topics && typeof data.topics==="object" ? data.topics : {}
    };
  }catch(e){
    console.warn("Using fallback prayer/reflection content.",e);
  }
}

/* TOPIC ENGINE: WEIGHTED KEYWORDS + MULTI-TOPIC BLENDING */

function normalizeKeyword(rawKeyword){
  if(typeof rawKeyword==="string"){
    return {
      term:rawKeyword.toLowerCase().trim(),
      weight:1
    };
  }

  if(rawKeyword && typeof rawKeyword==="object"){
    return {
      term:String(rawKeyword.term || rawKeyword.keyword || "").toLowerCase().trim(),
      weight:Number(rawKeyword.weight || 1)
    };
  }

  return {term:"",weight:0};
}

function scoreTopic(topic,verseText){
  const keywords=Array.isArray(topic.keywords) ? topic.keywords : [];
  let score=0;
  let hits=[];

  keywords.forEach(rawKeyword=>{
    const item=normalizeKeyword(rawKeyword);
    if(!item.term) return;

    if(verseText.includes(item.term)){
      const phraseBonus=item.term.includes(" ") ? 2 : 1;
      const value=item.weight * phraseBonus;
      score += value;
      hits.push(item.term);
    }
  });

  return {score,hits};
}

function getTopicMatchesForVerse(key){
  if(!key || !canon[key]) return [];

  const verseText=(
    canon[key][currentTranslation] ||
    canon[key].web ||
    ""
  ).toLowerCase();

  const scored=[];

  Object.keys(EXTRAS.topics||{}).forEach(topicName=>{
    const topic=EXTRAS.topics[topicName];
    const result=scoreTopic(topic,verseText);

    if(result.score>0){
      scored.push({
        topicName,
        score:result.score,
        hits:result.hits
      });
    }
  });

  if(!scored.length) return [];

  scored.sort((a,b)=>b.score-a.score);

  const topScore=scored[0].score;
  const closeThreshold=0.75;

  let closeMatches=scored.filter(item=>item.score>=topScore*closeThreshold);

  if(closeMatches.length>2){
    closeMatches=closeMatches.slice(0,2);
  }

  const tiedForFirst=closeMatches.filter(item=>item.score===topScore);

  if(tiedForFirst.length>1){
    const chosenIndex=hash(new Date().toDateString()+DAILY_SEED+"topic-tie")%tiedForFirst.length;
    const chosenFirst=tiedForFirst[chosenIndex];

    closeMatches=[
      chosenFirst,
      ...closeMatches.filter(item=>item.topicName!==chosenFirst.topicName)
    ];
  }

  return closeMatches.slice(0,2);
}

function weightedTopicItems(topicMatches,type){
  const items=[];

  topicMatches.forEach(match=>{
    const topic=EXTRAS.topics[match.topicName];
    const list=topic && Array.isArray(topic[type]) ? topic[type] : [];

    list.forEach(text=>{
      items.push({
        text,
        weight:match.score,
        topic:match.topicName
      });
    });
  });

  return items;
}

function chooseWeightedDailyItem(items,offset){
  if(!items || !items.length) return "";

  const expanded=[];

  items.forEach(item=>{
    const repeat=Math.max(1,Math.round(item.weight));
    for(let i=0;i<repeat;i++){
      expanded.push(item.text);
    }
  });

  return expanded[getDailyIndex(expanded.length,offset)];
}

function chooseDailyItem(items,offset){
  if(!items || !items.length) return "";
  return items[getDailyIndex(items.length,offset)];
}

function setDailyExtras(){
  const topicMatches=getTopicMatchesForVerse(dailyKeyForExtras);

  const prayerItems=weightedTopicItems(topicMatches,"prayers");
  const reflectionItems=weightedTopicItems(topicMatches,"reflections");

  const prayer=prayerItems.length
    ? chooseWeightedDailyItem(prayerItems,"topic-prayer")
    : chooseDailyItem(EXTRAS.prayers,"prayer-general");

  const reflection=reflectionItems.length
    ? chooseWeightedDailyItem(reflectionItems,"topic-reflection")
    : chooseDailyItem(EXTRAS.reflections,"reflection-general");

  document.getElementById("prayer").innerText=prayer||"Walk faithfully today.";
  document.getElementById("reflection").innerText=reflection||"What is God showing you?";
}

/* LOAD VERSES */
async function loadAll(){
  canon={};

  for(const t in TRANSLATIONS){
    try{
      const txt=await (await fetch(`translations/${t}.txt`)).text();

      txt.split("\n").forEach(line=>{
        line=line.trim();
        if(!line) return;

        const p=line.split(/\s+/);
        const i=p.findIndex(x=>x.includes(":"));
        if(i<0) return;

        const key=p.slice(0,i).join(" ")+" "+p[i];
        const verse=p.slice(i+1).join(" ");

        if(!canon[key]) canon[key]={};
        canon[key][t]=verse;
      });
    }catch(e){}
  }

  keys=Object.keys(canon);
  buildDropdown();

  const dk=getDaily();
  dailyKeyForExtras=dk;

  if(dk) show(dk);
  setDailyExtras();
}

function show(k){
  if(!canon[k]) return;

  currentKey=k;

  document.getElementById("verse-title").innerText=k;
  document.getElementById("verse").innerText=formatVerse(canon[k][currentTranslation]);

  updateStar();
}

function daily(){
  const dk=getDaily();
  dailyKeyForExtras=dk;
  if(dk) show(dk);
  setDailyExtras();
}

function randomVerse(){
  if(!keys.length) return;
  show(keys[Math.floor(Math.random()*keys.length)]);
}

function buildDropdown(){
  document.getElementById("translation").innerHTML=
    Object.keys(TRANSLATIONS).map(k=>
      `<option value="${k}">${TRANSLATIONS[k]}</option>`
    ).join("");
}

function setTranslation(t){
  currentTranslation=t;
  if(currentKey) show(currentKey);
  setDailyExtras();
}

/* SEARCH */
function toggleSearch(){
  document.getElementById("searchBox").classList.toggle("hidden");
}

function instantSearch(){
  const q=document.getElementById("q").value.toLowerCase().trim();

  if(!q){
    document.getElementById("hero").innerHTML="";
    document.getElementById("results").innerHTML="";
    return;
  }

  const words=q.split(/\s+/);
  let scored=[];

  for(const k of keys){
    const text=(canon[k][currentTranslation]||"").toLowerCase();
    let score=0;

    if(text.includes(q)) score+=5;
    words.forEach(w=>{if(text.includes(w)) score++;});

    if(score>0) scored.push({k,score,text});
  }

  scored.sort((a,b)=>b.score-a.score);

  const heroVerse=scored[0];

  document.getElementById("hero").innerHTML=
    heroVerse ? `
      <div class="hero-card" onclick="show('${heroVerse.k}')">
        <div class="hero-ref">${heroVerse.k}</div>
        <div class="hero-text">${formatVerse(heroVerse.text).slice(0,140)}...</div>
      </div>
    ` : "";

  document.getElementById("results").innerHTML=
    scored.slice(1,25).map(s=>`
      <div class="list-item" onclick="show('${s.k}')">
        <div class="ref">${s.k}</div>
        <div class="preview">${formatVerse(s.text).slice(0,90)}...</div>
      </div>
    `).join("");
}

function clearSearch(){
  document.getElementById("q").value="";
  document.getElementById("hero").innerHTML="";
  document.getElementById("results").innerHTML="";
}

/* FAVORITES */
function toggleFavorites(){
  document.getElementById("favBox").classList.toggle("hidden");
  renderFav();
}

function toggleFav(){
  if(!currentKey) return;

  const i=favs.indexOf(currentKey);

  if(i>-1) favs.splice(i,1);
  else favs.push(currentKey);

  localStorage.setItem("fav",JSON.stringify(favs));
  updateStar();
  renderFav();
}

function renderFav(){
  const container=document.getElementById("favList");

  container.innerHTML=favs.map(k=>`
    <div class="list-item" data-key="${k}">
      <div class="fav-remove" data-remove="${k}">★</div>
      <div class="ref">${k}</div>
      <div class="preview">${formatVerse(canon[k]?.[currentTranslation]||"").slice(0,100)}...</div>
    </div>
  `).join("");

  container.querySelectorAll(".list-item").forEach(el=>{
    el.onclick=()=>show(el.dataset.key);
  });

  container.querySelectorAll("[data-remove]").forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      const k=btn.dataset.remove;
      favs=favs.filter(f=>f!==k);
      localStorage.setItem("fav",JSON.stringify(favs));
      renderFav();
      updateStar();
    };
  });
}

function updateStar(){
  document.getElementById("star").innerText=favs.includes(currentKey)?"★":"☆";
}

/* MODAL */
function openMission(){
  document.getElementById("missionModal").style.display="flex";
}

function closeMission(){
  document.getElementById("missionModal").style.display="none";
}

/* INIT */
window.onload=async()=>{
  initTheme();
  await loadExtras();
  await loadAll();
};

</script>

</body>
</html>
