<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#fff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 40px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:var(--accent);
  color:white;
  text-align:center;
  padding:14px;
  font-weight:700;
}

.container{ width:min(850px,92%); }

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-top:14px;
}

.verse{
  font-size:1.25rem;
  line-height:1.7;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

.section-title{
  font-family:Georgia;
  text-transform:uppercase;
  font-weight:700;
  color:var(--accent);
  margin-bottom:8px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

input,button{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:white;
}

.list-item{
  padding:8px;
  border-bottom:1px solid rgba(0,0,0,0.1);
  cursor:pointer;
}

.streak{
  margin-top:8px;
  font-weight:700;
}

.footer{
  position:fixed;
  right:10px;
  bottom:10px;
  font-size:10px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="topbar">Unshaken</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Verse</div>

  <div id="verse" class="verse">Loading...</div>
  <div id="ref" class="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">

  <div class="controls">

    <button onclick="loadDaily()">Daily</button>

    <input id="searchBox" placeholder="Search scripture (e.g. love)" />
    <button onclick="search()">Search</button>

  </div>

</div>

<!-- SEARCH RESULTS -->
<div class="card" id="resultsBox" style="display:none;">
  <div class="section-title">Search Results</div>
  <div id="results"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

</div>

<div class="footer">
  est. 2013 — The Parker Family
</div>

<script>

/* ================= DATA ================= */

const verses = [
  {ref:"John 3:16", text:"For God so loved the world..."},
  {ref:"1 Corinthians 13:4", text:"Love is patient, love is kind..."},
  {ref:"Psalm 23:1", text:"The Lord is my shepherd..."},
  {ref:"Isaiah 41:10", text:"Do not fear, for I am with you..."},
  {ref:"Philippians 4:13", text:"I can do all things through Christ..."},
  {ref:"Romans 8:28", text:"All things work together for good..."},
  {ref:"Jeremiah 29:11", text:"For I know the plans I have for you..."}
];

/* ================= SEED ================= */

function seed(){
  const d = new Date().toISOString().split("T")[0];
  let h = 0;
  for(let i=0;i<d.length;i++){
    h += d.charCodeAt(i)*(i+1);
  }
  return h;
}

/* ================= DAILY ================= */

function loadDaily(){
  const v = verses[seed() % verses.length];
  setVerse(v);
  setPrayerReflection(v);
}

/* ================= SET DISPLAY ================= */

function setVerse(v){
  document.getElementById("verse").innerText = v.text;
  document.getElementById("ref").innerText = v.ref;
}

/* ================= PRAYER / REFLECTION ================= */

function setPrayerReflection(v){
  document.getElementById("prayer").innerText =
    "Lord, speak through this word today.";

  document.getElementById("reflection").innerText =
    "What is God showing me through " + v.ref + "?";
}

/* ================= SEARCH ================= */

function search(){
  const q = document.getElementById("searchBox").value.toLowerCase();

  const results = verses.filter(v =>
    v.text.toLowerCase().includes(q) ||
    v.ref.toLowerCase().includes(q)
  );

  const box = document.getElementById("resultsBox");
  const out = document.getElementById("results");

  box.style.display = "block";

  out.innerHTML = results.map(v =>
    `<div class="list-item" onclick='selectVerse("${v.ref}")'>
      <b>${v.ref}</b><br>${v.text}
    </div>`
  ).join("");
}

/* ================= SELECT FROM SEARCH ================= */

function selectVerse(ref){
  const v = verses.find(x=>x.ref===ref);
  if(!v) return;

  setVerse(v);
  setPrayerReflection(v);
}

/* ================= INIT ================= */

window.onload = () => {
  loadDaily(); // DEFAULT = daily
};

</script>

</body>
</html>
