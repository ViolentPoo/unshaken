<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 40px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:14px;
  font-weight:700;
  z-index:1000;
}

.container{ width:min(850px,92%); }

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-top:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.verse{
  font-size:1.25rem;
  line-height:1.7;
  margin:14px 0;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

/* SECTION TITLES */
.section-title{
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

/* CONTENT TEXT */
#prayer,#reflection,#missionText{
  font-size:1.1rem;
  line-height:1.7;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

button,select{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:#fff;
}

.star{
  font-size:1.4rem;
  cursor:pointer;
  border:none;
  background:transparent;
}

.list-item{
  padding:8px 0;
  border-bottom:1px solid rgba(0,0,0,.1);
  cursor:pointer;
}

.panel{ display:none; }

.footer{
  position: fixed;
  right: 12px;
  bottom: 10px;
  text-align: right;
  color: var(--muted);
  font-size: 10px;
}

/* STREAK */
.streak{
  margin-top:8px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="section-title">Today’s Verse</div>

  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div></div>
    <button class="star" onclick="toggleFavorite(currentRef)">
      <span id="starIcon">☆</span>
    </button>
  </div>

  <div id="verse" class="verse">Loading...</div>
  <div id="ref" class="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">
  <div class="controls">

    <select id="translation" onchange="reloadVerse()">
      <option value="web" selected>WEB</option>
      <option value="kjv">KJV</option>
      <option value="esv">ESV</option>
    </select>

    <!-- ✅ FOCUS DROPDOWN RESTORED -->
    <select id="focusArea" onchange="focusAreaChange()">
      <option value="daily">Daily Verse</option>
      <option value="peace">Peace</option>
      <option value="strength">Strength</option>
      <option value="hope">Hope</option>
      <option value="anxiety">Anxiety</option>
      <option value="faith">Faith</option>
      <option value="love">Love</option>
      <option value="wisdom">Wisdom</option>
    </select>

    <button onclick="randomVerse()">Random</button>
    <button onclick="encourageMe()">Encourage Me</button>
    <button onclick="toggleDark()">Dark Mode</button>
    <button onclick="toggleFavorites()">Favorites</button>
    <button onclick="toggleHistory()">History</button>

  </div>

  <div class="streak">
    🔥 Streak: <span id="streakCount">0</span> days
  </div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

<!-- MISSION -->
<div class="card">
  <div class="section-title">Family Mission Statement</div>
  <div id="missionText"></div>
</div>

<!-- FAVORITES -->
<div class="card panel" id="favBox">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<!-- HISTORY -->
<div class="card panel" id="historyBox">
  <div class="section-title">History</div>
  <button onclick="clearHistory()">Clear History</button>
  <div id="historyList"></div>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div>est. 2013</div>
  <div>The Parker Family</div>
</div>

<script>

/* ================= STATE ================= */
let currentRef = "";
let favorites = JSON.parse(localStorage.getItem("favs") || "[]");
let history = JSON.parse(localStorage.getItem("hist") || "[]");
let streak = JSON.parse(localStorage.getItem("streak") || '{"count":0,"last":null}');

/* ================= MISSION ================= */
const missionDefault =
  "We seek to follow Jesus faithfully, grow in wisdom, and live with purpose as a family.";

document.getElementById("missionText").innerText =
  localStorage.getItem("mission") || missionDefault;

/* ================= VERSE ================= */
async function loadVerse(ref, translation="web"){
  const r = await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${translation}`);
  const d = await r.json();

  currentRef = ref;

  document.getElementById("verse").innerText = d.text || "Unavailable";
  document.getElementById("ref").innerText = ref;

  addHistory(ref);
  updateStar();
}

/* ================= TRANSLATION ================= */
function reloadVerse(){
  const t = document.getElementById("translation").value;
  if(currentRef) loadVerse(currentRef, t);
}

/* ================= RANDOM ================= */
function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
    .then(r=>r.json())
    .then(d=>{
      const v = d[0];
      loadVerse(`${v.bookname} ${v.chapter}:${v.verse}`);
    });
}

/* ================= ENCOURAGE ================= */
function encourageMe(){
  loadVerse("Isaiah 41:10");
}

/* ================= DARK MODE ================= */
function toggleDark(){
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
}

/* ================= FAVORITES ================= */
function toggleFavorite(ref){
  if(!ref) return;

  if(favorites.includes(ref)){
    favorites = favorites.filter(f=>f!==ref);
  } else {
    favorites.push(ref);
  }

  localStorage.setItem("favs", JSON.stringify(favorites));
  renderFav();
  updateStar();
}

function renderFav(){
  document.getElementById("favList").innerHTML =
    favorites.map(f=>`<div onclick="loadVerse('${f}')" class="list-item">${f}</div>`).join("");
}

function updateStar(){
  document.getElementById("starIcon").innerText =
    favorites.includes(currentRef) ? "★" : "☆";
}

/* ================= HISTORY ================= */
function addHistory(ref){
  history = history.filter(h=>h!==ref);
  history.unshift(ref);
  history = history.slice(0,50);

  localStorage.setItem("hist", JSON.stringify(history));
}

function renderHistory(){
  document.getElementById("historyList").innerHTML =
    history.map(h=>`<div onclick="loadVerse('${h}')" class="list-item">${h}</div>`).join("");
}

function toggleHistory(){
  const b = document.getElementById("historyBox");
  b.style.display = b.style.display === "block" ? "none" : "block";
  renderHistory();
}

function toggleFavorites(){
  const b = document.getElementById("favBox");
  b.style.display = b.style.display === "block" ? "none" : "block";
  renderFav();
}

function clearHistory(){
  if(!confirm("Clear history?")) return;
  history = [];
  localStorage.removeItem("hist");
  renderHistory();
}

/* ================= STREAK ================= */
function updateStreak(){
  const today = new Date().toDateString();

  if(streak.last !== today){
    const y = new Date();
    y.setDate(y.getDate()-1);

    if(streak.last === y.toDateString()) streak.count++;
    else streak.count = 1;

    streak.last = today;
    localStorage.setItem("streak", JSON.stringify(streak));
  }

  document.getElementById("streakCount").innerText = streak.count;
}

/* ================= FOCUS ================= */
const pools = {
  peace:[{r:"John 14:27",p:"Peace Lord.",f:"What steals my peace?"}],
  strength:[{r:"Isaiah 41:10",p:"Strengthen me.",f:"Where am I weak?"}],
  hope:[{r:"Jeremiah 29:11",p:"Renew hope.",f:"What future do I trust?"}],
  anxiety:[{r:"Philippians 4:6",p:"Release worry.",f:"What am I holding?"}],
  faith:[{r:"Hebrews 11:1",p:"Grow faith.",f:"Where do I doubt?"}],
  love:[{r:"1 Corinthians 13:4",p:"Teach love.",f:"Who needs grace?"}],
  wisdom:[{r:"James 1:5",p:"Give wisdom.",f:"What needs clarity?"}]
};

function focusAreaChange(){
  const a = document.getElementById("focusArea").value;

  if(a === "daily"){
    loadVerse("John 14:27");
    return;
  }

  const item = pools[a][0];

  document.getElementById("prayer").innerText = item.p;
  document.getElementById("reflection").innerText = item.f;

  loadVerse(item.r);
}

/* ================= INIT ================= */
window.onload = () => {
  document.documentElement.setAttribute(
    "data-theme",
    localStorage.getItem("theme") || "light"
  );

  loadVerse("John 14:27");
  updateStreak();
};

</script>

</body>
</html>
