<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 40px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:14px;
  font-weight:700;
  z-index:1000;
}

.container{ width:min(850px,92%); }

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-top:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.verse{
  font-size:1.25rem;
  line-height:1.7;
  margin:14px 0;
  min-height:80px;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

/* =========================
   UI UPGRADE: SECTION TITLES
========================= */

.section-title{
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

/* CONTENT TYPOGRAPHY (slight improvement) */
#prayer,
#reflection,
#missionText{
  font-size: 1.1rem;
  line-height: 1.7;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

button,select{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:#fff;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.small{
  font-size:.9rem;
  color:var(--muted);
}

.star-btn{
  border:none;
  background:transparent;
  font-size:1.4rem;
  cursor:pointer;
}

.streak{
  margin-top:10px;
  font-weight:700;
}

/* footer */
.footer{
  position: fixed;
  right: 12px;
  bottom: 10px;
  text-align: right;
  color: var(--muted);
  font-size: 10px;
  line-height: 1.2;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:2px;
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="row">
    <div class="section-title">Today’s Verse</div>
    <button id="mainStar" class="star-btn" onclick="toggleFavorite(currentRef)">☆</button>
  </div>

  <div id="verse" class="verse">Loading...</div>
  <div id="ref" class="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">
  <div class="controls">

    <select id="translation" onchange="reloadCurrentVerse()">
      <option value="web" selected>WEB</option>
      <option value="kjv">KJV</option>
      <option value="esv">ESV</option>
    </select>

    <select id="focusArea" onchange="focusAreaChange()">
      <option value="daily">Daily Verse</option>
      <option value="peace">Peace</option>
      <option value="strength">Strength</option>
      <option value="hope">Hope</option>
      <option value="anxiety">Anxiety</option>
      <option value="faith">Faith</option>
      <option value="love">Love</option>
      <option value="wisdom">Wisdom</option>
    </select>

    <button onclick="randomVerse()">Random</button>
    <button onclick="encouragement()">Encourage Me</button>
    <button onclick="toggleDark()">Dark Mode</button>

  </div>

  <div class="streak">
    🔥 Streak: <span id="streakCount">0</span> days
  </div>
  <div id="streakMessage" class="small"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

<!-- MISSION -->
<div class="card">
  <div class="section-title">Family Mission Statement</div>
  <div id="missionText"></div>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div>est. 2013</div>
  <div>The Parker Family</div>
</div>

<script>

/* =========================
   STATE
========================= */

let currentRef = "";

/* =========================
   MISSION
========================= */

const missionDefault =
  "We seek to follow Jesus faithfully, grow in wisdom, and live with purpose as a family.";

document.getElementById("missionText").innerText =
  localStorage.getItem("unshaken_mission") || missionDefault;

/* =========================
   STREAK
========================= */

let streak = { count: 0, lastDate: null };

try {
  const raw = JSON.parse(localStorage.getItem("unshaken_streak"));
  if (raw) {
    streak.count = Number(raw.count) || 0;
    streak.lastDate = raw.lastDate || null;
  }
} catch {}

function getToday(){
  return new Date().toDateString();
}

function updateStreak(){
  const today = getToday();

  if (streak.lastDate === today) return;

  const y = new Date();
  y.setDate(y.getDate() - 1);

  if (streak.lastDate === y.toDateString()) streak.count++;
  else streak.count = 1;

  streak.lastDate = today;

  localStorage.setItem("unshaken_streak", JSON.stringify(streak));
  renderStreak();
}

function renderStreak(){
  const c = Number(streak.count) || 0;

  document.getElementById("streakCount").innerText = c;

  let msg = "Start today.";
  if(c >= 30) msg = "🔥 Incredible consistency.";
  else if(c >= 14) msg = "Strong discipline forming.";
  else if(c >= 7) msg = "Momentum building.";
  else if(c >= 3) msg = "Keep going.";

  document.getElementById("streakMessage").innerText = msg;
}

/* =========================
   INIT
========================= */

window.onload = () => {
  document.documentElement.setAttribute(
    "data-theme",
    localStorage.getItem("theme") || "light"
  );

  updateStreak();
  renderStreak();
};

</script>

</body>
</html>
