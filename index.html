<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unshaken</title>
  <style>
    :root{
      --bg:#f5f5f5;
      --text:#111;
      --card:#fff;
      --accent:#2b6cb0;
    }

    [data-theme="dark"]{
      --bg:#0f172a;
      --text:#e2e8f0;
      --card:#1e293b;
      --accent:#60a5fa;
    }

    body{
      margin:0;
      font-family:system-ui;
      background:var(--bg);
      color:var(--text);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding-top:70px;
    }

    .topbar{
      position:fixed;
      top:0;left:0;right:0;
      background:var(--accent);
      color:white;
      text-align:center;
      padding:12px;
      font-weight:700;
      z-index:1000;
    }

    .container{
      width:min(750px,92%);
      background:var(--card);
      padding:20px;
      border-radius:14px;
      box-shadow:0 10px 25px rgba(0,0,0,.1);
    }

    .greeting{
      font-size:14px;
      margin-bottom:10px;
      opacity:.8;
    }

    .verse{font-size:20px;line-height:1.6;margin:15px 0;}
    .ref{color:var(--accent);font-weight:bold;}

    select,button{
      padding:8px;
      border-radius:8px;
      border:1px solid #ccc;
      background:var(--card);
      color:var(--text);
      cursor:pointer;
      margin:4px;
      -webkit-appearance:none;
      appearance:none;
    }

    button:hover{background:var(--accent);color:white;}

    .small{
      font-size:12px;
      opacity:.7;
      position:fixed;
      right:10px;
    }

    .footer1{bottom:22px;}
    .footer2{bottom:8px;}

    .card{
      background:rgba(0,0,0,.03);
      padding:10px;
      border-radius:10px;
      margin-top:10px;
    }

    [data-theme="dark"] .card{
      background:rgba(255,255,255,.06);
    }

    .history,.favorites{
      margin-top:15px;
      max-height:180px;
      overflow-y:auto;
      border-top:1px solid rgba(0,0,0,.1);
      padding-top:10px;
      display:none;
    }

    .history-item,.fav-item{
      font-size:13px;
      padding:6px;
      cursor:pointer;
      border-radius:6px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .star{cursor:pointer;opacity:.6;margin-left:10px;}
    .star.fav{opacity:1;}

    .streak{font-size:13px;margin-top:5px;}
  </style>
</head>
<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

  <div id="greeting" class="greeting"></div>

  <h2>Verse</h2>
  <div id="verse" class="verse">Loading...</div>
  <div id="ref" class="ref"></div>

  <div>
    <select id="translation">
      <option value="kjv">KJV</option>
      <option value="web" selected>WEB</option>
      <option value="esv">ESV</option>
    </select>

    <select id="topic">
      <option value="daily" selected>Verse of the Day</option>
      <option value="peace">Peace</option>
      <option value="strength">Strength</option>
      <option value="hope">Hope</option>
      <option value="anxiety">Anxiety</option>
    </select>

    <button onclick="toggleDark()">Dark Mode</button>
    <button onclick="randomVerse()">Random</button>
    <button onclick="encouragement()">Encourage Me</button>
    <button onclick="shareVerse()">Share</button>
    <button onclick="toggleHistory()">History</button>
    <button onclick="toggleFavorites()">Favorites</button>
  </div>

  <div class="streak" id="streakDisplay"></div>

  <div class="card">
    <strong id="prayerTitle">Morning Prayer</strong>
    <div id="prayer" style="font-size:13px;margin-top:5px"></div>
  </div>

  <div class="card">
    <strong id="reflectionTitle">Morning Reflection</strong>
    <div id="reflection" style="font-size:13px;font-style:italic;margin-top:5px"></div>
  </div>

  <div class="history" id="historyBox">
    <strong>Verse History</strong>
    <div id="historyList"></div>
  </div>

  <div class="favorites" id="favBox">
    <strong>Favorite Verses</strong>
    <div id="favList"></div>
  </div>

</div>

<div class="small footer1">est 2013</div>
<div class="small footer2">The Parker Family</div>

<script>
let currentRef="";
let currentVerse="";

let history=JSON.parse(localStorage.getItem('unshaken_history')||'[]');
let favorites=JSON.parse(localStorage.getItem('unshaken_favs')||'[]');

function getMode(){
  const h=new Date().getHours();
  if(h>=5 && h<12) return "morning";
  if(h>=12 && h<18) return "day";
  return "night";
}

function setModeUI(){
  const mode=getMode();
  const g=document.getElementById('greeting');

  if(mode==="morning"){
    g.innerText="Good Morning ☀️ — Start your day with truth";
    document.getElementById('prayerTitle').innerText="Morning Prayer";
    document.getElementById('reflectionTitle').innerText="Morning Reflection";
  } else if(mode==="day"){
    g.innerText="Good Afternoon 🌤️ — Stay anchored in truth";
    document.getElementById('prayerTitle').innerText="Midday Prayer";
    document.getElementById('reflectionTitle').innerText="Midday Reflection";
  } else {
    g.innerText="Good Evening 🌙 — Rest in His Word";
    document.getElementById('prayerTitle').innerText="Night Prayer";
    document.getElementById('reflectionTitle').innerText="Night Reflection";
  }
}

const prayers={
  morning:[
    "Lord, guide me today and keep my heart steady.",
    "Jesus, give me strength for what lies ahead.",
    "Father, order my steps and thoughts today.",
    "God, help me stay disciplined and faithful today.",
    "Holy Spirit, lead my decisions and words."
  ],
  day:[
    "God, help me stay focused and faithful today.",
    "Lord, give me wisdom in every decision.",
    "Jesus, keep me patient with people around me.",
    "Father, help me not lose sight of You in busyness.",
    "Lord, strengthen me when I feel distracted."
  ],
  night:[
    "Lord, thank You for today. Help me rest in You.",
    "Jesus, calm my heart and renew my spirit.",
    "Father, forgive my shortcomings from today.",
    "God, thank You for every blessing I saw today.",
    "Lord, give me peaceful rest and deep sleep."
  ]
};

const reflections={
  morning:[
    "What is my focus for today?",
    "How can I walk with God intentionally today?",
    "What challenge might God be preparing me for?",
    "Where do I need to trust God more today?",
    "What kind of person do I want to be today?"
  ],
  day:[
    "How am I living out my faith right now?",
    "Where do I need patience today?",
    "Am I honoring God in my current decisions?",
    "What distraction is pulling me away from God?",
    "Who can I encourage today?"
  ],
  night:[
    "Where did I see God today?",
    "What am I grateful for from today?",
    "Where did I fall short and need grace?",
    "How did I grow spiritually today?",
    "What do I want to do better tomorrow?"
  ]
};

function setExtras(){
  const mode=getMode();
  document.getElementById('prayer').innerText=
    prayers[mode][Math.floor(Math.random()*prayers[mode].length)];

  document.getElementById('reflection').innerText=
    reflections[mode][Math.floor(Math.random()*reflections[mode].length)];
}

function toggleHistory(){
  const box=document.getElementById('historyBox');
  box.style.display=box.style.display==='block'?'none':'block';
}

function toggleFavorites(){
  const box=document.getElementById('favBox');
  box.style.display=box.style.display==='block'?'none':'block';
  renderFavorites();
}

function addToHistory(ref,text){
  if(history.length && history[0].ref===ref) return;
  history=history.filter(h=>!(h.ref===ref && h.text===text));
  history.unshift({ref,text});
  if(history.length>20) history.pop();
  localStorage.setItem('unshaken_history',JSON.stringify(history));
  renderHistory();
}

function toggleFav(ref,text){
  const exists=favorites.find(f=>f.ref===ref);
  if(exists){favorites=favorites.filter(f=>f.ref!==ref);} 
  else {favorites.unshift({ref,text});}
  localStorage.setItem('unshaken_favs',JSON.stringify(favorites));
  renderFavorites();
  renderHistory();
}

function renderHistory(){
  const el=document.getElementById('historyList');
  el.innerHTML="";
  history.forEach(h=>{
    const div=document.createElement('div');
    div.className='history-item';

    const left=document.createElement('span');
    left.innerText=h.ref;
    left.onclick=()=>{
      currentRef=h.ref;
      currentVerse=h.text;
      document.getElementById('verse').innerText=h.text;
      document.getElementById('ref').innerText=h.ref;
    };

    const star=document.createElement('span');
    star.className='star '+(favorites.find(f=>f.ref===h.ref)?'fav':'');
    star.innerText='★';
    star.onclick=()=>toggleFav(h.ref,h.text);

    div.appendChild(left);
    div.appendChild(star);
    el.appendChild(div);
  });
}

function renderFavorites(){
  const el=document.getElementById('favList');
  el.innerHTML="";
  favorites.forEach(f=>{
    const div=document.createElement('div');
    div.className='fav-item';
    div.innerText=f.ref;
    div.onclick=()=>{
      currentRef=f.ref;
      currentVerse=f.text;
      document.getElementById('verse').innerText=f.text;
      document.getElementById('ref').innerText=f.ref;
    };
    el.appendChild(div);
  });
}

function updateStreak(){
  const today=new Date().toDateString();
  const last=localStorage.getItem('unshaken_last');
  let streak=parseInt(localStorage.getItem('unshaken_streak')||'0');

  if(!last) streak=1;
  else if(last!==today){
    const y=new Date();y.setDate(y.getDate()-1);
    streak=(last===y.toDateString())?streak+1:1;
  }

  localStorage.setItem('unshaken_streak',streak);
  localStorage.setItem('unshaken_last',today);

  document.getElementById('streakDisplay').innerText=`🔥 ${streak} day streak`;
}

function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('theme',t);
}

function themeByTime(){
  const saved=localStorage.getItem('theme');
  if(saved){document.documentElement.setAttribute('data-theme',saved);return;}
  const h=new Date().getHours();
  document.documentElement.setAttribute('data-theme',h<6||h>18?'dark':'light');
}

async function fetchDaily(){
  const res=await fetch("https://beta.ourmanna.com/api/v1/get/?format=json&order=daily");
  const data=await res.json();
  currentRef=data.verse.details.reference;
  loadVerse(currentRef);
}

async function loadVerse(ref){
  const tr=document.getElementById('translation').value;
  const res=await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${tr}`);
  const data=await res.json();

  currentVerse=data.text;
  currentRef=ref;

  document.getElementById('verse').innerText=data.text;
  document.getElementById('ref').innerText=ref;

  addToHistory(ref,data.text);
  setExtras();
}

function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
  .then(r=>r.json())
  .then(d=>{
    const v=d[0];
    currentRef=v.bookname+" "+v.chapter+":"+v.verse;
    currentVerse=v.text;
    document.getElementById('verse').innerText=currentVerse;
    document.getElementById('ref').innerText=currentRef;
    addToHistory(currentRef,currentVerse);
    setExtras();
  });
}

function encouragement(){
  currentRef="Isaiah 41:10";
  loadVerse(currentRef);
}

function toggleDark(){
  const cur=document.documentElement.getAttribute('data-theme');
  applyTheme(cur==='dark'?'light':'dark');
}

function shareVerse(){
  const text=currentRef+"\n\n"+currentVerse;
  if(navigator.share){navigator.share({title:"Unshaken",text});}
  else{navigator.clipboard.writeText(text);alert("Copied");}
}

window.onload=()=>{
  themeByTime();
  setModeUI();
  fetchDaily();
  setExtras();
  updateStreak();

  document.getElementById('translation').onchange=()=>loadVerse(currentRef);
  document.getElementById('topic').onchange=topicChange;
  renderHistory();
  renderFavorites();
};

function topicChange(){
  const v=document.getElementById('topic').value;
  if(v==='daily') return fetchDaily();

  const map={
    peace:"John 14:27",
    strength:"Philippians 4:13",
    hope:"Jeremiah 29:11",
    anxiety:"Philippians 4:6"
  };

  currentRef=map[v];
  loadVerse(currentRef);
}
</script>

</body>
</html>
