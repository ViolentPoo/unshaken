<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unshaken</title>
  <style>
    :root{
      --bg:#f5f5f5;
      --text:#111;
      --card:#fff;
      --accent:#2b6cb0;
    }

    [data-theme="dark"]{
      --bg:#0f172a;
      --text:#e2e8f0;
      --card:#1e293b;
      --accent:#60a5fa;
    }

    body{
      margin:0;
      font-family:system-ui;
      background:var(--bg);
      color:var(--text);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding-top:70px;
    }

    .topbar{
      position:fixed;
      top:0;left:0;right:0;
      background:var(--accent);
      color:white;
      text-align:center;
      padding:12px;
      font-weight:700;
      z-index:1000;
    }

    .container{
      width:min(750px,92%);
      background:var(--card);
      padding:20px;
      border-radius:14px;
      box-shadow:0 10px 25px rgba(0,0,0,.1);
    }

    .verse{font-size:20px;line-height:1.6;margin:15px 0;}
    .ref{color:var(--accent);font-weight:bold;}

    select,button{
      padding:8px;
      border-radius:8px;
      border:1px solid #ccc;
      background:transparent;
      color:var(--text);
      cursor:pointer;
      margin:4px;
    }

    button:hover{background:var(--accent);color:white;}

    .small{
      font-size:12px;
      opacity:.7;
      position:fixed;
      bottom:8px;
      right:10px;
    }
  </style>
</head>
<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">
  <h2>Verse</h2>

  <div id="verse" class="verse">Loading...</div>
  <div id="ref" class="ref"></div>

  <div>
    <select id="translation">
      <option value="kjv">KJV</option>
      <option value="web" selected>WEB</option>
      <option value="esv">ESV</option>
    </select>

    <select id="topic">
      <option value="daily" selected>Verse of the Day</option>
      <option value="peace">Peace</option>
      <option value="strength">Strength</option>
      <option value="hope">Hope</option>
      <option value="anxiety">Anxiety</option>
    </select>

    <button onclick="toggleDark()">Dark Mode</button>
    <button onclick="randomVerse()">Random</button>
    <button onclick="encouragement()">Encourage Me</button>
    <button onclick="generateWallpaper()">Wallpaper</button>
    <button onclick="shareVerse()">Share</button>
  </div>

  <div style="margin-top:15px">
    <div id="prayer" style="font-size:13px"></div>
    <div id="reflection" style="font-size:13px;font-style:italic"></div>
  </div>
</div>

<div class="small">The Parker Family</div>

<script>
let currentRef="";
let currentVerse="";

const prayers=[
"Lord, guide me today.",
"Jesus, give me peace.",
"Father, strengthen my heart."
];

const reflections=[
"How can I live this today?",
"What is God teaching me?",
"Who can I encourage?"
];

function setExtras(){
  document.getElementById('prayer').innerText="Prayer: "+prayers[Math.floor(Math.random()*prayers.length)];
  document.getElementById('reflection').innerText=reflections[Math.floor(Math.random()*reflections.length)];
}

function themeByTime(){
  const h=new Date().getHours();
  document.documentElement.setAttribute('data-theme',h<6||h>18?'dark':'light');
}

async function fetchDaily(){
  const res=await fetch("https://beta.ourmanna.com/api/v1/get/?format=json&order=daily");
  const data=await res.json();
  currentRef=data.verse.details.reference;
  loadVerse(currentRef);
}

async function loadVerse(ref){
  const tr=document.getElementById('translation').value;
  const res=await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${tr}`);
  const data=await res.json();
  currentVerse=data.text;
  document.getElementById('verse').innerText=data.text;
  document.getElementById('ref').innerText=ref;
  setExtras();
}

function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
  .then(r=>r.json())
  .then(d=>{
    const v=d[0];
    currentRef=v.bookname+" "+v.chapter+":"+v.verse;
    currentVerse=v.text;
    document.getElementById('verse').innerText=currentVerse;
    document.getElementById('ref').innerText=currentRef;
    setExtras();
  });
}

function encouragement(){
  currentRef="Isaiah 41:10";
  loadVerse(currentRef);
}

function toggleDark(){
  const cur=document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme',cur==='dark'?'light':'dark');
}

function shareVerse(){
  const text=currentRef+"\n\n"+currentVerse;
  if(navigator.share){navigator.share({title:"Unshaken",text});}
  else{navigator.clipboard.writeText(text);alert("Copied");}
}

// WALLPAPER GENERATOR
function generateWallpaper(){
  const canvas=document.createElement('canvas');
  canvas.width=1080;
  canvas.height=1920;
  const ctx=canvas.getContext('2d');

  const dark=document.documentElement.getAttribute('data-theme')==='dark';

  const grad=ctx.createLinearGradient(0,0,0,1920);
  grad.addColorStop(0,dark?'#0f172a':'#dbeafe');
  grad.addColorStop(1,dark?'#1e293b':'#ffffff');

  ctx.fillStyle=grad;
  ctx.fillRect(0,0,1080,1920);

  ctx.fillStyle=dark?'#fff':'#111';
  ctx.font='bold 54px system-ui';
  ctx.fillText('Unshaken',60,120);

  ctx.font='36px system-ui';

  wrapText(ctx,currentVerse||'',60,300,960,50);

  ctx.font='30px system-ui';
  ctx.fillStyle=dark?'#60a5fa':'#2b6cb0';
  ctx.fillText(currentRef||'',60,1700);

  const link=document.createElement('a');
  link.download='unshaken-verse.png';
  link.href=canvas.toDataURL();
  link.click();
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');
  let line='';

  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    const metrics=ctx.measureText(test);
    if(metrics.width>maxWidth&&n>0){
      ctx.fillText(line,x,y);
      line=words[n]+' ';
      y+=lineHeight;
    }else{
      line=test;
    }
  }
  ctx.fillText(line,x,y);
}

function topicChange(){
  const v=document.getElementById('topic').value;
  if(v==='daily') return fetchDaily();

  const map={
    peace:"John 14:27",
    strength:"Philippians 4:13",
    hope:"Jeremiah 29:11",
    anxiety:"Philippians 4:6"
  };

  currentRef=map[v];
  loadVerse(currentRef);
}

window.onload=()=>{
  themeByTime();
  fetchDaily();
  setExtras();

  document.getElementById('translation').onchange=()=>loadVerse(currentRef);
  document.getElementById('topic').onchange=topicChange;
};

</script>

</body>
</html>
