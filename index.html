<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
  --border:#d9d9d9;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
  --border:#334155;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 64px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:700;
}

.container{width:min(940px,92%);}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.section-title{
  font-size:14px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:10px;
}

button,input,select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid var(--border);
  margin:3px;
  background:var(--card);
  color:var(--text);
  font:inherit;
}

button{cursor:pointer;}
button:hover{background:var(--accent);color:#fff;}

.hidden{display:none !important;}

.star{
  font-size:26px;
  cursor:pointer;
  user-select:none;
  margin-top:8px;
}

.result-card{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  margin-top:10px;
  cursor:pointer;
}

.result-ref{
  font-weight:700;
  color:var(--accent);
  margin-bottom:6px;
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse</div>

<div class="container">

<div class="card">
  <div class="section-title">Verse</div>
  <div id="verse">Loading...</div>
  <div class="star" id="star" onclick="toggleFav()">☆</div>
</div>

<div class="card">
  <button onclick="daily()">Daily</button>
  <button onclick="randomVerse()">Random</button>
  <button onclick="toggleSearch()">Search</button>
  <button onclick="toggleFavorites()">Favorites</button>

  <select id="translation" onchange="setTranslation(this.value)"></select>

  <select onchange="setTheme(this.value)">
    <option value="system">System</option>
    <option value="light">Day</option>
    <option value="dark">Night</option>
  </select>
</div>

<div class="card hidden" id="searchBox">
  <div class="section-title">Search</div>

  <input id="q" oninput="instantSearch()" placeholder="Search...">
  <button onclick="clearSearch()">Clear Search</button>

  <div id="results"></div>
</div>

<div class="card hidden" id="favBox">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer">Walk faithfully today.</div>
</div>

<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection">What is God showing you?</div>
</div>

</div>

<script>

/* ================= STATE ================= */

let themeMode = "system";

/* ================= THEME FIX (MINIMAL, NO REWRITE) ================= */

function applyTheme(){
  const systemDark =
    window.matchMedia("(prefers-color-scheme: dark)").matches;

  const isDark =
    themeMode === "dark" ||
    (themeMode === "system" && systemDark);

  document.documentElement.setAttribute(
    "data-theme",
    isDark ? "dark" : "light"
  );
}

function setTheme(mode){
  themeMode = mode;
  applyTheme();
}

/* 🔧 ONLY ADDITION: live OS change support */
window.matchMedia("(prefers-color-scheme: dark)")
  .addEventListener("change", () => {
    if(themeMode === "system"){
      applyTheme();
    }
  });

/* ================= PLACEHOLDER CORE (UNCHANGED) ================= */

function daily(){ document.getElementById("verse").innerText="Daily verse"; }
function randomVerse(){ document.getElementById("verse").innerText="Random verse"; }
function toggleSearch(){ document.getElementById("searchBox").classList.toggle("hidden"); }
function toggleFavorites(){ document.getElementById("favBox").classList.toggle("hidden"); }

function instantSearch(){
  document.getElementById("results").innerHTML="Searching...";
}

function clearSearch(){
  document.getElementById("q").value="";
  document.getElementById("results").innerHTML="";
}

function toggleFav(){
  const s=document.getElementById("star");
  s.innerText = s.innerText==="☆"?"★":"☆";
}

function setTranslation(){}

window.onload=applyTheme;

</script>

</body>
</html>
