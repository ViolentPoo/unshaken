<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unshaken</title>

<style>
:root{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
  --accent:#2b6cb0;
  --muted:#666;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --text:#e2e8f0;
  --card:#1e293b;
  --accent:#60a5fa;
  --muted:#94a3b8;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:72px 0 40px;
  display:flex;
  justify-content:center;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:var(--accent);
  color:#fff;
  text-align:center;
  padding:14px;
  font-weight:700;
  z-index:1000;
}

.container{ width:min(850px,92%); }

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-top:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.verse{
  font-size:1.25rem;
  line-height:1.7;
  margin:14px 0;
  min-height:80px;
}

.ref{
  color:var(--accent);
  font-weight:700;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

button,select{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:#fff;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.small{
  font-size:.9rem;
  color:var(--muted);
}

.star-btn{
  border:none;
  background:transparent;
  font-size:1.4rem;
  cursor:pointer;
}

.section-title{
  font-weight:700;
}

.streak{
  margin-top:10px;
  font-weight:700;
}

/* panels */
.panel{
  display:none;
  max-height:260px;
  overflow:auto;
}

.list-item{
  padding:8px 0;
  border-bottom:1px solid rgba(0,0,0,.08);
  cursor:pointer;
}

/* footer */
.footer{
  position: fixed;
  right: 12px;
  bottom: 10px;
  text-align: right;
  color: var(--muted);
  font-size: 10px;
  line-height: 1.2;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:2px;
}
</style>
</head>

<body>

<div class="topbar">Unshaken Bible Verse of the Day</div>

<div class="container">

<!-- VERSE -->
<div class="card">
  <div class="row">
    <div class="section-title">Today’s Verse</div>
    <button id="mainStar" class="star-btn" onclick="toggleFavorite(currentRef)">☆</button>
  </div>

  <div id="verse" class="verse">Loading...</div>
  <div id="ref" class="ref"></div>
</div>

<!-- CONTROLS -->
<div class="card">
  <div class="controls">

    <select id="translation" onchange="reloadCurrentVerse()">
      <option value="web" selected>WEB</option>
      <option value="kjv">KJV</option>
      <option value="esv">ESV</option>
    </select>

    <select id="focusArea" onchange="focusAreaChange()">
      <option value="daily">Daily Verse</option>
      <option value="peace">Peace</option>
      <option value="strength">Strength</option>
      <option value="hope">Hope</option>
      <option value="anxiety">Anxiety</option>
      <option value="faith">Faith</option>
      <option value="love">Love</option>
      <option value="wisdom">Wisdom</option>
    </select>

    <button onclick="randomVerse()">Random</button>
    <button onclick="encouragement()">Encourage Me</button>
    <button onclick="toggleDark()">Dark Mode</button>
    <button onclick="toggleFavorites()">Favorites</button>
    <button onclick="toggleHistory()">History</button>

  </div>

  <div class="streak">
    🔥 Streak: <span id="streakCount">0</span> days
  </div>
  <div id="streakMessage" class="small"></div>
</div>

<!-- PRAYER -->
<div class="card">
  <div class="section-title">Prayer</div>
  <div id="prayer"></div>
</div>

<!-- REFLECTION -->
<div class="card">
  <div class="section-title">Reflection</div>
  <div id="reflection"></div>
</div>

<!-- FAVORITES -->
<div class="card panel" id="favBox">
  <div class="section-title">Favorites</div>
  <div id="favList"></div>
</div>

<!-- HISTORY -->
<div class="card panel" id="historyBox">
  <div class="row">
    <div class="section-title">History</div>
    <button onclick="clearHistory()">Clear</button>
  </div>
  <div id="historyList"></div>
</div>

<!-- MISSION -->
<div class="card">
  <div class="section-title">Family Mission Statement</div>
  <div id="missionText"></div>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div>est. 2013</div>
  <div>The Parker Family</div>
</div>

<script>

/* STATE */
let currentRef="";
let favorites=JSON.parse(localStorage.getItem("favs")||"[]");
let history=JSON.parse(localStorage.getItem("hist")||"[]");

/* DAILY VERSE */
async function fetchDaily(){
  try{
    const r=await fetch("https://beta.ourmanna.com/api/v1/get/?format=json&order=daily");
    const d=await r.json();
    loadVerse(d?.verse?.details?.reference||"John 14:27");
  }catch{
    loadVerse("John 14:27");
  }
}

/* LOAD VERSE */
async function loadVerse(ref){
  try{
    const r=await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=web`);
    const d=await r.json();

    currentRef=ref;

    document.getElementById("verse").innerText=d.text||"Unavailable";
    document.getElementById("ref").innerText=ref;

    addHistory(ref);
    updateStar();

  }catch{
    document.getElementById("verse").innerText="Error loading verse.";
  }
}

/* FOCUS SYSTEM */
const pools={
  peace:[
    {r:"John 14:27",p:"Give me peace Lord.",f:"What steals my peace?"},
    {r:"Philippians 4:7",p:"Guard my heart.",f:"Where do I need calm?"}
  ],
  strength:[
    {r:"Isaiah 41:10",p:"Strengthen me.",f:"Where am I weak?"}
  ],
  hope:[
    {r:"Jeremiah 29:11",p:"Renew my hope.",f:"What future do I trust?"}
  ],
  anxiety:[
    {r:"Philippians 4:6",p:"I release worry.",f:"What am I holding?"}
  ],
  faith:[
    {r:"Hebrews 11:1",p:"Grow my faith.",f:"Where do I doubt?"}
  ],
  love:[
    {r:"1 Corinthians 13:4",p:"Teach love.",f:"Who needs grace?"}
  ],
  wisdom:[
    {r:"James 1:5",p:"Give wisdom.",f:"What needs clarity?"}
  ]
};

function focusAreaChange(){
  const a=document.getElementById("focusArea").value;

  if(a==="daily"){
    fetchDaily();
    return;
  }

  const item=pools[a][getDayIndex(pools[a].length)];

  document.getElementById("prayer").innerText=item.p;
  document.getElementById("reflection").innerText=item.f;

  loadVerse(item.r);
}

function getDayIndex(len){
  const now=new Date();
  const start=new Date(now.getFullYear(),0,0);
  return Math.floor((now-start)/86400000)%len;
}

/* FAVORITES */
function toggleFavorite(ref){
  if(!ref) return;

  if(favorites.includes(ref)){
    favorites=favorites.filter(f=>f!==ref);
  }else{
    favorites.push(ref);
  }

  localStorage.setItem("favs",JSON.stringify(favorites));
  renderFav();
  updateStar();
}

function renderFav(){
  const el=document.getElementById("favList");
  el.innerHTML=favorites.map(f=>`<div class="list-item" onclick="loadVerse('${f}')">${f}</div>`).join("");
}

function updateStar(){
  document.getElementById("mainStar").innerText=
    favorites.includes(currentRef)?"⭐":"☆";
}

/* HISTORY */
function addHistory(ref){
  history=history.filter(h=>h!==ref);
  history.unshift(ref);
  history=history.slice(0,50);
  localStorage.setItem("hist",JSON.stringify(history));
}

function renderHistory(){
  document.getElementById("historyList").innerHTML=
    history.map(h=>`<div class="list-item" onclick="loadVerse('${h}')">${h}</div>`).join("");
}

function toggleHistory(){
  const b=document.getElementById("historyBox");
  b.style.display=b.style.display==="block"?"none":"block";
}

function toggleFavorites(){
  const b=document.getElementById("favBox");
  b.style.display=b.style.display==="block"?"none":"block";
}

function clearHistory(){
  if(!confirm("Clear history?")) return;
  history=[];
  localStorage.removeItem("hist");
  renderHistory();
}

/* OTHER */
function toggleDark(){
  const t=document.documentElement.getAttribute("data-theme");
  const n=t==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",n);
  localStorage.setItem("theme",n);
}

function encouragement(){
  loadVerse("Isaiah 41:10");
}

function randomVerse(){
  fetch("https://labs.bible.org/api/?passage=random&type=json")
  .then(r=>r.json())
  .then(d=>{
    const v=d[0];
    loadVerse(`${v.bookname} ${v.chapter}:${v.verse}`);
  });
}

function reloadCurrentVerse(){
  if(currentRef) loadVerse(currentRef);
}

/* INIT */
window.onload=()=>{
  document.documentElement.setAttribute(
    "data-theme",
    localStorage.getItem("theme")||"light"
  );

  renderFav();
  renderHistory();
  fetchDaily();
};

</script>

</body>
</html>
